<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patients List - DocAssist</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Roboto", Arial, sans-serif;
        display: flex;
        min-height: 100vh;
        background-color: #e6f2ff;
        color: #333;
        overflow-x: hidden;
      }

      .sidebar {
        width: 250px;
        min-width: 250px;
        background-color: rgb(9, 102, 102);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: fixed;
        height: 100vh;
        z-index: 1000;
        transition: transform 0.3s ease;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
        margin: 10px 0;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        transition: background-color 0.3s ease, color 0.3s ease;
        border-radius: 6px;
        padding: 10px 15px;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #e8f0fe;
        color: #007bff;
        font-weight: bold;
      }

      header {
        background-color: #166e6b;
        color: white;
        padding: 20px 16px;
        font-size: 28px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        border-bottom: 2px solid white;
      }

      header button {
        background-color: #28a745;
        border: none;
        color: white;
        padding: 10px 22px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      header button:hover {
        background-color: #1e7e34;
      }

      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
      }

      .main-content {
        flex: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        margin-left: 250px;
        width: calc(100% - 250px);
      }

      h1 {
        color: #166e6b;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 30px;
        background-color: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 12px rgba(22, 110, 107, 0.15);
      }

      th {
        background-color: #166e6b;
        color: white;
        padding: 16px;
        text-align: left;
        font-weight: 700;
      }

      td {
        padding: 16px;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background-color: #f9f9f9;
      }

      .delete-btn,
      .details-btn {
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        margin-left: 10px;
      }

      .delete-btn {
        border: none;
        background: transparent;
        cursor: pointer;
        color: #166e6b;
        font-size: 18px;
        transition: color 0.3s ease;
      }

      .delete-btn:hover {
        color: #dc3545;
      }

      .details-btn {
        background-color: #009688;
        color: #fff;
      }

      .details-btn:hover {
        background-color: #00796b;
        transform: translateY(-2px);
      }

      .details-btn i,
      .delete-btn i {
        font-size: 16px;
      }

      .table-buttons {
        display: flex;
        gap: 10px;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 250px;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
      }

      .sidebar.active + #overlay {
        left: 0;
        width: 100%;
      }

      #overlay.active {
        display: block;
      }
      .status-badge {
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: bold;
      }
      .status-badge.active {
        background-color: #d4edda;
        color: #155724;
      }
      .status-badge.inactive {
        background-color: #f8d7da;
        color: #721c24;
      }
      .activate-btn,
      .deactivate-btn {
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      /* Activate button: green, matches your theme */
      .activate-btn {
        background-color: #28a745;
        color: #fff;
      }
      .activate-btn:hover {
        background-color: #1e7e34;
        transform: translateY(-2px);
      }

      /* Deactivate button: teal/red combo */
      .deactivate-btn {
        background-color: #dc3545;
        color: #fff;
      }
      .deactivate-btn:hover {
        background-color: #b52a38;
        transform: translateY(-2px);
      }

      @media (max-width: 992px) {
        table {
          font-size: 14px;
        }

        th,
        td {
          padding: 12px;
          width: 100%;
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
        }

        .sidebar.active {
          transform: translateX(0);
        }

        .main-content {
          margin-left: 0;
          width: 100%;
        }

        #bar {
          display: block;
          background: none;
          border: none;
          color: white;
          font-size: 26px;
          cursor: pointer;
        }

        header {
          flex-direction: row;
          gap: 20px;
          font-size: 22px;
          align-items: center;
        }

        table {
          display: block;
          overflow-x: auto;
        }
      }

      @media (max-width: 480px) {
        header {
          padding: 15px;
          font-size: 20px;
        }

        header button {
          padding: 8px 16px;
          font-size: 14px;
        }

        th,
        td {
          padding: 12px 8px;
          font-size: 13px;
        }
      }
      @media (max-width: 768px) {
        #patientsTable,
        #patientsTable thead,
        #patientsTable tbody,
        #patientsTable th,
        #patientsTable td,
        #patientsTable tr {
          display: block;
          width: 100%;
        }

        #patientsTable thead {
          display: none; /* hide header row */
        }

        #patientsTable tr {
          margin-bottom: 15px;
          background: #fff;
          border-radius: 10px;
          padding: 15px;
          box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        #patientsTable td {
          display: block;
          padding: 10px 8px;
          border: none;
          border-bottom: 1px solid #eee;
          font-size: 14px;
          word-break: break-word;
        }

        #patientsTable td:last-child {
          border-bottom: none;
        }

        /* Labels using nth-of-type */
        #patientsTable td:nth-of-type(1)::before {
          content: "Email: ";
          font-weight: 700;
          color: #166e6b;
          display: block;
          margin-bottom: 4px;
        }
        #patientsTable td:nth-of-type(2)::before {
          content: "Status: ";
          font-weight: 700;
          color: #166e6b;
          display: block;
          margin-bottom: 4px;
        }
        #patientsTable td:nth-of-type(3)::before {
          content: "Actions: ";
          font-weight: 700;
          color: #166e6b;
          display: block;
          margin-bottom: 6px;
        }

        /* Make actions buttons stack nicely */
        .table-buttons {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 8px;
          margin-top: 8px;
        }

        .table-buttons button {
          flex: 1 1 45%;
          min-width: 120px;
          font-size: 14px;
          padding: 10px;
        }

        .delete-btn {
          flex: unset;
          min-width: 40px;
          padding: 8px;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
      </ul>
    </div>
    <div id="overlay"></div>

    <div class="main-content">
      <header>
        <i id="bar" class="fa-solid fa-bars"></i>
        <div>Patients List</div>
        <button id="logoutBtn">Logout</button>
      </header>

      <table id="patientsTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Patient rows will be inserted here -->
        </tbody>
      </table>
    </div>

    <script>
      // Mobile sidebar toggle
      const bar = document.getElementById("bar");
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.getElementById("overlay");

      bar.addEventListener("click", function () {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", function () {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });

      // Access control: redirect to login if not admin
      window.addEventListener("DOMContentLoaded", () => {
        const role = localStorage.getItem("userRole");
        if (role !== "admin") {
          alert("Access denied. Admins only.");
          window.location.href = "login.html";
          return;
        }
        fetchPatients();
      });

      // Logout functionality
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("authToken");
        localStorage.removeItem("userRole");
        window.location.href = "login.html";
      });

      async function fetchPatients() {
        const token = localStorage.getItem("authToken");
        try {
          const res = await fetch("http://localhost:3000/api/admin/patients", {
            headers: { Authorization: "Bearer " + token },
          });
          const patients = await res.json();
          const tbody = document.querySelector("#patientsTable tbody");
          tbody.innerHTML = "";

          if (!Array.isArray(patients)) {
            if (res.status === 403) {
              alert("Session expired or unauthorized. Please login again.");
              window.location.href = "login.html";
              return;
            }
            console.error("Unexpected response:", patients);
            return;
          }
          patients.forEach((patient) => {
            const tr = document.createElement("tr");
            tr.setAttribute("data-id", patient._id); // <-- add this

            tr.innerHTML = `
        <td>${patient.email || ""}</td>
        <td>
    <span class="status-badge ${patient.isActive ? "active" : "inactive"}">
      ${patient.isActive ? "Active" : "Inactive"}
    </span>
  </td>
        <td>
            <button class="details-btn" data-id="${
              patient._id
            }" style="margin-right:10px;">
                <i class="fas fa-info-circle"></i> Show Details
            </button>
            ${
              patient.isActive
                ? `<button class="deactivate-btn" data-id="${patient._id}">
             <i class="fas fa-user-slash"></i> Deactivate
           </button>`
                : `<button class="activate-btn" data-id="${patient._id}">
             <i class="fas fa-user-check"></i> Activate
           </button>`
            }
            <button class="delete-btn" data-id="${patient._id}">
                <i class="fas fa-trash-alt"></i>
            </button>
        </td>
    `;

            tbody.appendChild(tr);
          });
          tbody.querySelectorAll(".deactivate-btn").forEach((button) => {
            button.addEventListener("click", (e) => {
              const id = e.currentTarget.dataset.id;
              if (confirm("Deactivate this account?")) deactivatePatient(id);
            });
          });

          tbody.querySelectorAll(".activate-btn").forEach((button) => {
            button.addEventListener("click", (e) => {
              const id = e.currentTarget.dataset.id;
              if (confirm("Activate this account?")) activatePatient(id);
            });
          });
          const urlParams = new URLSearchParams(window.location.search);
          const highlightId = urlParams.get("highlight");

          if (highlightId) {
            const rowToHighlight = document.querySelector(
              `tr[data-id="${highlightId}"]`
            );
            if (rowToHighlight) {
              rowToHighlight.style.backgroundColor = "#fff3cd"; // light yellow
              rowToHighlight.scrollIntoView({
                behavior: "smooth",
                block: "center",
              });

              // Optional: fade the highlight after a few seconds
              setTimeout(() => {
                rowToHighlight.style.transition = "background-color 2s ease";
                rowToHighlight.style.backgroundColor = "";
              }, 3000);
            }
          }

          // Add event listeners for dynamic buttons
          tbody.querySelectorAll(".details-btn").forEach((button) => {
            button.addEventListener("click", (e) => {
              const patientId = e.currentTarget.dataset.id;
              window.location.href = `patient-details.html?id=${patientId}`;
            });
          });

          // Add event listeners for delete buttons
          document.querySelectorAll(".delete-btn").forEach((button) => {
            button.addEventListener("click", async (e) => {
              const patientId = e.currentTarget.getAttribute("data-id");
              if (
                confirm("Are you sure you want to delete this patient profile?")
              ) {
                await deletePatient(patientId);
              }
            });
          });
        } catch (error) {
          console.error("Error fetching patients:", error);
        }
      }

      async function deletePatient(patientId) {
        const token = localStorage.getItem("authToken");
        try {
          const res = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}`,
            {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token },
            }
          );
          if (res.ok) {
            alert("Patient profile deleted successfully.");
            fetchPatients();
          } else {
            const errorData = await res.json();
            alert(
              "Failed to delete patient: " +
                (errorData.message || "Unknown error")
            );
          }
        } catch (error) {
          console.error("Error deleting patient:", error);
          alert("Error deleting patient profile.");
        }
      }
      async function deactivatePatient(patientId) {
        const token = localStorage.getItem("authToken");
        try {
          const res = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}/deactivate`,
            {
              method: "PATCH",
              headers: { Authorization: "Bearer " + token },
            }
          );
          if (res.ok) {
            alert("Patient account deactivated.");
            fetchPatients();
          } else {
            const data = await res.json();
            alert("Failed: " + data.message);
          }
        } catch (err) {
          console.error("Error:", err);
        }
      }

      async function activatePatient(patientId) {
        const token = localStorage.getItem("authToken");
        try {
          const res = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}/activate`,
            {
              method: "PATCH",
              headers: { Authorization: "Bearer " + token },
            }
          );
          if (res.ok) {
            alert("Patient account activated.");
            fetchPatients();
          } else {
            const data = await res.json();
            alert("Failed: " + data.message);
          }
        } catch (err) {
          console.error("Error:", err);
        }
      }

      // Scroll to top on page load
      window.addEventListener("load", () => {
        window.scrollTo(0, 0);
      });
    </script>
  </body>
</html>
