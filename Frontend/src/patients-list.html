<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patients List - DocAssist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f5f7fa;
        }
         /* Sidebar */
         .sidebar {
            width: 250px;
            min-width: 250px;
            max-width: 250px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .sidebar h2 {
            font-size: 24px;
            color: rgb(9, 102, 102);
            margin: 0 0 40px 20px;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .sidebar ul li {
            padding: 12px 20px;
            margin: 10px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            display: block;
            transition: background-color 0.3s ease, color 0.3s ease;
            border-radius: 6px;
            padding: 10px 15px;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active {
            background-color: #e8f0fe;
            color: #007bff;
            font-weight: bold;
        }


        h1 {
            color: #00796b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #00796b;
            color: white;
        }

        tr:hover {
            background-color: #e0f2f1;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>DocAssist</h2>
        <ul>
            <li><a href="Adminpanel.html">Dashboard</a></li>
            <li><a href="adminappoint.html">Appointments</a></li>
            <li><a href="add-doctors.html">Add Doctor</a></li>
            <li><a href="admindoclist.html">Doctors List</a></li>
            <li><a href="patients-list.html">Patients List</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>
    <script>
        // Load shared sidebar HTML into the container
        document.addEventListener('DOMContentLoaded', () => {
            fetch('admin-sidebar.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                })
                .catch(err => {
                    console.error('Failed to load sidebar:', err);
                });
        });
    </script>

    <main style="flex-grow: 1; padding: 20px; background-color: #f5f7fa; min-height: 100vh; overflow-y: auto;">
        <h1 style="color: #00796b;">Patients List</h1>
        <table id="patientsTable"
            style="width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; overflow: hidden;">
            <thead>
                <tr>
                    <th
                        style="padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: left; background-color: #00796b; color: white;">
                        Email</th>
                    <th
                        style="padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: left; background-color: #00796b; color: white;">
                        Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Patient rows will be inserted here -->
            </tbody>
        </table>
    </main>

    <script>
        // Access control: redirect to login if not admin
        window.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('userRole');
            if (role !== 'admin') {
                alert('Access denied. Admins only.');
                window.location.href = 'login.html';
                return;
            }
            fetchPatients();
        });

        async function fetchPatients() {
            const token = localStorage.getItem('authToken');
            try {
                const res = await fetch('http://localhost:3000/api/admin/patients', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const patients = await res.json();
                const tbody = document.querySelector('#patientsTable tbody');
                tbody.innerHTML = '';

                if (!Array.isArray(patients)) {
                    if (res.status === 403) {
                        alert('Session expired or unauthorized. Please login again.');
                        window.location.href = 'login.html';
                        return;
                    }
                    console.error('Unexpected response:', patients);
                    return;
                }
                patients.forEach(patient => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${patient.email || ''}</td>
                        <td><button class="delete-btn" data-id="${patient._id}">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                // Add event listeners for delete buttons
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', async (e) => {
                        const patientId = e.target.getAttribute('data-id');
                        if (confirm('Are you sure you want to delete this patient profile?')) {
                            await deletePatient(patientId);
                        }
                    });
                });
            } catch (error) {
                console.error('Error fetching patients:', error);
            }
        }

        async function deletePatient(patientId) {
            const token = localStorage.getItem('authToken');
            try {
                const res = await fetch(`http://localhost:3000/api/admin/patients/${patientId}`, {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (res.ok) {
                    alert('Patient profile deleted successfully.');
                    fetchPatients();
                } else {
                    const errorData = await res.json();
                    alert('Failed to delete patient: ' + (errorData.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error deleting patient:', error);
                alert('Error deleting patient profile.');
            }
        }
    </script>
    <script>
        // Scroll to top on page load to ensure patients list is visible
        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
        });
    </script>
</body>

</html>
