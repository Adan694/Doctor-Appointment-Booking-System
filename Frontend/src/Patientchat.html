<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      /* Your existing CSS styles remain the same */
      /* 🌐 Page layout */
      .chat-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 40px 15px;
      }

      /* 💬 Chat box container */
      .chat-container {
        width: 100%;
        max-width: 600px;
        height: 600px;
        background: white;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(22, 110, 107, 0.2);
        margin-top: 60px;
      }

      /* 🧭 Header */
      .chat-header {
        background: linear-gradient(135deg, #166e6b, #0e4745);
        color: #fff;
        padding: 15px 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        font-size: 18px;
      }

      .chat-header i {
        font-size: 18px;
        cursor: pointer;
        margin-right: 10px;
        transition: color 0.2s ease;
      }

      .chat-header i:hover {
        color: #c0f1ee;
      }

      /* 💬 Message area */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
      }

      /* 💬 Message row */
      .message-row {
        display: flex;
        align-items: flex-end;
        margin-bottom: 12px;
        gap: 8px;
        width: 100%;
      }

      .message-row.sent {
        justify-content: flex-end;
      }

      .message-row.received {
        justify-content: flex-start;
      }

      .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 15px;
        line-height: 1.4;
        word-wrap: break-word;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.25s ease;
      }

      .message-row.sent .message {
        background-color: #0e4745;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(22, 110, 107, 0.3);
      }

      .message-row.received .message {
        background-color: #e9f5f5;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      /* 👤 Avatar */
      .chat-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #e0f4f3;
        color: #166e6b;
        font-weight: 700;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }

      /* 🧍 Sender label */
      .sender-label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 2px;
        opacity: 0.8;
      }

      .message-row.sent .sender-label {
        color: #d1fffb;
        text-align: right;
      }

      .message-row.received .sender-label {
        color: #166e6b;
      }

      /* ✏️ Input area */
      .chat-input {
        display: flex;
        padding: 12px;
        border-top: 1px solid #ddd;
        background: #fff;
        gap: 10px;
      }

      .chat-input input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        outline: none;
        font-size: 15px;
      }

      .chat-input input:focus {
        border-color: #166e6b;
        box-shadow: 0 0 0 2px rgba(22, 110, 107, 0.15);
      }

      .chat-input button {
        background: #166e6b;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition:
          background 0.25s ease,
          transform 0.1s ease;
      }

      .chat-input button:hover {
        background: #145956;
        transform: translateY(-1px);
      }

      @keyframes slideUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 600px) {
        .chat-wrapper {
          padding: 20px;
        }
        .chat-container {
          height: 85vh;
          max-width: 100%;
          border-radius: 10px;
        }
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 20px;
        position: fixed;
        top: 0%;
        width: 100%;
        background-color: rgb(9, 102, 102);
        color: white;
        z-index: 1000;
        padding: 10px 20px;
      }

      nav ul {
        display: flex;
      }

      nav ul li {
        list-style: none;
      }

      nav ul li a {
        text-decoration: none;
        color: white;
        font-size: 20px;
        margin-inline: 20px;
      }

      nav ul li a:hover {
        color: black;
        border-bottom: 2px solid black;
      }
      .logo {
        display: flex;
        align-items: center;
        font-size: 20px;
        margin: 0;
      }

      .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
      }

      .logo h1 {
        font-size: 30px;
        margin: 0;
      }

      .logo img:hover {
        transform: scale(1.1) rotate(-5deg);
      }

      .timestamp {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 4px;
        text-align: right;
      }

      .message-sending {
        opacity: 0.7;
      }

      .message-sent {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="images/Da.png" alt="DocAssist Logo" />
        <h1>DocAssist</h1>
      </div>
      <i id="bar" class="fa-solid fa-bars"></i>
      <ul>
        <li>
          <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </li>
        <li>
          <a href="Alldoctorsreal.html"
            ><i class="fas fa-user-md"></i> Find a Doctor</a
          >
        </li>
        <li>
          <a href="Contactus.html"
            ><i class="fas fa-envelope"></i> Contact Us</a
          >
        </li>
        <li>
          <a href="myappointments.html"
            ><i class="fas fa-calendar-check"></i> My Appointments</a
          >
        </li>
        <li>
          <a href="faqs.html"><i class="fas fa-question-circle"></i> FAQs</a>
        </li>
      </ul>
    </nav>
    <div id="navbar"></div>

    <div class="chat-wrapper">
      <div class="chat-container">
        <div class="chat-header">
          <i class="fa-solid fa-arrow-left" onclick="goBack()"></i>
          💬 Chat with Admin
        </div>

        <div id="messages" class="chat-messages"></div>

        <div class="chat-input">
          <input id="msgInput" type="text" placeholder="Type your message..." />
          <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <div id="footer"></div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:3000");

      const userId = localStorage.getItem("patientId");
      const role = localStorage.getItem("userRole") || "patient";
      const receiverId = "689f5be6e5432f608d4b3a54"; // replace with actual admin ID
      const chatBox = document.getElementById("messages");
      const msgInput = document.getElementById("msgInput");

      let lastRenderedDate = null; // Track last date for separators

      function formatChatDate(date) {
        const d = new Date(date);
        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(today.getDate() - 1);

        if (d.toDateString() === today.toDateString()) return "Today";
        if (d.toDateString() === yesterday.toDateString()) return "Yesterday";

        return d.toLocaleDateString(undefined, {
          day: "numeric",
          month: "long",
          year: "numeric",
        });
      }

      // join room for live updates
      socket.emit("join_user", { userId });

      // load previous chat
      fetch(`http://localhost:3000/api/chats/${userId}`)
        .then((res) => res.json())
        .then((chats) => chats.forEach(addMessage))
        .catch((err) => console.error(err));

      // send message
      function sendMessage() {
        const msg = msgInput.value.trim();
        if (!msg) return;

        socket.emit("send_message", {
          senderId: userId,
          senderRole: role,
          receiverId,
          receiverRole: "admin",
          message: msg,
        });

        msgInput.value = "";
      }

      // receive real-time messages
      socket.on("new_message", (msg) => {
        if (msg.senderId === userId || msg.receiverId === userId) {
          addMessage(msg);
        }
      });

      // render message
      function addMessage(msg) {
        const div = chatBox;

        const msgDate = formatChatDate(msg.createdAt || msg.updatedAt);

        // Add date separator if day changed
        if (msgDate !== lastRenderedDate) {
          lastRenderedDate = msgDate;
          const sep = document.createElement("div");
          sep.style.textAlign = "center";
          sep.style.fontSize = "12px";
          sep.style.margin = "10px 0";
          sep.style.color = "#555";
          sep.textContent = `— ${msgDate} —`;
          div.appendChild(sep);
        }

        // Create message row
        const row = document.createElement("div");
        row.classList.add("message-row");
        row.classList.add(msg.senderId === userId ? "sent" : "received");

        // Message container
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message");
        messageDiv.innerHTML = `
      <div class="sender-label">${msg.senderId === userId ? "You" : msg.senderRole || "Admin"}</div>
      <p>${msg.message}</p>
      <div class="timestamp">${new Date(
        msg.createdAt || msg.updatedAt,
      ).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
    `;

        row.appendChild(messageDiv);
        div.appendChild(row);

        div.scrollTop = div.scrollHeight;
      }

      msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      // Optional: you can uncomment if you have a send button
      // sendBtn.addEventListener("click", sendMessage);
    </script>
  </body>
</html>
