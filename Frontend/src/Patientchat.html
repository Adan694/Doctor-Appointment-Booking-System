<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      /* Your existing CSS styles remain the same */
      /* 🌐 Page layout */
      .chat-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 40px 15px;
      }

      /* 💬 Chat box container */
      .chat-container {
        width: 100%;
        max-width: 600px;
        height: 600px;
        background: white;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(22, 110, 107, 0.2);
        margin-top: 60px;
      }

      /* 🧭 Header */
      .chat-header {
        background: linear-gradient(135deg, #166e6b, #0e4745);
        color: #fff;
        padding: 15px 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        font-size: 18px;
      }

      .chat-header i {
        font-size: 18px;
        cursor: pointer;
        margin-right: 10px;
        transition: color 0.2s ease;
      }

      .chat-header i:hover {
        color: #c0f1ee;
      }

      /* 💬 Message area */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
      }

      /* 💬 Message row */
      .message-row {
        display: flex;
        align-items: flex-end;
        margin-bottom: 12px;
        gap: 8px;
        width: 100%;
      }

      .message-row.sent {
        justify-content: flex-end;
      }

      .message-row.received {
        justify-content: flex-start;
      }

      .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 15px;
        line-height: 1.4;
        word-wrap: break-word;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.25s ease;
      }

      .message-row.sent .message {
        background-color: #0e4745;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(22, 110, 107, 0.3);
      }

      .message-row.received .message {
        background-color: #e9f5f5;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      /* 👤 Avatar */
      .chat-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #e0f4f3;
        color: #166e6b;
        font-weight: 700;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }

      /* 🧍 Sender label */
      .sender-label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 2px;
        opacity: 0.8;
      }

      .message-row.sent .sender-label {
        color: #d1fffb;
        text-align: right;
      }

      .message-row.received .sender-label {
        color: #166e6b;
      }

      /* ✏️ Input area */
      .chat-input {
        display: flex;
        padding: 12px;
        border-top: 1px solid #ddd;
        background: #fff;
        gap: 10px;
      }

      .chat-input input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        outline: none;
        font-size: 15px;
      }

      .chat-input input:focus {
        border-color: #166e6b;
        box-shadow: 0 0 0 2px rgba(22, 110, 107, 0.15);
      }

      .chat-input button {
        background: #166e6b;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.25s ease, transform 0.1s ease;
      }

      .chat-input button:hover {
        background: #145956;
        transform: translateY(-1px);
      }

      @keyframes slideUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 600px) {
        .chat-wrapper {
          padding: 20px;
        }
        .chat-container {
          height: 85vh;
          max-width: 100%;
          border-radius: 10px;
        }
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 20px;
        position: fixed;
        top: 0%;
        width: 100%;
        background-color: rgb(9, 102, 102);
        color: white;
        z-index: 1000;
        padding: 10px 20px;
      }

      nav ul {
        display: flex;
      }

      nav ul li {
        list-style: none;
      }

      nav ul li a {
        text-decoration: none;
        color: white;
        font-size: 20px;
        margin-inline: 20px;
      }

      nav ul li a:hover {
        color: black;
        border-bottom: 2px solid black;
      }
      .logo {
        display: flex;
        align-items: center;
        font-size: 20px;
        margin: 0;
      }

      .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
      }

      .logo h1 {
        font-size: 30px;
        margin: 0;
      }

      .logo img:hover {
        transform: scale(1.1) rotate(-5deg);
      }

      .timestamp {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 4px;
        text-align: right;
      }

      .message-sending {
        opacity: 0.7;
      }

      .message-sent {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="images/Da.png" alt="DocAssist Logo" />
        <h1>DocAssist</h1>
      </div>
      <i id="bar" class="fa-solid fa-bars"></i>
      <ul>
        <li>
          <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </li>
        <li>
          <a href="Alldoctorsreal.html"
            ><i class="fas fa-user-md"></i> Find a Doctor</a
          >
        </li>
        <li>
          <a href="Contactus.html"
            ><i class="fas fa-envelope"></i> Contact Us</a
          >
        </li>
        <li>
          <a href="myappointments.html"
            ><i class="fas fa-calendar-check"></i> My Appointments</a
          >
        </li>
        <li>
          <a href="faqs.html"><i class="fas fa-question-circle"></i> FAQs</a>
        </li>
      </ul>
    </nav>
    <div id="navbar"></div>

    <div class="chat-wrapper">
      <div class="chat-container">
        <div class="chat-header">
          <i class="fa-solid fa-arrow-left" onclick="goBack()"></i>
          💬 Chat with Admin
        </div>

        <div id="messages" class="chat-messages"></div>

        <div class="chat-input">
          <input id="msgInput" type="text" placeholder="Type your message..." />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <div id="footer"></div>

    <script>
      const BASE_URL = "http://localhost:3000/api/chats";
      const ADMIN_ID = "689f5be6e5432f608d4b3a54";

      let token = localStorage.getItem("authToken");
      let currentUserId = localStorage.getItem("patientId");
      let currentUserName = localStorage.getItem("patientName") || "Patient";

      if (!currentUserId) {
        alert("Login required!");
        window.location.href = "/login.html";
      }

      // 🚀 Socket connection
      const socket = io("http://localhost:3000", {
        auth: {
          token,
          role: "patient",
          email: localStorage.getItem("patientEmail") || "unknown",
        },
      });

      // Store temporary messages until they're confirmed
      const pendingMessages = new Map();

      // Socket event listeners
      socket.on("connect", () => {
        console.log("✅ Socket connected:", socket.id);
        loadMessages(); // Load messages when connected
      });

      socket.on("connect_error", (err) => {
        console.error("❌ Socket connection error:", err.message);
      });

      socket.on("disconnect", (reason) => {
        console.log("⚠️ Socket disconnected:", reason);
      });

      // ✅ CRITICAL: Listen for incoming messages from admin
      socket.on("receive_message", (message) => {
        console.log("📨 New message received from admin:", message);
        addMessageToUI(message, false);
      });

      // ✅ Listen for message confirmation (when our sent message is saved)
      socket.on("message_sent", (message) => {
        console.log("✅ Message confirmed by server:", message);
        // Update the pending message with the actual saved message
        const tempId = Object.keys(pendingMessages).find(
          (key) => pendingMessages[key].message === message.message
        );
        if (tempId) {
          // Replace the temporary message with the actual saved one
          updatePendingMessage(tempId, message);
        }
      });

      // Load chat history from database
      function loadMessages() {
        console.log("📖 Loading messages from database...");
        fetch(`${BASE_URL}/${currentUserId}/${ADMIN_ID}`, {
          headers: { Authorization: "Bearer " + token },
        })
          .then((res) => {
            if (!res.ok) {
              throw new Error("Failed to fetch messages");
            }
            return res.json();
          })
          .then((messages) => {
            console.log("✅ Messages loaded from DB:", messages.length);
            displayMessages(messages);
          })
          .catch((err) => {
            console.error("❌ Cannot load messages:", err);
            const box = document.getElementById("messages");
            box.innerHTML =
              '<div style="text-align: center; padding: 20px; color: #666;">Failed to load messages. Please refresh.</div>';
          });
      }

      function displayMessages(messages) {
        const box = document.getElementById("messages");
        box.innerHTML = "";

        if (messages.length === 0) {
          box.innerHTML =
            '<div style="text-align: center; padding: 20px; color: #666;">No messages yet. Start the conversation!</div>';
          return;
        }

        // Sort messages by timestamp
        messages.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

        messages.forEach((msg) => addMessageToUI(msg, false));
        box.scrollTop = box.scrollHeight;
      }

      function addMessageToUI(msg, isPending = false) {
        const box = document.getElementById("messages");

        // Remove "no messages" placeholder if it exists
        if (box.innerHTML.includes("No messages yet")) {
          box.innerHTML = "";
        }

        const messageId = msg._id || `temp-${Date.now()}-${Math.random()}`;
        const row = document.createElement("div");
        row.id = `msg-${messageId}`;
        row.className = `message-row ${
          msg.senderId === currentUserId ? "sent" : "received"
        } ${isPending ? "message-sending" : "message-sent"}`;

        const avatar =
          msg.senderId === currentUserId ? currentUserName.charAt(0) : "A";
        const senderName = msg.senderId === currentUserId ? "You" : "Admin";

        row.innerHTML = `
          <div class="chat-avatar">${avatar}</div>
          <div class="message">
            <div class="sender-label">${senderName}</div>
            <div class="message-text">${msg.message}</div>
            <div class="timestamp">
              ${new Date(msg.createdAt || Date.now()).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              })}
              ${isPending ? "⏳" : ""}
            </div>
          </div>
        `;

        box.appendChild(row);
        box.scrollTop = box.scrollHeight;

        // Store pending message
        if (isPending) {
          pendingMessages[messageId] = msg;
        }
      }

      function updatePendingMessage(tempId, savedMessage) {
        const row = document.getElementById(`msg-${tempId}`);
        if (row) {
          row.className = row.className.replace(
            "message-sending",
            "message-sent"
          );
          const timestamp = row.querySelector(".timestamp");
          if (timestamp) {
            timestamp.innerHTML = new Date(
              savedMessage.createdAt
            ).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
          }
        }
        // Remove from pending
        delete pendingMessages[tempId];
      }

      function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text) return;

        const msgObj = {
          senderId: currentUserId,
          receiverId: ADMIN_ID,
          message: text,
        };

        console.log("📤 Sending message:", msgObj);

        // Show instantly (optimistic update)
        const tempMsg = {
          ...msgObj,
          _id: `temp-${Date.now()}`,
          createdAt: new Date(),
        };
        addMessageToUI(tempMsg, true);

        // Send to server via HTTP POST to ensure persistence
        fetch(`${BASE_URL}/send`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify(msgObj),
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to send message");
            }
            return response.json();
          })
          .then((result) => {
            console.log("✅ Message saved to database:", result);
            // Also send via socket for real-time delivery
            socket.emit("send_message", msgObj);

            // Update the UI with the actual saved message
            updatePendingMessage(tempMsg._id, result.chat);
          })
          .catch((error) => {
            console.error("❌ Failed to send message:", error);
            // Show error in UI
            const row = document.getElementById(`msg-${tempMsg._id}`);
            if (row) {
              const timestamp = row.querySelector(".timestamp");
              if (timestamp) {
                timestamp.innerHTML = "❌ Failed to send";
                timestamp.style.color = "red";
              }
            }
          });

        input.value = "";
      }

      // Send message on Enter key
      document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      function goBack() {
        window.location.href = "myprofile.html";
      }

      // Debug: Log socket events
      socket.onAny((event, ...args) => {
        console.log(`🔍 Socket event: ${event}`, args);
      });

      // Periodic message sync (in case of missed messages)
      setInterval(() => {
        loadMessages();
      }, 30000); // Sync every 30 seconds
    </script>
  </body>
</html>
