<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>Doctor Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        background-color: #e6f2ff;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 20px;
        position: fixed;
        top: 0;
        width: 100%;
        background-color: rgb(9, 102, 102);
        color: white;
        z-index: 1000;
      }

      .logo {
        display: flex;
        align-items: center;
        font-size: 20px;
        margin: 0;
      }

      .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .logo img:hover {
        transform: scale(1.1) rotate(-5deg);
      }

      .logo h1 {
        font-size: 28px;
        background: linear-gradient(45deg, #ffffff, #cceeff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      nav ul {
        display: flex;
      }

      nav ul li {
        list-style: none;
        margin-top: 15px;
      }

      nav ul li a {
        text-decoration: none;
        color: white;
        font-size: 20px;
        margin-inline: 20px;
        transition: color 0.3s ease;
      }

      nav ul li a:hover {
        color: black;
      }

      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
      }

      .main-content {
        flex: 1;
        padding: 30px;
        background-color: #ffffff;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        margin: 40px;
        margin-top: 120px;
        border: 1px solid #e0e0e0;
        transition: box-shadow 0.3s ease, transform 0.3s ease, border 0.3s ease;
      }

      .main-content:hover {
        border: 1px solid #007b7b;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        transform: scale(1.01);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px;
        background-color: rgb(9, 102, 102);
        color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        border-radius: 12px;
        transition: background-color 0.3s ease;
      }

      .header:hover {
        background-color: #007b7b;
      }

      .header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .main-content h2 {
        margin-top: 24px;
        font-size: 22px;
        border-bottom: 3px solid #007bff;
        padding-bottom: 12px;
        color: #343a40;
        font-weight: 600;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin: 20px 0;
      }

      .stat-card {
        background: #fff;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease,
          background 0.3s ease;
        border: 1px solid #e0e0e0;
        cursor: pointer;
      }

      .stat-card:hover {
        transform: translateY(-6px) scale(1.03);
        box-shadow: 0 8px 25px rgba(0, 123, 255, 0.25);
        background: #f0faff;
        border-color: #007b7b;
      }

      .stat-card i {
        font-size: 40px;
        margin-bottom: 12px;
        color: #007b7b;
        transition: color 0.3s ease, transform 0.3s ease;
      }

      .stat-card:hover i {
        color: #005f5f;
        transform: scale(1.2);
      }

      .stat-card h3 {
        font-size: 2rem;
        color: #2c3e50;
        margin: 5px 0;
      }

      .stat-card p {
        font-size: 1rem;
        color: #555;
        margin: 0;
      }

      .chart-section {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        margin: 30px 0;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        border: 1px solid #e0e0e0;
        transition: box-shadow 0.3s ease, transform 0.3s ease, border 0.3s ease;
      }

      .chart-section:hover {
        border: 1px solid #007b7b;
        box-shadow: 0 8px 22px rgba(0, 123, 255, 0.25);
        transform: scale(1.01);
      }

      .chart-section canvas {
        width: 100% !important;
        height: 300px !important;
      }

      .chart-section h2 {
        margin-bottom: 15px;
        font-size: 1.3rem;
        color: #2c3e50;
        text-align: left;
      }

      .latest-bookings {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 40px;
        border: 1px solid #e0e0e0;
        transition: box-shadow 0.3s ease, transform 0.3s ease, border 0.3s ease;
      }

      .latest-bookings:hover {
        border: 1px solid #007b7b;
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.25);
        transform: scale(1.01);
      }

      .latest-bookings h2 {
        margin-bottom: 15px;
        font-size: 1.3rem;
        color: #2c3e50;
      }

      .latest-bookings ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .latest-bookings li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        margin-bottom: 14px;
        border-left: 6px solid #007b7b;
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
        transition: all 0.3s ease;
      }

      .latest-bookings li:hover {
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
        background-color: #f0f8ff;
      }

      .booking-info {
        flex: 1;
        font-size: 16px;
        color: #212529;
      }

      .booking-actions {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .latest-bookings li button {
        background: transparent;
        color: red;
        border: none;
        cursor: pointer;
        font-size: 22px;
        margin-left: 18px;
        transition: color 0.25s ease, transform 0.2s ease;
      }

      .latest-bookings li button:hover {
        color: darkred;
        transform: scale(1.2);
      }

      .status {
        padding: 4px 12px;
        border-radius: 6px;
        font-weight: 700;
        text-transform: capitalize;
        margin-left: auto;
        white-space: nowrap;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }

      .status.Missed {
        background-color: #f8d7da;
        color: #721c24;
      }

      .status.Completed {
        background-color: #d4edda;
        color: #155724;
      }

      .status.Cancelled {
        background-color: #f5c6cb;
        color: #721c24;
      }

      .status.Pending {
        background-color: #fff3cd;
        color: #856404;
      }

      .status:hover {
        filter: brightness(0.9);
      }

      @media (max-width: 576px) {
        nav ul li a {
          font-size: 16px;
          margin-inline: 10px;
        }

        nav ul li {
          text-align: center;
          padding: 10px 0;
        }

        .logo h1 {
          font-size: 22px;
        }

        .logo img {
          width: 40px;
          height: 40px;
        }

        .stat-card {
          flex: 1 1 100%;
        }

        .latest-bookings li {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .booking-actions {
          width: 100%;
          justify-content: space-between;
        }
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 20px;
        }

        .stat-card {
          padding: 15px;
        }

        .latest-bookings li {
          padding: 10px;
        }

        .booking-info,
        .status {
          font-size: 14px;
        }

        nav {
          flex-direction: column;
          align-items: flex-start;
          padding: 20px;
        }

        nav ul {
          flex-direction: column;
          width: 100%;
          position: absolute;
          top: 60px;
          left: 0;
          background-color: rgb(9, 102, 102);
          overflow: hidden;
          max-height: 0;
          opacity: 0;
          transition: max-height 0.4s ease, opacity 0.4s ease;
        }

        nav ul.show {
          max-height: 300px;
          opacity: 1;
        }

        nav ul li {
          padding: 10px 0;
          text-align: center;
        }

        nav ul li a {
          font-size: 16px;
          margin: 5px 0;
        }

        #bar {
          display: block;
          position: absolute;
          right: 50px;
          top: 20px;
        }
      }

      @media (max-width: 1024px) {
        .stat-card {
          flex: 1 1 45%;
        }
      }

      #chatBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #166e6b;
        color: white;
        border: none;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      #chatNotification {
        position: absolute;
        top: -5px;
        right: -5px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 2px 5px;
        border-radius: 50%;
        display: none;
      }

      .doctor-status {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 1001;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .doctor-status.online {
        background: #2ecc71;
        color: white;
      }

      .doctor-status.offline {
        background: #e74c3c;
        color: white;
      }

      .doctor-status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="images/Da.png" alt="DocAssist Logo" />
        <h1>DocAssist</h1>
      </div>
      <i id="bar" class="fa-solid fa-bars"></i>
      <ul>
        <li><a href="docpanel.html">Dashboard</a></li>
        <li><a href="DocAppointment.html">Appointments</a></li>
        <li><a href="docprofile.html">Profile</a></li>
        <li><a href="docavailability.html">Manage Availability</a></li>
        <li><a href="Docfeedback.html">Feedback</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </nav>

    <!-- Doctor Online Status Indicator -->
    <div id="doctorStatusIndicator" class="doctor-status offline">
      <span class="doctor-status-indicator"></span>
      <span>Offline</span>
    </div>

    <main class="main-content">
      <section class="stats">
        <div class="stat-card" id="appointments-card">
          <i class="fas fa-clock"></i>
          <h3>0</h3>
          <p>Pending Appointments</p>
        </div>
        <div class="stat-card" id="patients-card">
          <i class="fas fa-users"></i>
          <h3>0</h3>
          <p>Total Patients</p>
        </div>
        <div class="stat-card" id="today-card">
          <i class="fas fa-calendar-day"></i>
          <h3>0</h3>
          <p>Today's Appointments</p>
        </div>
        <div class="stat-card" id="completed-card">
          <i class="fas fa-check-circle"></i>
          <h3>0</h3>
          <p>Completed This Month</p>
        </div>
      </section>

      <section class="chart-section">
        <h2>Weekly Appointment Trend</h2>
        <canvas id="appointmentChart"></canvas>
      </section>

      <section class="latest-bookings">
        <h2>Latest Bookings</h2>
        <ul id="booking-list"></ul>
      </section>
    </main>

    <!-- Floating Chat Button -->
    <button id="chatBtn">💬<span id="chatNotification">0</span></button>

    <script>
      console.log("===========================================");
      console.log("🩺 DOCTOR PANEL INITIALIZING");
      console.log("===========================================");

      const backendURL = "http://localhost:3000";
      const doctorId = localStorage.getItem("doctorId");
      const token = localStorage.getItem("authToken");
      const chatNotificationEl = document.getElementById("chatNotification");
      const chatBtn = document.getElementById("chatBtn");
      const statusIndicator = document.getElementById("doctorStatusIndicator");

      let unreadCount = 0;
      let appointmentsCount = 0;
      let patientsCount = 0;
      let chart;
      let socket = null;

      // ------------------- SOCKET CONNECTION MANAGER -------------------
      function initializeSocketConnection() {
        console.log("🔌 Initializing socket connection...");

        if (!doctorId || !token) {
          console.error("❌ Missing doctor credentials for socket connection");
          updateStatusIndicator(false);
          return;
        }

        // Close existing socket if any
        if (socket && socket.connected) {
          console.log("🔄 Disconnecting existing socket...");
          socket.disconnect();
        }

        // Create new socket connection
        socket = io("http://localhost:3000", {
          auth: {
            token: token,
            role: "doctor",
            userId: doctorId,
            email: localStorage.getItem("userEmail"),
            name: "Doctor",
          },
          transports: ["websocket", "polling"],
          reconnection: true,
          reconnectionAttempts: 3,
          reconnectionDelay: 1000,
        });

        // Socket Event Handlers
        socket.on("connect", () => {
          console.log("✅✅✅ SOCKET CONNECTED!");
          console.log("📊 Connection Details:", {
            socketId: socket.id,
            doctorId: doctorId,
            connected: true,
          });

          localStorage.setItem("socketId", socket.id);
          updateStatusIndicator(true);

          // Join doctor's room
          socket.emit("join", doctorId);
          console.log("📢 Joined room:", doctorId);

          // Emit doctor online status
          socket.emit("doctor_online", {
            doctorId: doctorId,
            timestamp: Date.now(),
            name: "Doctor",
          });
          console.log("📢 Emitted doctor_online event");
        });

        socket.on("disconnect", (reason) => {
          console.log("❌ Socket disconnected:", reason);
          updateStatusIndicator(false);
        });

        socket.on("connect_error", (error) => {
          console.error("❌ Socket connection error:", error);
          updateStatusIndicator(false);
        });

        socket.on("receive_message", (msg) => {
          console.log("📩 New message received via socket:", msg);
          if (
            msg.receiverId.toString() === doctorId &&
            msg.senderId.toString() !== doctorId
          ) {
            unreadCount++;
            updateChatNotification();
            console.log("📈 Unread count increased to:", unreadCount);
          }
        });

        socket.on("userStatusUpdate", (data) => {
          console.log("📢 User status update:", data);
        });

        socket.on("reconnect", (attemptNumber) => {
          console.log(`🔄 Reconnected after ${attemptNumber} attempts`);
          updateStatusIndicator(true);
        });

        // Store socket globally
        window.userSocket = socket;
      }

      function updateStatusIndicator(isOnline) {
        if (isOnline) {
          statusIndicator.className = "doctor-status online";
          statusIndicator.innerHTML =
            '<span class="doctor-status-indicator" style="background: white;"></span><span>Online</span>';
          console.log("🟢 Doctor status: Online");
        } else {
          statusIndicator.className = "doctor-status offline";
          statusIndicator.innerHTML =
            '<span class="doctor-status-indicator" style="background: white;"></span><span>Offline</span>';
          console.log("🔴 Doctor status: Offline");
        }
      }

      function updateChatNotification() {
        if (unreadCount > 0) {
          chatNotificationEl.style.display = "inline";
          chatNotificationEl.textContent = unreadCount > 9 ? "9+" : unreadCount;
        } else {
          chatNotificationEl.style.display = "none";
        }
      }

      // ------------------- CHAT FUNCTIONS -------------------
      async function fetchUnreadMessages() {
        console.log("📥 Fetching unread messages...");
        try {
          const res = await fetch(
            `${backendURL}/api/doctor-chats/unread?doctorId=${doctorId}`,
            {
              headers: { Authorization: `Bearer ${token}` },
            }
          );

          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          unreadCount = Array.isArray(data) ? data.length : 0;
          updateChatNotification();
          console.log("📊 Unread count:", unreadCount);
        } catch (err) {
          console.error("❌ Failed to fetch unread messages:", err);
        }
      }

      async function markMessagesAsRead() {
        console.log("📝 Marking messages as read...");
        try {
          const res = await fetch(
            `${backendURL}/api/doctor-chats/mark-read?doctorId=${doctorId}`,
            {
              method: "POST",
              headers: { Authorization: `Bearer ${token}` },
            }
          );

          if (!res.ok)
            throw new Error(`Error marking messages read: ${res.status}`);

          unreadCount = 0;
          updateChatNotification();
          console.log("✅ Messages marked as read");
        } catch (err) {
          console.error("❌ Error marking messages:", err);
        }
      }

      // ------------------- CHAT BUTTON -------------------
      chatBtn.addEventListener("click", async () => {
        console.log("💬 Chat button clicked");
        await markMessagesAsRead();
        window.location.href = "doctorchat.html";
      });

      // ------------------- NAV TOGGLE -------------------
      document.getElementById("bar").addEventListener("click", function () {
        console.log("🍔 Menu bar clicked");
        document.querySelector("nav ul").classList.toggle("show");
      });

      // ------------------- BOOKINGS & STATS -------------------
      async function loadBookings() {
        console.log("📅 Loading bookings from backend...");
        try {
          const response = await fetch(`${backendURL}/api/appointments/all`);
          if (!response.ok) throw new Error(`Error ${response.status}`);
          const data = await response.json();

          const bookings = (Array.isArray(data) ? data : []).filter(
            (b) => b.doctorId?._id === doctorId
          );

          localStorage.setItem("bookings", JSON.stringify(bookings));
          renderBookings(bookings);
        } catch (error) {
          console.error("❌ Failed to load bookings:", error);
        }
      }

      function renderBookings(bookings) {
        console.log("📊 Rendering bookings and stats");

        const removedIds =
          JSON.parse(localStorage.getItem("removedBookingIds")) || [];
        const pendingAppointments = bookings.filter(
          (b) =>
            b.status?.toLowerCase() === "pending" && !removedIds.includes(b._id)
        );

        const today = new Date().toDateString();
        const todayAppointments = bookings.filter(
          (b) => new Date(b.date).toDateString() === today
        );

        const completedThisMonth = bookings.filter((b) => {
          const d = new Date(b.date);
          const now = new Date();
          const status = b.status?.toLowerCase();
          return (
            (status === "complete" || status === "completed") &&
            d.getMonth() === now.getMonth() &&
            d.getFullYear() === now.getFullYear()
          );
        });

        const uniquePatients = new Set(
          bookings.map((b) => b.patientId?._id).filter(Boolean)
        );

        appointmentsCount = pendingAppointments.length;
        patientsCount = uniquePatients.size;

        // Update stats cards
        document
          .getElementById("appointments-card")
          .querySelector("h3").innerText = appointmentsCount;
        document.getElementById("patients-card").querySelector("h3").innerText =
          patientsCount;
        document.getElementById("today-card").querySelector("h3").innerText =
          todayAppointments.length;
        document
          .getElementById("completed-card")
          .querySelector("h3").innerText = completedThisMonth.length;

        // Update latest bookings
        const latestPending = pendingAppointments
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, 5);

        const bookingList = document.getElementById("booking-list");
        bookingList.innerHTML = "";
        latestPending.forEach((booking) => {
          const name = booking.name || booking.patientId?.name || "Unknown";
          const readableDate = new Date(booking.date).toLocaleDateString();
          addBookingToList(name, readableDate, booking.status);
        });

        updateChart(bookings);
      }

      function addBookingToList(patientName, bookingDate, bookingStatus) {
        const newBooking = document.createElement("li");
        newBooking.innerHTML = `
                <div class="booking-info">
                    <strong>${patientName}</strong> - Booking on ${bookingDate}
                </div>
                <div class="booking-actions">
                    <span class="status ${bookingStatus}">${capitalizeFirstLetter(
          bookingStatus
        )}</span>
                </div>
            `;
        document.getElementById("booking-list").appendChild(newBooking);
      }

      function capitalizeFirstLetter(str) {
        return str ? str.charAt(0).toUpperCase() + str.slice(1) : "";
      }

      // ------------------- CHART -------------------
      function updateChart(bookings) {
        console.log("📈 Updating chart");
        const now = new Date();
        const daysBack = 7;
        const counts = {};

        for (let i = daysBack - 1; i >= 0; i--) {
          const d = new Date();
          d.setDate(now.getDate() - i);
          const dateStr = d.toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
          });
          counts[dateStr] = 0;
        }

        bookings.forEach((b) => {
          const d = new Date(b.date);
          const dateStr = d.toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
          });
          if (counts[dateStr] !== undefined) {
            counts[dateStr] += 1;
          }
        });

        const ctx = document
          .getElementById("appointmentChart")
          .getContext("2d");
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: Object.keys(counts),
            datasets: [
              {
                label: "Appointments",
                data: Object.values(counts),
                backgroundColor: "#4CAF50",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } },
          },
        });
      }

      // ------------------- LOGOUT -------------------
      function logout() {
        console.log("🚪 Logging out...");

        // Emit offline status before leaving
        if (socket && socket.connected) {
          socket.emit("doctor_offline", {
            doctorId: doctorId,
            timestamp: Date.now(),
          });
          socket.disconnect();
        }

        // Clear local storage
        localStorage.removeItem("authToken");
        localStorage.removeItem("doctorId");
        localStorage.removeItem("userId");
        localStorage.removeItem("userRole");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("socketId");

        // Redirect to login
        window.location.href = "login.html";
      }

      // ------------------- INITIALIZATION -------------------
      document.addEventListener("DOMContentLoaded", async function () {
        console.log("🌐 DOM fully loaded");
        console.log("📋 Session Data:", {
          doctorId: doctorId,
          hasToken: !!token,
          userEmail: localStorage.getItem("userEmail"),
        });

        // Check if doctor is logged in
        if (!doctorId || !token) {
          console.error("❌ Doctor not logged in - redirecting to login");
          window.location.href = "login.html";
          return;
        }

        // Initialize socket connection
        initializeSocketConnection();

        // Fetch initial data
        await fetchUnreadMessages();
        await loadBookings();

        console.log("✅ Doctor panel initialization complete");
      });

      // Cleanup on page unload
      window.addEventListener("beforeunload", function () {
        console.log("🧹 Page unloading - cleaning up...");
        // Note: We're NOT disconnecting socket here to maintain online status
        // The socket will handle disconnection naturally
      });
    </script>
  </body>
</html>
