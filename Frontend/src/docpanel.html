<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Doctor Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
    background-color: #e6f2ff;
        }

       
           nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 20px;
    position: fixed;
    top: 0%;
    width: 100%;
    left: 0; 
    background-color: rgb(9, 102, 102);
    color: white;
    z-index: 1000;
    padding: 10px 20px;
}

nav ul {
    display: flex;
}

nav ul li {
    list-style: none;
}

nav ul li a {
    text-decoration: none;
    color: white;
    font-size: 20px;
    margin-inline: 20px;
}

nav ul li a:hover {
    color: black;
    border-bottom: 2px solid black;
}

#bar {
    display: none;
    font-size: 30px;
    cursor: pointer;
}

.logo {
    display: flex;
    align-items: center;
    font-size: 20px;
    margin: 0;
}

.logo img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-right: 10px;
    object-fit: cover;
}

.logo h1 {
    font-size: 30px;
    margin: 0;
}

.logo img:hover {
    transform: scale(1.1) rotate(-5deg);
}

.logo h1 {
    font-size: 28px;
    background: linear-gradient(45deg, #ffffff, #cceeff);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
       .main-content {
    flex: 1;
    padding: 20px;
    background-color: #ffffff;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    border-radius: 12px;
    transition: box-shadow 0.3s ease;
}
.main-content:hover {
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background-color: rgb(9, 102, 102);
    color: white;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    border-radius: 12px;
    transition: background-color 0.3s ease;
}
.header:hover {
    background-color: #007b7b;
}

.header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.05em;
    user-select: none;
}

.main-content h2 {
    margin-top: 24px;
    font-size: 22px;
    border-bottom: 3px solid #007bff;
    padding-bottom: 12px;
    color: #343a40;
    font-weight: 600;
    user-select: none;
}

.stats {
    display: flex;
    justify-content: space-around;
    gap: 24px;
    margin: 24px 0;
    flex-wrap: wrap;
}

.stat-card {
    flex: 1 1 220px;
    background-color: #f9f9f9;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
    cursor: default;
    transition: box-shadow 0.3s ease, transform 0.3s ease, background-color 0.3s ease;
    border: 2px solid transparent;
}
.stat-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    background-color: #e0f0ff;
    border-color: #007bff;
}

.latest-bookings {
    margin-top: 28px;
}

.latest-bookings h2 {
    margin-bottom: 16px;
    font-weight: 600;
    color: #212529;
    user-select: none;
}

.latest-bookings ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.latest-bookings li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    margin-bottom: 14px;
    border-left: 6px solid #007bff;
    background-color: #ffffff;
    border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    transition: box-shadow 0.3s ease, background-color 0.3s ease, border-left-color 0.3s ease;
    cursor: default;
}
.latest-bookings li:hover {
    box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
    background-color: #f0f8ff;
    border-left-color: #0056b3;
}

.booking-info {
    flex: 1;
    font-size: 16px;
    color: #212529;
    user-select: text;
}

.booking-actions {
    display: flex;
    align-items: center;
    gap: 14px;
}

.latest-bookings li button {
    background: transparent;
    color: red;
    border: none;
    cursor: pointer;
    font-size: 22px;
    margin-left: 18px;
    transition: color 0.25s ease, transform 0.2s ease;
    user-select: none;
}
.latest-bookings li button:hover {
    color: darkred;
    transform: scale(1.2);
}

#booking-list {
    display: block;
    padding: 0;
    margin: 0;
    list-style: none;
}

.status {
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 700;
    text-transform: capitalize;
    margin-left: auto;
    white-space: nowrap;
    user-select: none;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    transition: background-color 0.3s ease, color 0.3s ease;
}
.status.Missed {
    background-color: #f8d7da;
    color: #721c24;
}
.status.Completed {
    background-color: #d4edda;
    color: #155724;
}
.status.Cancelled {
    background-color: #f5c6cb;
    color: #721c24;
}
.status.Pending {
    background-color: #fff3cd;
    color: #856404;
}
.status:hover {
    filter: brightness(0.9);
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

   /* Extra small devices (phones, less than 576px) */
@media (max-width: 576px) {
    nav ul li a {
        font-size: 16px;
        margin-inline: 10px;
    }
    nav ul li{
        text-align: center;
        padding: 10px 0;
    }
    .logo h1 {
        font-size: 22px;
    }

    .logo img {
        width: 40px;
        height: 40px;
    }

    .stat-card {
        flex: 1 1 100%;
    }

    .latest-bookings li {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .booking-actions {
        width: 100%;
        justify-content: space-between;
    }
}

/* Small to medium devices (tablets and up to small laptops) */
@media (max-width: 768px) {
    .header h1 {
        font-size: 20px;
    }

    .stat-card {
        padding: 15px;
    }

    .latest-bookings li {
        padding: 10px;
    }

    .booking-info {
        font-size: 14px;
    }

    .status {
        font-size: 14px;
    }

    nav ul {
        display: none;
        flex-direction: column;
        background-color: rgb(9, 102, 102);
        position: absolute;
        top: 50px;
        transition: max-height 0.3s ease;
        left: 0;
        width: 100%;
        padding: 10px 0;
    }

    nav ul.show {
        display: flex;
    }

     #bar {
        display: block;
        position: absolute;
        right: 50px;
        top: 20px;
        font-size: 30px;
        cursor: pointer;
        z-index: 1001;
    }
}

/* Medium to large screens (up to 1024px) */
@media (max-width: 1024px) {
    .stat-card {
        flex: 1 1 45%;
    }
}


    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="images/Da.png" alt="DocAssist Logo">
            <h1>DocAssist</h1>
        </div>
        <i id="bar" class="fa-solid fa-bars"></i>
        <ul>
            <li><a href="docpanel.html">Dashboard</a></li>
            <li><a href="DocAppointment.html">Appointments</a></li>
            <li><a href="docprofile.html">Profile</a></li>
            <li><a href="Docfeedback.html">Feedback</a></li>
            <li><a href="login.html">Logout</a></li>

    
        </ul>
    </nav>
    <main class="main-content">
        <header class="header">
            <h1>Doctor Dashboard</h1>
        </header>
        <section class="stats">
            <div class="stat-card" id="appointments-card">
                <h3>0</h3>
                <p>Pending Appointments</p> <!-- changed label -->
            </div>
            <div class="stat-card" id="patients-card">
                <h3>0</h3>
                <p>Total Patients</p> <!-- changed label -->
            </div>
        </section>

        <section class="latest-bookings">
            <h2>Latest Bookings</h2>
            <ul id="booking-list"></ul> 
        </section>
    </main>
    </div>
    
   <script>
    document.getElementById('bar').addEventListener('click', function () {
            document.querySelector('nav ul').classList.toggle('show');
        });
    let appointmentsCount = 0;
    let patientsCount = 0;

   document.addEventListener('DOMContentLoaded', async function () {
        const logoutButton = document.getElementById('logoutBtn');
        if (logoutButton) {
            logoutButton.addEventListener('click', logout);
        }

        try {
            const response = await fetch('http://localhost:3000/api/appointments/all');
            const data = await response.json();
            const bookings = Array.isArray(data) ? data : [];

            // Save to localStorage
            localStorage.setItem('bookings', JSON.stringify(bookings));

            // Render only non-removed pending bookings
            renderBookings();

        } catch (error) {
            console.error("Failed to load bookings:", error);
        }
    });


    function addBookingToList(patientName, bookingDate, bookingStatus) {
            const newBooking = document.createElement('li');
            newBooking.innerHTML = `
        <div class="booking-info">
            <strong>${patientName}</strong> - Booking on ${bookingDate}
        </div>
        <div class="booking-actions">
            <span class="status ${bookingStatus}">${capitalizeFirstLetter(bookingStatus)}</span>
            <button onclick="removeBooking('${patientName}', '${bookingDate}')">&times;</button>
        </div>
    `;
            document.getElementById('booking-list').appendChild(newBooking);
        }


    function removeBooking(patientName, bookingDate) {
            if (!confirm("Do you want to remove this booking from the page?\n(Note: This won't cancel the appointment)")) {
                return;
            }

            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];

            // Find the booking to remove by name + date
            const removed = bookings.find(
            booking =>
                (booking.patientName || booking.patientId?.name) === patientName &&
                new Date(booking.date).toLocaleDateString() === bookingDate
        );


            if (!removed) return;

            // Store removed appointment ID in localStorage
            let removedIds = JSON.parse(localStorage.getItem('removedBookingIds')) || [];
            if (removed._id && !removedIds.includes(removed._id)) {
                removedIds.push(removed._id);
                localStorage.setItem('removedBookingIds', JSON.stringify(removedIds));
            }

            // Re-render the list after filtering again
            renderBookings();
        }
    function renderBookings() {
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let removedIds = JSON.parse(localStorage.getItem('removedBookingIds')) || [];

            // Filter only pending appointments, excluding removed ones
            const pendingAppointments = bookings.filter(
                b => b.status?.toLowerCase() === 'pending' && !removedIds.includes(b._id)
            );

            // Sort and take the latest 5
            const latestPending = pendingAppointments
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 5);

            // Count unique patients from non-removed bookings
            const uniquePatients = new Set(bookings.map(b => b.patientId?._id).filter(Boolean));

            // Update stats
            appointmentsCount = pendingAppointments.length;
            patientsCount = uniquePatients.size;
            updateCounts();

            // Re-render list
            const bookingList = document.getElementById('booking-list');
            bookingList.innerHTML = '';

            latestPending.forEach(booking => {
                // Use booking.name first (from form submission), fallback to patientId.name
                const name = booking.name || booking.patientId?.name || 'Unknown';
                const readableDate = new Date(booking.date).toLocaleDateString();
                addBookingToList(name, readableDate, booking.status);
            });
        }



    function updateCounts() {
        document.getElementById('appointments-card').querySelector('h3').innerText = appointmentsCount;
        document.getElementById('patients-card').querySelector('h3').innerText = patientsCount;

        localStorage.setItem('appointmentsCount', appointmentsCount);
        localStorage.setItem('patientsCount', patientsCount);
    }

    function capitalizeFirstLetter(str) {
        return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
    }

    function logout() {
        localStorage.removeItem('userRole');
        location.reload();
    }
</script>


    </body>
    
    </html>
