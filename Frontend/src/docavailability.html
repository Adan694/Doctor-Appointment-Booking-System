// Search functionality
// Enhanced search functionality - supports ANY date format
function searchDates() {
    const searchTerm = document.getElementById('searchDate').value.toLowerCase().trim();
    const rows = document.querySelectorAll('#availabilityTable tbody tr');
    let hasVisible = false;
    let bestMatchRow = null;
    let bestMatchScore = 0;
    
    rows.forEach(row => {
        const dateInput = row.querySelector('td:first-child input[type="date"]');
        if (!dateInput) return;
        
        const dateValue = dateInput.value;
        const dateObj = new Date(dateValue);
        
        // Create all possible searchable formats for this date
        const searchableFormats = [
            // Original date (YYYY-MM-DD)
            dateValue,
            // Display date in different formats
            dateObj.toLocaleDateString('en-US'), // MM/DD/YYYY
            dateObj.toLocaleDateString('en-GB'), // DD/MM/YYYY
            // Full month name
            dateObj.toLocaleDateString('en-US', { month: 'long' }).toLowerCase(),
            // Short month name
            dateObj.toLocaleDateString('en-US', { month: 'short' }).toLowerCase(),
            // Full day name
            dateObj.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase(),
            // Short day name
            dateObj.toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase(),
            // Day of month
            dateObj.getDate().toString(),
            // Month number
            (dateObj.getMonth() + 1).toString(),
            // Month with leading zero
            String(dateObj.getMonth() + 1).padStart(2, '0'),
            // Year
            dateObj.getFullYear().toString(),
            // Two-digit year
            dateObj.getFullYear().toString().slice(-2),
            // DD/MM/YYYY format
            `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`,
            // MM/DD/YYYY format
            `${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}/${dateObj.getFullYear()}`,
            // DD-MM-YYYY format
            `${String(dateObj.getDate()).padStart(2, '0')}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${dateObj.getFullYear()}`,
            // MM-DD-YYYY format
            `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}-${dateObj.getFullYear()}`,
            // Format like "15 May"
            `${dateObj.getDate()} ${dateObj.toLocaleDateString('en-US', { month: 'long' })}`.toLowerCase(),
            // Format like "May 15"
            `${dateObj.toLocaleDateString('en-US', { month: 'long' })} ${dateObj.getDate()}`.toLowerCase(),
            // Format like "15 May 2026"
            `${dateObj.getDate()} ${dateObj.toLocaleDateString('en-US', { month: 'long' })} ${dateObj.getFullYear()}`.toLowerCase(),
            // Format like "May 15, 2026"
            `${dateObj.toLocaleDateString('en-US', { month: 'long' })} ${dateObj.getDate()}, ${dateObj.getFullYear()}`.toLowerCase()
        ];
        
        let matches = false;
        let matchScore = 0;
        
        if (searchTerm === '') {
            matches = true;
            matchScore = 1;
        } else {
            // Check if search term matches any format
            for (const format of searchableFormats) {
                if (format.includes(searchTerm)) {
                    matches = true;
                    // Calculate match score (more precise matches score higher)
                    const score = searchTerm.length / format.length;
                    if (score > matchScore) {
                        matchScore = score;
                    }
                    break;
                }
            }
            
            // Special handling for numeric searches (e.g., "15" for day 15)
            if (!matches && !isNaN(searchTerm) && searchTerm.length <= 2) {
                const dayNum = dateObj.getDate().toString();
                const monthNum = (dateObj.getMonth() + 1).toString();
                if (dayNum === searchTerm || monthNum === searchTerm) {
                    matches = true;
                    matchScore = 0.9;
                }
            }
        }
        
        if (matches) {
            row.style.display = '';
            hasVisible = true;
            if (matchScore > bestMatchScore) {
                bestMatchScore = matchScore;
                bestMatchRow = row;
            }
        } else {
            row.style.display = 'none';
        }
    });
    
    // Show/hide no results message
    let noResultMsg = document.getElementById('noResultMsg');
    if (!hasVisible && searchTerm !== '') {
        if (!noResultMsg) {
            noResultMsg = document.createElement('tr');
            noResultMsg.id = 'noResultMsg';
            noResultMsg.innerHTML = `<td colspan="3" style="text-align: center; padding: 20px; color: #999;">🔍 No dates found matching "${searchTerm}"<br><small>Try: May 15, 15 May, Monday, 15-05-2026, 05/15/2026, or just "May" or "15"</small>`;
            document.querySelector('#availabilityTable tbody').appendChild(noResultMsg);
        }
    } else if (noResultMsg) {
        noResultMsg.remove();
    }
    
    // Auto-scroll to and highlight the best matching row if found
    if (bestMatchRow && searchTerm !== '') {
        bestMatchRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        bestMatchRow.style.transition = 'background-color 0.5s';
        bestMatchRow.style.backgroundColor = '#fff3cd';
        setTimeout(() => {
            bestMatchRow.style.backgroundColor = '';
        }, 2000);
    }
}

function applyQuickAvailability() {
    // Remove any existing error message
    const existingError = document.getElementById('quickAddError');
    if (existingError) existingError.remove();
    
    const frequency = document.querySelector('input[name="frequency"]:checked').value;
    const start = document.getElementById('quickStart').value;
    const end = document.getElementById('quickEnd').value;
    
    // Collect all errors
    let errors = [];
    
    if (!start || !end) errors.push("Please select both start and end times");
    
    if (start && end) {
        const startTime = new Date(`1970-01-01T${start}:00`);
        const endTime = new Date(`1970-01-01T${end}:00`);
        if (endTime <= startTime) errors.push("End time must be after start time");
    }
    
    // Validate based on frequency
    let datesToAdd = [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (frequency === 'weekly') {
        const days = Array.from(document.querySelectorAll('.dayCheckbox:checked')).map(cb => cb.value);
        const selectedWeeks = Array.from(document.querySelectorAll('.weekCheckbox:checked')).map(cb => parseInt(cb.value));
        
        if (!days.length) errors.push("Please select at least one day");
        if (!selectedWeeks.length) errors.push("Please select at least one week");
        
        if (errors.length === 0) {
            selectedWeeks.forEach(weekNum => {
                days.forEach(day => {
                    const date = getDateForDayInWeek(day, weekNum, today);
                    if (date && date >= today) {
                        datesToAdd.push(date);
                    }
                });
            });
        }
    } 
    else if (frequency === 'monthly') {
        const monthlyDate = parseInt(document.getElementById('monthlyDate').value);
        const monthlyMonths = parseInt(document.getElementById('monthlyMonths').value);
        
        if (isNaN(monthlyDate) || monthlyDate < 1 || monthlyDate > 31) {
            errors.push("Please enter a valid date (1-31)");
        }
        if (isNaN(monthlyMonths) || monthlyMonths < 1 || monthlyMonths > 12) {
            errors.push("Please enter valid number of months (1-12)");
        }
        
        if (errors.length === 0) {
            // Clear datesToAdd array
            datesToAdd = [];
            
            // Get current date components
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            
            for (let i = 1; i <= monthlyMonths; i++) {
                // Calculate target month and year
                let targetMonth = currentMonth + i;
                let targetYear = currentYear;
                
                if (targetMonth >= 12) {
                    targetYear += Math.floor(targetMonth / 12);
                    targetMonth = targetMonth % 12;
                }
                
                // Get the last day of the target month
                const lastDayOfMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
                const dayToSet = Math.min(monthlyDate, lastDayOfMonth);
                
                // Create the date (note: month is 0-indexed)
                const targetDate = new Date(targetYear, targetMonth, dayToSet);
                
                console.log(`Month ${i}: ${targetDate.toDateString()}`);
                
                // Only add if date is today or future
                if (targetDate >= today) {
                    datesToAdd.push(targetDate);
                }
            }
        }
    }
    else if (frequency === 'specific') {
        const specificDate = document.getElementById('specificDate').value;
        if (!specificDate) {
            errors.push("Please select a specific date");
        } else {
            const dateObj = new Date(specificDate);
            if (dateObj >= today) {
                datesToAdd.push(dateObj);
            } else {
                errors.push("Selected date cannot be in the past");
            }
        }
    }
    
    // Show all errors above modal if any
    if (errors.length > 0) {
        const modalContent = document.querySelector('#quickAddModal .modal-content');
        const errorDiv = document.createElement('div');
        errorDiv.id = 'quickAddError';
        errorDiv.style.cssText = 'background:#ffebee; color:#c62828; padding:12px; margin:0 20px 15px 20px; border-radius:8px; border-left:4px solid #c62828;';
        errorDiv.innerHTML = '<ul style="margin:0; padding-left:20px;">' + errors.map(e => `❌ ${e}</li>`).join('') + '</ul>';
        
        const modalHeader = modalContent.querySelector('.modal-header');
        modalHeader.insertAdjacentElement('afterend', errorDiv);
        
        errors.forEach(e => safeLog("❌ " + e, true));
        return;
    }
    
    // Log what dates we're adding
    console.log("Dates to add:", datesToAdd.map(d => d.toDateString()));
    
    // Generate time slots
    const startTime = new Date(`1970-01-01T${start}:00`);
    const endTime = new Date(`1970-01-01T${end}:00`);
    
    const slotList = [];
    let current = new Date(startTime);
    while (current < endTime) {
        let h = current.getHours();
        let m = current.getMinutes();
        let ampm = h >= 12 ? "PM" : "AM";
        let displayH = h % 12 || 12;
        let displayM = m.toString().padStart(2, '0');
        slotList.push(`${displayH}:${displayM} ${ampm}`);
        current.setMinutes(current.getMinutes() + 30);
    }
    
    if (slotList.length > MAX_SLOTS_PER_DAY) {
        const modalContent = document.querySelector('#quickAddModal .modal-content');
        const errorDiv = document.createElement('div');
        errorDiv.id = 'quickAddError';
        errorDiv.style.cssText = 'background:#ffebee; color:#c62828; padding:12px; margin:0 20px 15px 20px; border-radius:8px; border-left:4px solid #c62828;';
        errorDiv.innerHTML = `❌ Cannot add more than ${MAX_SLOTS_PER_DAY} slots per day.`;
        const modalHeader = modalContent.querySelector('.modal-header');
        modalHeader.insertAdjacentElement('afterend', errorDiv);
        return;
    }
    
    // Remove duplicate dates
    const uniqueDates = [...new Map(datesToAdd.map(d => [d.toISOString().split('T')[0], d])).values()];
    
    const tbody = document.querySelector("#availabilityTable tbody");

   uniqueDates.forEach(dateObj => {

    });
    
    closeQuickAddPopup();

            const slotsCell = document.createElement("td");
            const slotsContainer = document.createElement("div");
            slotsContainer.classList.add("slots-container");
            
            slotList.forEach(slot => {
                const label = document.createElement("label");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = true;
                checkbox.value = slot;
                label.appendChild(checkbox);
                label.append(` ${slot}`);
                slotsContainer.appendChild(label);
            });
            
            slotsCell.appendChild(slotsContainer);
            tr.appendChild(slotsCell);
            
            const removeCell = document.createElement("td");
            removeCell.innerHTML = `<button onclick="removeRow(this)">❌</button>`;
            tr.appendChild(removeCell);
            
            tbody.appendChild(tr);
            addedCount++;
        }
    });
    
    closeQuickAddPopup();
    showToast(`✅ Added ${addedCount} new date${addedCount !== 1 ? 's' : ''}!`);
}

function getDateForDayInWeek(dayShort, weekNumber, fromDate) {
    const daysMap = {
        'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6, 'Sun': 0
    };
    
    const targetDay = daysMap[dayShort];
    const currentDay = fromDate.getDay();
    
    // Calculate days to add to reach the target day in the specified week
    let daysToAdd = (targetDay - currentDay + 7) % 7;
    
    // Add weeks
    daysToAdd += (weekNumber - 1) * 7;
    
    const targetDate = new Date(fromDate);
    targetDate.setDate(fromDate.getDate() + daysToAdd);
    
    return targetDate;
}

function formatDateWithDay(dateString) {
    const date = new Date(dateString);
    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
    const formattedDate = date.toISOString().split("T")[0];
    return `${dayName}, ${formattedDate}`;
}

     function saveProfile() {

    if (!validateAllSlots()) {

    }
    
    const token = localStorage.getItem('authToken');

        alert("You are not logged in. Redirecting to login page.");
        window.location.href = 'login.html';
        return;
    }

    const newSlots = getCurrentAvailabilitySlots();
    console.log("Saving payload:", newSlots);

        safeLog("❌ No valid slots to save!", true);
        return;
    }

    fetch(`http://localhost:3000/api/doctors/${doctorId}/availability`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ availabilitySlots: newSlots })
    })
        .then(res => {

            return res.json();
        })
        .then(() => {
            hideLoadingOverlay();
            showToast("Profile updated successfully!");

            isEditing = false;
            toggleEditFields(false);
            loadAvailability();

            document.getElementById("buttonGroup").innerHTML =
                `<button class="btn" onclick="enableEditing()">Edit Profile</button>`;
        })
        .catch(err => {

        });

    saveAvailabilityOrder();
}
        function getCurrentAvailabilitySlots() {
                const availabilitySlots = [];
                const rows = document.querySelectorAll("#availabilityTable tbody tr");

                rows.forEach(row => {
                    const date = row.querySelector("td:nth-child(1) input[type='date']").value;
                    if (!date) return;

                    const checkedSlots = [];
                    const checkboxes = row.querySelectorAll("td:nth-child(2) input[type='checkbox']");
                    if (checkboxes.length > 0) {
                        checkboxes.forEach(cb => {
                            if (cb.checked) checkedSlots.push(cb.value);
                        });
                    } else {
                        // fallback: read from span when not in edit mode
                        const slotText = row.querySelector("td:nth-child(2) .slot-text")?.textContent || "";
                        if (slotText) {
                            checkedSlots.push(...slotText.split(",").map(s => s.trim()));
                        }
                    }


                    if (checkedSlots.length > 0) {
                        availabilitySlots.push({ date, slots: checkedSlots });
                    }
                });

                return availabilitySlots;
            }

    function enableEditing() {
            safeLog("✏️ Edit mode enabled - select dates and time slots");

        isEditing = true;
        toggleEditFields(true);
        const buttonGroup = document.getElementById("buttonGroup");
        buttonGroup.innerHTML = `
        <button class="btn" onclick="saveProfile()">Save Profile</button>
        <div id="saveStatus" style="margin-top: 10px; font-size: 14px; color: green;"></div>
    `;
    }

       function toggleEditFields(enabled) {
            document.querySelectorAll("#availabilityTable tbody tr").forEach(row => {
                const dateInput = row.querySelector("td:nth-child(1) input[type='date']");
                const slotsCell = row.querySelector("td:nth-child(2)");
                const removeBtn = row.querySelector("td:nth-child(3) button");

                if (enabled) {
                    // Enable date input
                    dateInput.disabled = false;

                    // Get slot text (if exists)
                    const slotTextEl = slotsCell.querySelector(".slot-text");
                    if (!slotTextEl) return; // nothing to convert
                    const slotText = slotTextEl.textContent.trim();
                    const activeSlots = slotText ? slotText.split(",").map(s => s.trim()) : [];

                    // Build checkboxes only for active slots
                    const slotsContainer = document.createElement("div");
                    slotsContainer.classList.add("slots-container");

                    activeSlots.forEach(slot => {
                        const label = document.createElement("label");
                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.value = slot;
                        checkbox.checked = true;
                        label.appendChild(checkbox);
                        label.append(` ${slot}`);
                        slotsContainer.appendChild(label);
                    });

                    slotsCell.innerHTML = "";
                    slotsCell.appendChild(slotsContainer);

                    removeBtn.style.display = "inline-block";
                } else {
                    // Disable date input
                    dateInput.disabled = true;

                    // Convert checkboxes back to text
                    const checkboxes = slotsCell.querySelectorAll("input[type='checkbox']");
                    if (checkboxes.length) {
                        const checked = Array.from(checkboxes)
                            .filter(cb => cb.checked)
                            .map(cb => cb.value);

                        slotsCell.innerHTML = `<span class="slot-text">${checked.join(", ")}</span>`;
                    }

                    removeBtn.style.display = "none";
                }
            });

            // Toggle Add Slot & Quick Add buttons
            document.querySelectorAll(".add-slot-btn").forEach(btn => {
                btn.style.display = enabled ? "inline-block" : "none";
            });
        }

        function dragStart(e) {
            draggedRow = e.currentTarget;
            e.dataTransfer.effectAllowed = 'move';
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function drop(e) {
            e.preventDefault();
            if (draggedRow && draggedRow !== e.currentTarget) {
                const tbody = draggedRow.parentNode;
                tbody.insertBefore(draggedRow, e.currentTarget.nextSibling);
                // autoSaveProfile();
            }
        }

        function assignDragEvents() {
            document.querySelectorAll("#availabilityTable tbody tr").forEach(row => {
                row.setAttribute("draggable", true);
                row.ondragstart = dragStart;
                row.ondragover = dragOver;
                row.ondrop = drop;
            });
        }
