<!DOCTYPE html>
<html>
  <head>
    <title>Forgot Password</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #e6f2ff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        background-color: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 255, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h2 {
        color: #004080;
        margin-bottom: 20px;
      }

      form {
        display: flex;
        flex-direction: column;
      }

      input[type="email"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
      }

      button {
        background-color: #009579;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #0056b3;
      }

      #message {
        margin-top: 20px;
        color: red;
        text-align: center;
      }

      .back-link {
        margin-top: 20px;
        text-decoration: none;
        color: #007bff;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Reset Password</h2>
      <form id="resetPasswordForm">
        <input
          type="password"
          id="newPassword"
          placeholder="Enter new password"
          required
        />
        <small id="passwordMessage"></small>

        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
          required
        />
        <small id="confirmMessage"></small>

        <button type="submit">Reset Password</button>
      </form>
      <a href="login.html" class="back-link">Back to Login</a>
    </div>

    <script>
      const passwordInput = document.getElementById("newPassword");
      const confirmInput = document.getElementById("confirmPassword");
      const passwordMessage = document.getElementById("passwordMessage");
      const confirmMessage = document.getElementById("confirmMessage");
      const form = document.getElementById("resetPasswordForm");

      // Password strength regex
      function validatePassword(pwd) {
        const regex =
          /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;
        return regex.test(pwd);
      }

      // Live check on typing
      passwordInput.addEventListener("input", () => {
        if (!validatePassword(passwordInput.value)) {
          passwordMessage.textContent =
            "Password must be ≥6 characters and include a letter, number, and special character.";
          passwordMessage.style.color = "red";
        } else {
          passwordMessage.textContent = "Strong password ✔";
          passwordMessage.style.color = "green";
        }
      });

      confirmInput.addEventListener("input", () => {
        if (confirmInput.value !== passwordInput.value) {
          confirmMessage.textContent = "Passwords do not match!";
          confirmMessage.style.color = "red";
        } else {
          confirmMessage.textContent = "Passwords match ✔";
          confirmMessage.style.color = "green";
        }
      });

      // Prevent submission if invalid
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const pwd = passwordInput.value;

        if (!validatePassword(pwd)) {
          alert("Password is invalid. Please follow the rules.");
          return;
        }

        if (pwd !== confirmInput.value) {
          alert("Passwords do not match.");
          return;
        }

        // ✅ Proceed with backend request
        const email = new URLSearchParams(window.location.search).get("email");
        fetch("http://localhost:3000/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password: pwd }),
        })
          .then(async (res) => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || "Failed to reset");
            alert("Password reset successfully!");
            window.location.href = "login.html";
          })
          .catch((err) => {
            alert("Error: " + err.message);
          });
      });
    </script>
  </body>
</html>
