<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login & Registration Form | CoderGirl</title>
    <style>
        /* Import Google font - Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            width: 100%;
            background-image: url('images/medical.jpg');
            background-size: cover;
            background-position: center;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 430px;
            width: 100%;
            background: #fff;
            border-radius: 7px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .container .registration {
            display: none;
        }

        #check:checked~.registration {
            display: block;
        }

        #check:checked~.login {
            display: none;
        }

        #check {
            display: none;
        }

        .container .form {
            padding: 2rem;
        }

        .form header {
            font-size: 2rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form input,
        .form select {
            height: 60px;
            width: 100%;
            padding: 0 15px;
            font-size: 17px;
            margin-bottom: 1.3rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .form input:focus {
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }

        .form a {
            font-size: 16px;
            color: rgb(9, 102, 102);
            text-decoration: none;
        }

        .form a:hover {
            text-decoration: underline;
        }

        .form input.button {
            color: #fff;
            background: rgb(9, 102, 102);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 1.7rem;
            cursor: pointer;
            transition: 0.4s;
        }

        .form input.button:hover {
            background: #006653;
        }

        .signup {
            font-size: 17px;
            text-align: center;
        }

        .signup label {
            color: #009579;
            cursor: pointer;
        }

        .signup label:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="checkbox" id="check">
        <div class="login form">
            <header>Login</header>
            <form id="login-form" onsubmit="event.preventDefault(); redirectUser();">
                <select id="login-role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="admin">Admin</option>
                    <option value="doctor">Doctor</option>
                    <option value="patient">Patient</option>
                </select>

                <input type="text" id="login-email" placeholder="Enter your email" required>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <a href="#">Forgot password?</a>
                <input type="submit" class="button" value="Login">
            </form>
            <div class="signup">
                <span class="signup">Don't have an account?
                    <label for="check">Signup</label>
                </span>
            </div>
        </div>
        <div class="registration form">
            <header>Signup</header>
            <form id="signup-form" onsubmit="event.preventDefault(); handleSignup();">
                <select id="signup-role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="admin">Admin</option>
                    <option value="doctor">Doctor</option>
                    <option value="patient">Patient</option>
                </select>
                <input type="text" id="signup-email" placeholder="Enter your email" required>
                <input type="password" id="signup-password" placeholder="Create a password" required>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <input type="submit" class="button" value="Signup">
            </form>
            <div class="signup">
                <span class="signup">Already have an account?
                    <label for="check">Login</label>
                </span>
            </div>
        </div>
    </div>

    <script>

        function redirectUser() {
            const role = document.getElementById('login-role').value;
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            // Validate email and password first
            if (!email || !password) {
                alert('Please enter both email and password.');
                return;
            }
            // Check if the password is at least 6 characters long
            if (password.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }
            // Validate email format using a regular expression
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            // If role is not selected, alert the user
            if (!role) {
                alert('Please select your role.');
                return;
            }

            // Perform the login request
            fetch('http://localhost:3000/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password, role })
            })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.message); });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.token) {
                        localStorage.setItem('userRole', data.role);
                        localStorage.setItem('authToken', data.token);
                        // Redirect based on the role
                        if (data.role === 'admin') {
                            window.location.href = 'Adminpanel.html';
                        } else if (data.role === 'doctor') {
                            window.location.href = 'docpanel.html';
                        } else if (data.role === 'patient') {
                            window.location.href = 'index.html';
                        }
                    } else {
                        alert('Invalid credentials or account does not exist. Please sign up.');
                        if (role === 'patient' || role === 'doctor') {
                            document.getElementById('check').checked = true; // Switch to signup tab
                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred during login. Please try again.');
                });
        }


        async function handleSignup() {
                const role = document.getElementById('signup-role').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (!email || !password || !confirmPassword || !role ) {
                    alert('Please fill out all fields.');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Passwords do not match.');
                    return;
                }
                 // Check if the password is at least 6 characters long
            if (password.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }
            // Validate email format using a regular expression
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

               // Proceed with signup
            const response = await fetch('http://localhost:3000/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });

            if (response.ok) {
                alert('Signup successful! Please check your email for the OTP.');
                // Store the email to verify later
                sessionStorage.setItem('pendingOtpEmail', email);

                // Call OTP request here
                //await sendOtpToEmail(email);
                await requestOtp(email); // New function to request OTP
                console.log('Redirecting to verify-otp.html');
                window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;

                // window.location.href = 'verify-otp.html';  // Redirect to the OTP verification page
            } else {
                alert('An error occurred during signup. Please try again.');
            }

        }
        async function requestOtp(email) {
                const response = await fetch('http://localhost:3000/auth/request-otp', {

                // const response = await fetch('http://localhost:3000/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Error sending OTP');
                }
            }
    async function verifyOtp() {
        const email = sessionStorage.getItem('pendingOtpEmail');
        const otp = document.getElementById('otp').value;

        if (!otp || !email) {  // Check both fields
            alert('Please enter both email and OTP.');
            return;
        }

        try {
            console.log('Email:', email);
            console.log('OTP:', otp);
            const response = await fetch('http://localhost:3000/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });

            const responseData = await response.json();
            console.log('Response Status:', response.status);
            console.log('Response Data:', responseData);

            if (!response.ok) {
                throw new Error(responseData.message || 'Invalid OTP');
            }

            alert('OTP verified successfully! You can now login.');
            window.location.href = 'login.html';
        } catch (error) {
            alert(error.message);
        }
    }
      

    </script>
</body>

</html>
