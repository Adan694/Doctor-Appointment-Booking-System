<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login & Registration Form </title>
    <style>
        /* Import Google font - Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('images/medical.jpg');
    background-size: cover;
    background-position: center;
    animation: panZoom 20s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes panZoom {
    0% {
        transform: scale(1) translate(0, 0);
    }
    50% {
        transform: scale(1.1) translate(-2%, -2%);
    }
    100% {
        transform: scale(1) translate(0, 0);
    }
}

/* Container styling */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 430px;
    width: 100%;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.container:hover {
    transform: translate(-50%, -50%) scale(1.01);
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
}

/* Hide/Show login/register sections */
.container .registration { display: none; }
#check:checked ~ .registration { display: block; }
#check:checked ~ .login { display: none; }
#check { display: none; }

/* Form wrapper */
.container .form {
    padding: 2rem;
}

/* Form title */
.form header {
    font-size: 2rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 1.5rem;
    color: #064f4f;
    letter-spacing: 0.5px;
    position: relative;
    cursor: default;
    transition: color 0.3s ease;
}

/* Animated underline effect */
.form header::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -5px;
    transform: translateX(-50%) scaleX(0);
    width: 60%;
    height: 2px;
    background-color: #009688;
    transition: transform 0.3s ease;
    transform-origin: center;
}

.form header:hover {
    color: #009688;
}

.form header:hover::after {
    transform: translateX(-50%) scaleX(1);
}

/* Inputs & selects */
.form input,
.form select {
    height: 55px;
    width: 100%;
    padding: 0 15px;
    font-size: 16px;
    margin-bottom: 1.3rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    background: #fafafa;
    transition: all 0.3s ease;
}

.form input:hover,
.form select:hover {
    border-color: #00bfa5;
    background: #f0fdfa;
}

.form input:focus,
.form select:focus {
    border-color: #00bfa5;
    box-shadow: 0 0 8px rgba(0, 191, 165, 0.4);
    background: #ffffff;
}

/* Links */
.form a {
    font-size: 15px;
    color: #00796b;
    text-decoration: none;
    transition: color 0.2s ease;
}

.form a:hover {
    text-decoration: underline;
    color: #004d40;
}

/* Button */
.form input.button {
    color: #fff;
    background: linear-gradient(135deg, #009688, #00796b);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 1px;
    margin-top: 1.5rem;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.form input.button:hover {
    background: linear-gradient(135deg, #00796b, #004d40);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 150, 136, 0.3);
}

/* Signup link */
.signup {
    font-size: 15px;
    text-align: center;
    margin-top: 1rem;
    color: #555;
}

.signup label {
    color: #009579;
    cursor: pointer;
    transition: color 0.2s ease;
}

.signup label:hover {
    text-decoration: underline;
    color: #006653;
}

    </style>
</head>

<body>
    <div class="container">
        <input type="checkbox" id="check">
        <div class="login form">
            <header>Login</header>
            <form id="login-form" onsubmit="event.preventDefault(); redirectUser();">
                <select id="login-role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="admin">Admin</option>
                    <option value="doctor">Doctor</option>
                    <option value="patient">Patient</option>
                </select>

                <input type="text" id="login-email" placeholder="Enter your email" required>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <a href="forgotpassword.html">Forgot password?</a>
                <input type="submit" class="button" value="Login">
            </form>
            <div class="signup">
                <span class="signup">Don't have an account?
                    <label for="check">Signup</label>
                </span>
            </div>
        </div>
        <div class="registration form">
            <header>Signup</header>
            <form id="signup-form" onsubmit="event.preventDefault(); handleSignup();">
                <input type="hidden" id="signup-role" value="patient">
                <input type="text" id="signup-email" placeholder="Enter your email" required>
                <input type="password" id="signup-password" placeholder="Create a password" required>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <input type="submit" class="button" value="Signup">
            </form>
            <div class="signup">
                <span class="signup">Already have an account?
                    <label for="check">Login</label>
                </span>
            </div>
        </div>
    </div>

    <script>
    function redirectUser() {
        const role = document.getElementById('login-role').value;
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        // Basic validation
        if (!email || !password) {
            alert('Please enter both email and password.');
            return;
        }

        if (password.length < 6) {
            alert('Password must be at least 6 characters long.');
            return;
        }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            alert('Please enter a valid email address.');
            return;
        }

        if (!role) {
            alert('Please select your role.');
            return;
        }

        // Perform login
        fetch('http://localhost:3000/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password, role })
        })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.message); });
                }
                return res.json();
            })
            .then(data => {
                const { token, role, patientId } = data; 
                localStorage.setItem('authToken', token);
                console.log('Saved token:', localStorage.getItem('authToken'));

                localStorage.setItem('userRole', role);
                sessionStorage.setItem('userRole', role);
                localStorage.setItem('patientId', patientId); 

                console.log("Stored Patient ID:", localStorage.getItem('patientId')); 

                // Store doctorId if role is doctor
                if (role === 'doctor') {
                    if (data.doctor && data.doctor._id) {
                        localStorage.setItem('doctorId', data.doctor._id);
                        console.log('Doctor ID saved:', data.doctor._id);
                        window.location.href = 'docpanel.html'; 
                        return;
                    } else {
                        alert('Doctor ID not found in login response.');
                        return;
                    }
                }

                // Redirect other roles
                if (role === 'admin') {
                    window.location.href = 'Adminpanel.html';
                } else if (role === 'patient') {
                    window.location.href = 'index.html';
                } else {
                    alert('Unrecognized role.');
                }
            })
            .catch(err => {
                alert(`Login failed: ${err.message}`);
                if (role === 'patient') {
                    document.getElementById('check').checked = true;
                }
            });
    }


        async function handleSignup() {
                const role = document.getElementById('signup-role').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (!email || !password || !confirmPassword || !role ) {
                    alert('Please fill out all fields.');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Passwords do not match.');
                    return;
                }

                // Check if the password meets strength criteria
            const passwordStrengthPattern = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;
            if (!passwordStrengthPattern.test(password)) {
                alert('Password must be at least 6 characters long and include at least one letter, one number, and one special character.');
                return;
            }
            
            // Validate email format using a regular expression
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

               // Proceed with signup
            const response = await fetch('http://localhost:3000/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });

           if (response.ok) {
                alert('Signup successful! Please check your email for the OTP.');
                sessionStorage.setItem('pendingOtpEmail', email);
                await requestOtp(email);
                window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
            } else {
                const contentType = response.headers.get("content-type");
                let errorMessage = "An error occurred during signup. Please try again.";

                if (contentType && contentType.includes("application/json")) {
                    const errorData = await response.json();
                    errorMessage = errorData.message || errorMessage;
                } else {
                    const errorText = await response.text();
                    errorMessage = errorText || errorMessage;
                }

                alert(errorMessage);
            }
        }
        async function requestOtp(email) {
                const response = await fetch('http://localhost:3000/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Error sending OTP');
                }
            }
    async function verifyOtp() {
        const email = sessionStorage.getItem('pendingOtpEmail');
        const otp = document.getElementById('otp').value;

        if (!otp || !email) {  // Check both fields
            alert('Please enter both email and OTP.');
            return;
        }

        try {
            console.log('Email:', email);
            console.log('OTP:', otp);
            const response = await fetch('http://localhost:3000/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });

            const responseData = await response.json();
            console.log('Response Status:', response.status);
            console.log('Response Data:', responseData);

            if (!response.ok) {
                throw new Error(responseData.message || 'Invalid OTP');
            }

            alert('OTP verified successfully! You can now login.');
            window.location.href = 'login.html';
        } catch (error) {
            alert(error.message);
        }
    }
    </script>
</body>

</html>
