<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Profile</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .profile-card {
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }

        .profile-card img {
            max-width: 100%;
            border-radius: 8px;
        }
        .book-button {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 24px;
    background: linear-gradient(to right, #28a745, #218838);
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: background 0.3s ease, transform 0.2s ease;
}

.book-button:hover {
    background: linear-gradient(to right, #218838, #1e7e34);
    transform: translateY(-2px);
}


        .availability {
            font-weight: bold;
        }

        .available {
            color: green;
        }

        .unavailable {
            color: red;
        }

        .slots {
            margin-top: 10px;
        }

        /* Feedback Form Styles */
        #feedback-form {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
        }

        #feedback-form label {
            display: block;
            margin-bottom: 5px;
        }

        #feedback-form input,
        #feedback-form textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        #feedback-form button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Feedback List Styles */
        .feedback-item {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            background-color: #f9f9f9;
        }

        .feedback-item strong {
            display: block;
        }

        .feedback-actions {
            margin-top: 10px;
        }

        .feedback-actions button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .feedback-actions button.delete {
            background-color: #dc3545;
        }
    </style>
</head>

<body>
    <div class="profile-card" id="profile"></div>
    <h3>Leave Feedback:</h3>
    <form id="feedback-form">
        <input type="number" id="rating" min="1" max="5" placeholder="Rating (1-5)" required />
        <textarea id="comment" placeholder="Your Feedback" required></textarea>
        <button type="submit">Submit Feedback</button>
    </form>
    <h3>Feedback:</h3>
    <div id="feedback-list"></div> <!-- Div to display feedback -->

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const doctorId = params.get("id");
            const profileDiv = document.getElementById("profile");

            if (!doctorId || !/^[0-9a-fA-F]{24}$/.test(doctorId)) {
                profileDiv.innerHTML = "<p>Invalid doctor ID</p>";
                return;
            }

            fetch(`http://localhost:3000/api/doctors/${doctorId}`)
                .then(async response => {
                    if (!response.ok) throw new Error(await response.text());
                    return response.json();
                })
                .then(doctor => {
                    profileDiv.innerHTML = `
                            <img src="${doctor.image}" alt="${doctor.name}">
                            <h2>${doctor.name}</h2>
                            <p class="availability ${doctor.available ? "available" : "unavailable"}">
                                ${doctor.available ? "Available" : "Not Available"}
                            </p>
                            <p><strong>Specialty:</strong> ${doctor.speciality}</p>
                            <p><strong>Experience:</strong> ${doctor.experience} years</p>
                            <p><strong>Degree:</strong> ${doctor.degree}</p>
                            <p><strong>Fees:</strong> Rs. ${doctor.fees}</p>
                            <p><strong>Address:</strong> ${doctor.address1}${doctor.address2 ? ', ' + doctor.address2 : ''}</p>
                            <p><strong>About:</strong> ${doctor.about}</p>
                            ${doctor.qualifications ? `<p><strong>Qualifications:</strong> ${doctor.qualifications}</p>` : ''}
                            ${doctor.services ? `<p><strong>Services:</strong> ${doctor.services}</p>` : ''}
                            ${doctor.conditions ? `<p><strong>Conditions Treated:</strong> ${doctor.conditions}</p>` : ''}
                            ${doctor.memberships ? `<p><strong>Memberships:</strong> ${doctor.memberships}</p>` : ''}
                            ${doctor.locations ? `<p><strong>Locations:</strong> ${doctor.locations}</p>` : ''}
                            <a class="book-button" href="booking.html?doctorId=${doctor._id}">Book Appointment</a>
                        `;
                    fetchFeedbackForDoctor(doctorId);
                })
                .catch(err => {
                    console.error("Error:", err);
                    profileDiv.innerHTML = `<p>Error loading profile: ${err.message}</p>`;
                });
        })();

        function fetchFeedbackForDoctor(doctorId) {
            fetch(`http://localhost:3000/api/doctors/${doctorId}/feedback`)
                .then(response => {
                    if (!response.ok) throw new Error("Failed to fetch feedback");
                    return response.json();
                })
                .then(feedbackList => {
                    const feedbackDiv = document.getElementById("feedback-list");
                    feedbackDiv.innerHTML = '';
                    const loggedInPatientId = localStorage.getItem('patientId');

                    feedbackList.forEach(feedback => {
                        const feedbackElem = document.createElement("div");
                        feedbackElem.className = "feedback-item";
                        feedbackElem.dataset.feedbackId = feedback._id;

                        let feedbackHTML = `
                                <strong>Rating:</strong> ${feedback.rating}
                                <strong>Comment:</strong> ${feedback.comment}
                                <strong>Submitted by:</strong> ${feedback.userEmail || "Anonymous"}
                                <strong>Submitted on:</strong> ${new Date(feedback.timestamp).toLocaleDateString()}
                            `;

                        if (feedback.patientId === loggedInPatientId) {
                            feedbackHTML += `
                                    <div class="feedback-actions">
                                        <button onclick="editFeedback('${feedback._id}', '${feedback.rating}', '${feedback.comment}')">Edit</button>
                                        <button class="delete" onclick="deleteFeedback('${feedback._id}')">Delete</button>
                                    </div>
                                `;
                        }

                        feedbackElem.innerHTML = feedbackHTML + `<hr>`;
                        feedbackDiv.appendChild(feedbackElem);
                    });
                })
                .catch(err => {
                    console.error("Error fetching feedback:", err);
                });
        }

        // Submit new feedback
        document.getElementById("feedback-form").addEventListener("submit", function (event) {
            event.preventDefault();

            const rating = document.getElementById("rating").value;
            const comment = document.getElementById("comment").value;
            const patientId = localStorage.getItem('patientId');
            const doctorId = new URLSearchParams(window.location.search).get("id");

            const feedbackData = { doctorId, rating, comment, patientId };
            // const feedbackData = { doctorId, rating, comment };

            const token = localStorage.getItem('authtoken');
            console.log('Auth token:', token); // ✅ Add this here to debug
            if (!token) {
                console.error("No token found in localStorage!");
            }

            fetch("http://localhost:3000/api/feedback", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    // "Authorization": `Bearer ${token}`
                    'Authorization': 'Bearer ' + localStorage.getItem('authtoken')  // Make sure token is stored after login
                },
                body: JSON.stringify(feedbackData),
            })
                .then(response => {
                    if (!response.ok) throw new Error("Failed to submit feedback");
                    return response.json();
                })
                .then(data => {
                    console.log("Feedback submitted:", data);
                    fetchFeedbackForDoctor(doctorId);
                    document.getElementById("feedback-form").reset(); // Clear form
                })
                .catch(err => {
                    console.error("Error:", err);
                });
        });

        function editFeedback(feedbackId, currentRating, currentComment) {
            document.getElementById("rating").value = currentRating;
            document.getElementById("comment").value = currentComment;

            const feedbackItem = document.querySelector(`[data-feedback-id="${feedbackId}"]`);
            if (feedbackItem) {
                feedbackItem.remove();
            }

            const feedbackForm = document.getElementById("feedback-form");
            feedbackForm.onsubmit = function (event) {
                event.preventDefault();

                const rating = document.getElementById("rating").value;
                const comment = document.getElementById("comment").value;
                const doctorId = new URLSearchParams(window.location.search).get("id");
                const token = localStorage.getItem('token');

                const updatedFeedbackData = { rating, comment };

                fetch(`http://localhost:3000/api/feedback/${feedbackId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(updatedFeedbackData),
                })
                    .then(response => {
                        if (!response.ok) throw new Error("Failed to update feedback");
                        return response.json();
                    })
                    .then(data => {
                        console.log("Feedback updated:", data);
                        fetchFeedbackForDoctor(doctorId);
                        feedbackForm.onsubmit = null; // reset default
                        feedbackForm.reset();
                    })
                    .catch(err => {
                        console.error("Error:", err);
                    });
            };
        }

        function deleteFeedback(feedbackId) {
            const token = localStorage.getItem('token');
            const doctorId = new URLSearchParams(window.location.search).get("id");

            fetch(`http://localhost:3000/api/feedback/${feedbackId}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`
                },
            })
                .then(response => {
                    if (!response.ok) throw new Error("Failed to delete feedback");
                    console.log("Feedback deleted");
                    fetchFeedbackForDoctor(doctorId);
                })
                .catch(err => {
                    console.error("Error:", err);
                });
        }
    </script>
    
</body>

</html>
