    // Fix the parameter extraction
    // Wrap in IIFE to allow return statements
        (function () {
            const params = new URLSearchParams(window.location.search);
            const doctorId = params.get("id");
            const profileDiv = document.getElementById("profile");

            if (!doctorId || !/^[0-9a-fA-F]{24}$/.test(doctorId)) {
                profileDiv.innerHTML = "<p>Invalid doctor ID</p>";
                return;
            }

            fetch(`http://localhost:3000/api/doctors/${doctorId}`)
                .then(async response => {
                    if (!response.ok) throw new Error(await response.text());
                    return response.json();
                })
                .then(doctor => {
                    profileDiv.innerHTML = `
        <img src="${doctor.image}" alt="${doctor.name}">
        <h2>${doctor.name}</h2>
        <p>Specialty: ${doctor.speciality}</p>
        <p><strong>Experience:</strong> ${doctor.experience} years</p>
            <p class="availability ${doctor.available ? "available" : "unavailable"}">
               ${doctor.available ? "Available" : "Not Available"}
             </p>
             <p><strong>Biography:</strong> ${doctor.bio || "No bio available."}</p>
             <h3>Availability Slots:</h3>
              <div id="availability-slots"></div>
        <a href="booking.html?doctorId=${doctor._id}">Book Appointment</a>
      `;
                })
                .catch(err => {
                    console.error("Error:", err);
                    profileDiv.innerHTML = `<p>Error loading profile: ${err.message}</p>`;
                });
        })();
