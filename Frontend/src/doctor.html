<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Profile</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .profile-card {
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }

        .profile-card img {
            max-width: 100%;
            border-radius: 8px;
        }

        .availability {
            font-weight: bold;
        }

        .available {
            color: green;
        }

        .unavailable {
            color: red;
        }

        .slots {
            margin-top: 10px;
        }
        /* Feedback Form Styles */
    #feedback-form {
        margin-top: 20px;
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 8px;
    }

    #feedback-form label {
        display: block;
        margin-bottom: 5px;
    }

    #feedback-form input,
    #feedback-form textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    #feedback-form button {
        background-color: #28a745;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    #feedback-message {
        margin-top: 10px;
        color: green;
    }
    </style>
</head>

<body>
    <div class="profile-card" id="profile"></div>
    <h3>Leave Feedback:</h3>
    <form id="feedback-form">
        <input type="number" id="rating" min="1" max="5" placeholder="Rating (1-5)" required />
        <textarea id="comment" placeholder="Your Feedback" required></textarea>
        <button type="submit">Submit Feedback</button>
    </form>
    <h3>Feedback:</h3>
    <div id="feedback-list"></div> <!-- Div to display feedback -->
   

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const doctorId = params.get("id");
            const profileDiv = document.getElementById("profile");

            if (!doctorId || !/^[0-9a-fA-F]{24}$/.test(doctorId)) {
                profileDiv.innerHTML = "<p>Invalid doctor ID</p>";
                return;
            }

            fetch(`http://localhost:3000/api/doctors/${doctorId}`)
                .then(async response => {
                    if (!response.ok) throw new Error(await response.text());
                    return response.json();
                })
                .then(doctor => {
                    profileDiv.innerHTML = `
        <img src="${doctor.image}" alt="${doctor.name}">
        <h2>${doctor.name}</h2>
        <p>Specialty: ${doctor.speciality}</p>
        <p><strong>Experience:</strong> ${doctor.experience} years</p>
            <p class="availability ${doctor.available ? "available" : "unavailable"}">
               ${doctor.available ? "Available" : "Not Available"}
             </p>
             <p><strong>Biography:</strong> ${doctor.bio || "No bio available."}</p>
             <h3>Availability Slots:</h3>
              <div id="availability-slots"></div>
        <a href="booking.html?doctorId=${doctor._id}">Book Appointment</a>
      `;
      fetchFeedbackForDoctor(doctorId);

                })
                .catch(err => {
                    console.error("Error:", err);
                    profileDiv.innerHTML = `<p>Error loading profile: ${err.message}</p>`;
                });
        })();

        function fetchFeedbackForDoctor(doctorId) {
                fetch(`http://localhost:3000/api/doctors/${doctorId}/feedback`)
                    .then(response => {
                        if (!response.ok) throw new Error("Failed to fetch feedback");
                        return response.json();
                    })
                    .then(feedbackList => {
                        const feedbackDiv = document.getElementById("feedback-list");
                        feedbackDiv.innerHTML = ''; // Clear previous feedback
                        feedbackList.forEach(feedback => {
                            const feedbackElem = document.createElement("div");
                            feedbackElem.innerHTML = `
                            <strong>Rating:</strong> ${feedback.rating}<br>
                            <strong>Comment:</strong> ${feedback.comment}<br>
                            <strong>Submitted on:</strong> ${new Date(feedback.timestamp).toLocaleDateString()}
                            <hr>
                        `;
                            feedbackDiv.appendChild(feedbackElem);
                        });
                    })
                    .catch(err => {
                        console.error("Error fetching feedback:", err);
                    });
            }


            // Function to fetch feedback for the doctor
                function fetchFeedbackForDoctor(doctorId) {
                    fetch(`http://localhost:3000/api/doctors/${doctorId}/feedback`)
                        .then(response => {
                            if (!response.ok) throw new Error("Failed to fetch feedback");
                            return response.json();
                        })
                        .then(feedbackList => {
                            const feedbackDiv = document.getElementById("feedback-list");
                            feedbackDiv.innerHTML = ''; // Clear previous feedback
                            feedbackList.forEach(feedback => {
                                const feedbackElem = document.createElement("div");
                                feedbackElem.innerHTML = `
                            <strong>Rating:</strong> ${feedback.rating}<br>
                            <strong>Comment:</strong> ${feedback.comment}<br>
                            <strong>Submitted on:</strong> ${new Date(feedback.timestamp).toLocaleDateString()}
                            <hr>
                        `;
                                feedbackDiv.appendChild(feedbackElem);
                            });
                        })
                        .catch(err => {
                            console.error("Error fetching feedback:", err);
                        });
                }

                // Handle feedback form submission
                document.getElementById("feedback-form").addEventListener("submit", function (event) {
                    event.preventDefault();

                    const rating = document.getElementById("rating").value;
                    const comment = document.getElementById("comment").value;
                    // Fetch doctorId from URL
                    const params = new URLSearchParams(window.location.search);
                    const doctorId = params.get("id"); // Ensure this matches your URL

                    const feedbackData = { doctorId, rating, comment }; // Use doctorId from URL

                    fetch("http://localhost:3000/api/feedback", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(feedbackData),
                    })
                        .then(response => {
                            if (!response.ok) throw new Error("Failed to submit feedback");
                            return response.json();
                        })
                        .then(data => {
                            console.log("Feedback submitted:", data);
                            fetchFeedbackForDoctor(doctorId); // Refresh feedback list
                        })
                        .catch(err => {
                            console.error("Error:", err);
                        });
                });
    </script>
</body>

</html>
