 <script>

document.getElementById("chatFloatingBtn").addEventListener("click", async () => {

    const token = localStorage.getItem('authToken');

    try {
        await fetch('http://localhost:3000/user/chat/mark-read', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        const badge = document.getElementById("unreadCount");
        badge.innerText = "";
        badge.style.display = "none";

    } catch (err) {
        console.error("Error clearing unread:", err);
    }

    window.location.href = "Patientchat.html";
});
document.addEventListener('DOMContentLoaded', () => {
    const changePasswordBtn = document.getElementById('change-password-btn');
    const passwordFields = document.getElementById('password-fields');
    const bar = document.getElementById('bar');
    const menu = document.querySelector('nav ul');

    changePasswordBtn.addEventListener('click', () => {
        const btn = document.querySelector('.edit-button');
        if (btn.innerText === 'Update') {
            passwordFields.style.display = passwordFields.style.display === 'none' ? 'block' : 'none';
        } else {
            alert('Click "Edit Profile" first to change password.');
        }
    });

    // Mobile menu toggle
    bar.addEventListener('click', function () {
        menu.classList.toggle('active');
    });
});

window.onload = function () {
    showLoader();
    const token = localStorage.getItem('authToken');
    if (!token) {
        alert("You are not logged in. Redirecting to login page.");
        window.location.href = 'login.html';
        return;
    }

    fetch('http://localhost:3000/user/profile', {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
    })
        .then(response => { if (!response.ok) throw new Error('Unauthorized or bad token'); return response.json(); })
        .then(data => {
            document.getElementById('displayName').innerText = data.name || '';
            document.getElementById('displayEmail').innerText = data.email || '';
            document.getElementById('displayPhone').innerText = data.phone || '';
            document.getElementById('displayAge').innerText = data.age || '';
            document.getElementById('displayDob').innerText = data.dob || '';
            document.getElementById('displayGender').innerText = data.gender || 'male';
            document.getElementById('displayCnic').innerText = data.cnic || '';

            hideLoader();
        })
        .catch(error => {
            console.error('Error fetching user profile:', error);
            alert('Could not load profile data. Please try again.');
        });
};

function toggleEditForm() {
    const btn = document.querySelector('.edit-button');
    const profileInfo = document.querySelector('.profile-info');
    const passwordContainer = document.getElementById('password-change-container');
    const passwordFields = document.getElementById('password-fields');

    if (btn.innerText === 'Edit Profile') {
        btn.innerText = 'Update';
        passwordContainer.style.display = 'block';
        passwordFields.style.display = 'none';

        profileInfo.querySelectorAll('p').forEach(p => {
            const label = p.previousElementSibling.innerText.toLowerCase().replace(/[^a-z]/g, '');
            const key = { cnic: 'cnic', name: 'name', email: 'email', phone: 'phone', phonenumber: 'phone', age: 'age', dob: 'dob', dateofbirth: 'dob', gender: 'gender' }[label] || label;

            if (key === 'gender') {
                const select = document.createElement('select');
                select.id = 'edit-' + key;
                select.value = p.innerText.toLowerCase();
                select.innerHTML = `<option value="male">Male</option><option value="female">Female</option><option value="other">Other</option>`;
                p.replaceWith(select);
            } else if (key === 'dob') {
                const input = document.createElement('input');
                input.type = 'date';
                input.id = 'edit-dob';
                input.value = p.innerText;
                input.addEventListener('change', () => {
                    const dob = new Date(input.value);
                    const today = new Date();
                    if (dob > today) return dobError.innerText = "Date cannot be in the future";
                    let age = today.getFullYear() - dob.getFullYear();
                    const monthDiff = today.getMonth() - dob.getMonth();
                    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
                    document.getElementById('displayAge').innerText = age;
                    dobError.innerText = '';
                });
                p.replaceWith(input);

                // DOB error div
                var dobError = document.createElement('div');
                dobError.style.color = 'red';
                dobError.style.fontSize = '0.85em';
                input.after(dobError);
            } else if (key === 'age') return;
            else {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = 'edit-' + key;
                input.value = p.innerText;
                p.replaceWith(input);
            }
        });

        // Name
        const nameInput = document.getElementById('edit-name');
        if (nameInput) {
            const nameError = document.createElement('div');
            nameError.style.color = 'red';
            nameError.style.fontSize = '0.85em';
            nameError.style.marginTop = '2px';
            nameInput.after(nameError);

          nameInput.addEventListener('input', () => {
    const val = nameInput.value.trim();
    const nameRegex = /^[A-Za-z\s]{3,}$/;
    if (!val) nameError.innerText = "Name cannot be empty";
    else if (val.length < 3) nameError.innerText = "Name must be at least 3 characters";
    else if (!nameRegex.test(val)) nameError.innerText = "Only letters and spaces allowed";
    else nameError.innerText = '';
});
        }

        // Email
        const emailInput = document.getElementById('edit-email');
        if (emailInput) {
            const emailError = document.createElement('div');
            emailError.style.color = 'red';
            emailError.style.fontSize = '0.85em';
            emailError.style.marginTop = '2px';
            emailInput.after(emailError);

            emailInput.addEventListener('input', () => {
                const val = emailInput.value.trim();
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
               const allowedDomains = ["gmail.com", "yahoo.com", "hotmail.com", "outlook.com"];
let errorMsg = '';
if (!val) errorMsg = "Email is required";
else if (!regex.test(val)) errorMsg = "Invalid email format";
else if (!allowedDomains.includes(val.split("@")[1].toLowerCase())) errorMsg = "Only gmail, yahoo, hotmail, outlook allowed";
                emailError.innerText = errorMsg;
            });
        }

        const phoneInput = document.getElementById('edit-phone');
        if (phoneInput) {
            const phoneError = document.createElement('div');
            phoneError.style.color = 'red';
            phoneError.style.fontSize = '0.85em';
            phoneError.style.marginTop = '2px';
            phoneInput.after(phoneError);

            phoneInput.addEventListener('input', () => {
    const val = phoneInput.value.trim();
    const phoneRegex = /^03[0-9]{9}$/;
    if (!val) phoneError.innerText = "Phone number required";
    else if (!phoneRegex.test(val)) phoneError.innerText = "Use 03XXXXXXXXX format";
    else phoneError.innerText = '';
});
        }

        const cnicInput = document.getElementById('edit-cnic');
        if (cnicInput) {
            const cnicError = document.createElement('div');
            cnicError.style.color = 'red';
            cnicError.style.fontSize = '0.85em';
            cnicError.style.marginTop = '2px';
            cnicInput.after(cnicError);

            cnicInput.addEventListener('input', () => {
    const val = cnicInput.value.trim();
    const regex = /^[0-9]{13}$|^[0-9]{5}-[0-9]{7}-[0-9]{1}$/;
    if (!val) cnicError.innerText = "CNIC required";
    else if (!regex.test(val)) cnicError.innerText = "Use 13 digits or 12345-1234567-1";
    else cnicError.innerText = '';
});
        }

        ['edit-new-password', 'edit-password-confirm'].forEach(id => {
            const input = document.getElementById(id);
            if (!input) return;
            const div = document.createElement('div');
            div.style.color = 'red';
            div.style.fontSize = '0.85em';
            div.style.marginTop = '2px';
            input.after(div);

            input.addEventListener('input', () => {
                const np = document.getElementById('edit-new-password')?.value;
                const cp = document.getElementById('edit-password-confirm')?.value;
                const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
                if (input.id === 'edit-new-password') {
                    div.innerText = !regex.test(np) ? "Must be 6+ chars, uppercase, lowercase, number & special char" : '';
                } else if (input.id === 'edit-password-confirm') {
                    div.innerText = (np && cp && np !== cp) ? "Passwords do not match" : '';
                }
            });
        });

    } else {
        updateProfile();
    }
}

function updateProfile() {
    const btn = document.querySelector('.edit-button');
    const errorDivs = document.querySelectorAll('.profile-info div, #password-fields div');
    for (const err of errorDivs) {
        if (err.innerText.trim() !== '') {
            alert("Please fix errors before updating your profile.");
            return;
        }
    }

    const getInput = id => document.getElementById(id) ? document.getElementById(id).value : '';
    const dobValue = getInput('edit-dob');
    const calculatedAge = dobValue ? (() => {
        const dob = new Date(dobValue);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const monthDiff = today.getMonth() - dob.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
        return age;
    })() : '';

const updatedData = {
    name: getInput('edit-name'),
    email: getInput('edit-email'),
    phone: getInput('edit-phone'),
    dob: dobValue,
    cnic: getInput('edit-cnic'),  
    gender: getInput('edit-gender'),
    age: calculatedAge  
};

if (!/^[A-Za-z\s]{3,}$/.test(updatedData.name)) {
    alert("Name must be letters only, min 3 characters");
    return;
}
if (!/^03[0-9]{9}$/.test(updatedData.phone)) {
    alert("Invalid phone number (use 03XXXXXXXXX)");
    return;
}
if (!/^[0-9]{13}$|^[0-9]{5}-[0-9]{7}-[0-9]{1}$/.test(updatedData.cnic)) {
    alert("Invalid CNIC format");
    return;
}
if (updatedData.age < 18 || updatedData.age > 120) {
    alert("Age must be between 18 and 120");
    return;
}

// Continue with existing code...
showLoader();

  
    const passwordFields = document.getElementById('password-fields');
    if (passwordFields.style.display === 'block') {
        const currentPassword = getInput('edit-current-password');
        const newPassword = getInput('edit-new-password');
        const confirmPassword = getInput('edit-password-confirm');

        if (currentPassword || newPassword || confirmPassword) {
            if (!currentPassword || !newPassword || !confirmPassword) {
                return alert("Please fill all password fields to change password.");
            }
            if (newPassword !== confirmPassword) return alert("New password and confirmation do not match.");
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
            if (!passwordRegex.test(newPassword)) return alert("Password must be at least 6 characters long and include uppercase, lowercase, number, and special character.");
            updatedData.password = newPassword;
            updatedData.currentPassword = currentPassword;
        }
    }

    showLoader();
    const token = localStorage.getItem('authToken');

    fetch('http://localhost:3000/user/update', {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify(updatedData),
    })
    .then(response => { if (!response.ok) throw new Error('Failed to update profile'); return response.json(); })
    .then(data => {
        alert(data.message);

        ['name','email','phone','dob','gender','age','cnic'].forEach(key => {
            const input = document.getElementById('edit-' + key);
            if (!input) return;
            const p = document.createElement('p');
            p.id = 'display' + key.charAt(0).toUpperCase() + key.slice(1);
            p.innerText = updatedData[key];
            input.replaceWith(p);
        });

        ['edit-current-password','edit-new-password','edit-password-confirm'].forEach(id => {
            const input = document.getElementById(id);
            if (input) input.remove();
        });

        btn.innerText = 'Edit Profile';
        hideLoader();
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred while updating your profile. Please try again.');
        hideLoader();
    });
}

function showLoader() { document.getElementById('loader').style.display = 'block'; }
function hideLoader() { document.getElementById('loader').style.display = 'none'; }
async function updateUnreadCount() {
    const token = localStorage.getItem('authToken');
    if (!token) return;

    try {
        const res = await fetch('http://localhost:3000/user/chat/unread-count', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const count = data.unreadCount || 0;

        const badge = document.getElementById('unreadCount');
        badge.innerText = count > 0 ? count : '';
        badge.style.display = count > 0 ? 'flex' : 'none';

    } catch (err) {
        console.error('Error fetching unread count:', err);
    }
}
updateUnreadCount();


</script>
<script src="http://localhost:3000/socket.io/socket.io.js"></script>

<script>
  const socket = io("http://localhost:3000");
  socket.on("new_message", () => {
    const badge = document.getElementById("unreadCount");

    let current = parseInt(badge.innerText) || 0;
    current++;

    badge.innerText = current;
    badge.style.display = "flex";
});

  document.addEventListener("DOMContentLoaded", () => {
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("userRole");

    if (userId && role) {
      console.log(" Reconnecting user:", userId, role);
      socket.emit("join_user", { userId, role });
    }
  });
</script>
