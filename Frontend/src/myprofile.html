    document.addEventListener('DOMContentLoaded', () => {
        const changePasswordBtn = document.getElementById('change-password-btn');
        const passwordFields = document.getElementById('password-fields');
        const bar = document.getElementById('bar');
        const menu = document.querySelector('nav ul');

        // Toggle password fields only if Edit Profile is active
        changePasswordBtn.addEventListener('click', () => {
            const btn = document.querySelector('.edit-button');
            if (btn.innerText === 'Update') {
                passwordFields.style.display = passwordFields.style.display === 'none' ? 'block' : 'none';
            } else {
                alert('Click "Edit Profile" first to change password.');
            }
        });

        // Mobile menu toggle
        bar.addEventListener('click', function () {
            menu.classList.toggle('active');
        });
    });

    window.onload = function () {
        showLoader();
        const token = localStorage.getItem('authToken');
        if (!token) {
            alert("You are not logged in. Redirecting to login page.");
            window.location.href = 'login.html';
            return;
        }

        fetch('http://localhost:3000/user/profile', {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(response => { if (!response.ok) throw new Error('Unauthorized or bad token'); return response.json(); })
            .then(data => {
                document.getElementById('displayName').innerText = data.name || '';
                document.getElementById('displayEmail').innerText = data.email || '';
                document.getElementById('displayPhone').innerText = data.phone || '';
                document.getElementById('displayAge').innerText = data.age || '';
                document.getElementById('displayDob').innerText = data.dob || '';
                document.getElementById('displayGender').innerText = data.gender || 'male';
                document.getElementById('displayCnic').innerText = data.cnic || '';

                hideLoader();
            })
            .catch(error => {
                console.error('Error fetching user profile:', error);
                alert('Could not load profile data. Please try again.');
            });
    };

function toggleEditForm() {
    const btn = document.querySelector('.edit-button');
    const profileInfo = document.querySelector('.profile-info');
    const passwordContainer = document.getElementById('password-change-container');
    const passwordFields = document.getElementById('password-fields');

    if (btn.innerText === 'Edit Profile') {
        btn.innerText = 'Update';
        passwordContainer.style.display = 'block';
        passwordFields.style.display = 'none';

        profileInfo.querySelectorAll('p').forEach(p => {
            const label = p.previousElementSibling.innerText.toLowerCase().replace(/[^a-z]/g, '');
            const key = { cnic: 'cnic', name: 'name', email: 'email', phone: 'phone', phonenumber: 'phone', age: 'age', dob: 'dob', dateofbirth: 'dob', gender: 'gender' }[label] || label;

            if (key === 'gender') {
                const select = document.createElement('select');
                select.id = 'edit-' + key;
                select.value = p.innerText.toLowerCase();
                select.innerHTML = `<option value="male">Male</option><option value="female">Female</option><option value="other">Other</option>`;
                p.replaceWith(select);
            } else if (key === 'dob') {
                const input = document.createElement('input');
                input.type = 'date';
                input.id = 'edit-dob';
                input.value = p.innerText;
                input.addEventListener('change', () => {
                    const dob = new Date(input.value);
                    const today = new Date();
                    if (dob > today) return alert("Date of Birth cannot be in the future.");
                    let age = today.getFullYear() - dob.getFullYear();
                    const monthDiff = today.getMonth() - dob.getMonth();
                    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
                    document.getElementById('displayAge').innerText = age;
                });
                p.replaceWith(input);
            } else if (key === 'age') return;
            else {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = 'edit-' + key;
                input.value = p.innerText;
                p.replaceWith(input);
            }
        });

        /*** LIVE VALIDATION SECTION - ADD AFTER THE FOR-EACH LOOP ***/

        // NAME VALIDATION
        const nameInput = document.getElementById('edit-name');
        if (nameInput) {
            const nameError = document.createElement('div');
            nameError.style.color = 'red';
            nameError.style.fontSize = '0.85em';
            nameError.style.marginTop = '2px';
            nameInput.after(nameError);
            nameInput.addEventListener('input', () => {
                nameError.innerText = nameInput.value.trim() === '' ? "❌ Name cannot be empty" : '';
            });
        }

        // EMAIL VALIDATION
        const emailInput = document.getElementById('edit-email');
        if (emailInput) {
            const emailError = document.createElement('div');
            emailError.style.color = 'red';
            emailError.style.fontSize = '0.85em';
            emailError.style.marginTop = '2px';
            emailInput.after(emailError);
            emailInput.addEventListener('input', () => {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                emailError.innerText = !emailRegex.test(emailInput.value.trim()) ? "❌ Invalid email" : '';
            });
        }

        // PHONE VALIDATION
        const phoneInput = document.getElementById('edit-phone');
        if (phoneInput) {
            const phoneError = document.createElement('div');
            phoneError.style.color = 'red';
            phoneError.style.fontSize = '0.85em';
            phoneError.style.marginTop = '2px';
            phoneInput.after(phoneError);
            phoneInput.addEventListener('input', () => {
                const phoneRegex = /^(03\d{9}|0\d{2,3}\d{7})$/;
                phoneError.innerText = !phoneRegex.test(phoneInput.value.trim()) ? "❌ Invalid phone number" : '';
            });
        }

        // CNIC VALIDATION

        //         cnicError.innerText = !cnicRegex.test(cnicInput.value.trim()) ? "❌ Invalid CNIC" : '';
        //     });
        // }
const cnicInput = document.getElementById('edit-cnic');
if (cnicInput) {
    const cnicError = document.createElement('div');
    cnicError.style.color = 'red';
    cnicError.style.fontSize = '0.85em';
    cnicError.style.marginTop = '2px';
    cnicInput.after(cnicError);

    cnicInput.addEventListener('input', () => {
        // Accept either 13 digits OR 5-7-1 with dashes
        const cnicRegex = /^([0-9]{13}|[0-9]{5}-[0-9]{7}-[0-9]{1})$/;
        cnicError.innerText = !cnicRegex.test(cnicInput.value.trim())
            ? "❌ Invalid CNIC (must be 13 digits or 5-7-1 format with dashes)"
            : '';
    });
}

        // DOB VALIDATION (AGE AUTOMATICALLY UPDATED)
        const dobInput = document.getElementById('edit-dob');
        if (dobInput) {
            const dobError = document.createElement('div');
            dobError.style.color = 'red';
            dobError.style.fontSize = '0.85em';
            dobError.style.marginTop = '2px';
            dobInput.after(dobError);
            dobInput.addEventListener('change', () => {
                const dob = new Date(dobInput.value);
                const today = new Date();
                if (dob > today) dobError.innerText = "❌ DOB cannot be in the future";
                else dobError.innerText = '';
            });
        }

    } else {
        updateProfile();
    }
}

    function updateProfile() {
        const btn = document.querySelector('.edit-button');
        const errorDivs = document.querySelectorAll('.profile-info div');
    for (const err of errorDivs) {
        if (err.innerText.trim() !== '') {
            alert("Please fix errors before updating your profile.");
            return; // stop execution
        }
    }
        const getInput = id => document.getElementById(id) ? document.getElementById(id).value : '';

        const dobValue = getInput('edit-dob');
        const calculatedAge = dobValue ? (() => {
            const dob = new Date(dobValue);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
            return age;
        })() : '';
        const cnicValue = getInput('edit-cnic');
const cnicRegex = /^[0-9]{5}-[0-9]{7}-[0-9]{1}$/;  // e.g. 12345-1234567-1
if (cnicValue && !cnicRegex.test(cnicValue)) {
    return alert("Please enter a valid CNIC (e.g. 12345-1234567-1).");
}


        const updatedData = {
            name: getInput('edit-name'),
            email: getInput('edit-email'),
            phone: getInput('edit-phone'),
            dob: dobValue,
            cnic: cnicValue,
            gender: getInput('edit-gender'),
            age: calculatedAge
        };
        // Validate DOB
        if (dobValue) {
            const dob = new Date(dobValue);
            const today = new Date();
            if (dob > today) {
                return alert("Date of Birth cannot be in the future.");
            }
        }

        // Inside updateProfile(), before sending fetch request
        const phoneNumber = getInput('edit-phone');

        // Pakistani mobile or PTCL validation
        const phoneRegex = /^(03\d{9}|0\d{2,3}\d{7})$/;
        if (!phoneRegex.test(phoneNumber)) {
            return alert("Please enter a valid Pakistani mobile (03XXXXXXXXX) or PTCL number.");
        }


        // Include password only if visible and filled
        const passwordFields = document.getElementById('password-fields');
        if (passwordFields.style.display === 'block') {
            const currentPassword = getInput('edit-current-password');
            const newPassword = getInput('edit-new-password');
            const confirmPassword = getInput('edit-password-confirm');

            if (currentPassword || newPassword || confirmPassword) {
                if (!currentPassword || !newPassword || !confirmPassword) {
                    return alert("Please fill all password fields to change password.");
                }
                if (newPassword !== confirmPassword) return alert("New password and confirmation do not match.");
                const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
                if (!passwordRegex.test(newPassword)) return alert("Password must be at least 6 characters long and include uppercase, lowercase, number, and special character.");
                updatedData.password = newPassword;
                updatedData.currentPassword = currentPassword;
            }
        }

        showLoader();
        const token = localStorage.getItem('authToken');

        fetch('http://localhost:3000/user/update', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify(updatedData),
        })
            .then(response => { if (!response.ok) throw new Error('Failed to update profile'); return response.json(); })
            .then(data => {
                alert(data.message);

                // Remove password fields
                ['edit-current-password', 'edit-new-password', 'edit-password-confirm'].forEach(id => {
                    const input = document.getElementById(id);
                    const label = input ? input.previousElementSibling : null;
                    if (input) input.remove();
                    if (label) label.remove();
                });

                // Replace other inputs back to <p>
                for (const key of ['name', 'email', 'phone', 'dob', 'gender', 'age']) {
                    const input = document.getElementById('edit-' + key);
                    if (!input) continue;
                    const p = document.createElement('p');
                    p.id = 'display' + key.charAt(0).toUpperCase() + key.slice(1);
                    p.innerText = updatedData[key];
                    input.replaceWith(p);
                }

                btn.innerText = 'Edit Profile';
                hideLoader();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while updating your profile. Please try again.');
                hideLoader();
            });
    }

    function showLoader() {
        document.getElementById('loader').style.display = 'block';
    }

    function hideLoader() {
        document.getElementById('loader').style.display = 'none';
    }
</script>
