<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Doctors - Prescripto Admin Panel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        background-color: #e6f2ff;
      }

      /* Sidebar */
      .sidebar {
        width: 250px;
        background-color: rgb(9, 102, 102);
        padding: 20px 0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
        margin: 10px 0;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        border-radius: 6px;
        padding: 10px 15px;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #e8f0fe;
        color: #007bff;
        font-weight: bold;
      }

      /* Content */
      .content {
        flex: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        border-radius: 12px;
        transition: background-color 0.3s ease;
      }

      .content:hover {
        background-color: #d8eaf8;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background-color: rgb(9, 102, 102);
        color: white;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        transition: background-color 0.3s ease;
      }

      .header:hover {
        background-color: #075b5b;
      }

      .header h1 {
        font-size: 24px;
        margin: 0;
      }

      /* Menu Bar Icon */
      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      #bar:hover {
        color: #28a745;
      }

      /* Logout Button */
      .logout-button {
        background-color: #28a745;
        color: #fff;
        padding: 10px 16px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 3px 6px rgba(40, 167, 69, 0.4);
      }

      .logout-button:hover {
        background-color: #b02a37;
        box-shadow: 0 5px 12px rgba(176, 42, 55, 0.7);
      }

      /* Doctor Cards Container */
      .doctor-list {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px 24px;
      }

      /* Individual Card */
      .card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.07);
        padding: 20px;
        max-width: calc(33.333% - 20px);
        flex: 1 1 calc(33.333% - 20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.2s ease, box-shadow 0.2s ease,
          border-color 0.3s ease;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 4px 8px 18px rgba(0, 0, 0, 0.12);
        border-color: rgb(9, 102, 102);
      }

      /* Card Image */
      .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 2px solid transparent;
        transition: border-color 0.3s ease;
      }

      .card:hover img {
        border-color: rgb(9, 102, 102);
      }

      /* Doctor Info */
      .doctor-name {
        font-size: 20px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 5px;
      }

      .specialty {
        font-size: 16px;
        font-weight: 600;
        color: #00796b;
        margin-bottom: 5px;
      }

      .experience,
      .rating,
      .about {
        font-size: 14px;
        color: #555555;
        margin-bottom: 5px;
      }

      /* Rating Stars Color */
      .rating {
        color: #f5c518;
        font-weight: 600;
      }

      /* Button Group */
      button {
        margin: 8px 10px;
        padding: 10px 15px;
        background-color: #006d6d;
        color: #fff;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      button:hover {
        background-color: #009688;
        transform: scale(1.05);
      }
      .btn-edit {
        background-color: #007bff;
      }

      .btn-edit:hover {
        background-color: #0056b3;
      }

      .btn-delete {
        background-color: #dc3545;
      }

      .btn-delete:hover {
        background-color: #a71d2a;
      }

      /* Scrollbar for Sidebar */
      nav::-webkit-scrollbar {
        width: 6px;
      }

      nav::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.1);
        border-radius: 6px;
      }
      /* Overlay */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
        transition: opacity 0.3s ease;
      }

      #overlay.active {
        display: block;
        opacity: 1;
      }
      .specialty {
        text-transform: lowercase;
      }

      .specialty::first-letter {
        text-transform: uppercase;
      }

      @media (max-width: 1024px) {
        .card {
          max-width: calc(50% - 20px);
          flex: 1 1 calc(50% - 20px);
        }
      }

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          display: none;
          position: fixed;
          top: 0;
          left: -250px;
          height: 100%;
          z-index: 1000;
          transition: left 0.3s ease-in-out;
        }

        .sidebar.active {
          display: flex;
          left: 0;
        }

        #bar {
          display: block;
          background: none;
          border: none;
          color: white;
          font-size: 26px;
          cursor: pointer;
        }

        #bar:focus {
          outline: none;
        }

        .header {
          flex-direction: row;
          gap: 20px;
          font-size: 22px;
          align-items: flex-start;
        }

        .doctor-list {
          padding: 10px;
        }

        .card {
          max-width: 100%;
          flex: 1 1 100%;
        }

        .modal-content {
          width: 90%;
        }

        #logoutBtn {
          margin-left: auto;
        }
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 20px;
        }

        .logout-button {
          padding: 8px 12px;
          font-size: 14px;
        }

        .card {
          padding: 15px;
        }

        .doctor-name {
          font-size: 18px;
        }

        .specialty,
        .experience,
        .rating,
        .about {
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
      </ul>
    </div>
    <div id="overlay"></div>
    <div class="content">
      <div class="header">
        <i id="bar" class="fa-solid fa-bars"></i>
        <h1>All Doctors</h1>
        <button id="logoutBtn" class="logout-button">Logout</button>
      </div>

      <div class="doctor-list" id="doctorList">
        <!-- Doctor cards will be dynamically inserted here -->
      </div>
    </div>

    <script>
      const bar = document.getElementById("bar");
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.getElementById("overlay");

      bar.addEventListener("click", function () {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", function () {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
      const apiBaseUrl = "http://localhost:3000/api/doctors";
      // Get user role from localStorage or token (example assumes localStorage)
      const userRole = localStorage.getItem("userRole") || "patient";

      // Logout button handler
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("authToken");
        localStorage.removeItem("userRole");
        window.location.href = "login.html";
      });

      // Fetch and render doctors
      async function fetchDoctors() {
        try {
          const response = await fetch(apiBaseUrl);
          if (!response.ok) throw new Error("Failed to fetch doctors");
          const doctors = await response.json();
          renderDoctors(doctors);
        } catch (error) {
          alert(error.message);
        }
      }

      // Render doctor cards with role-based UI and search filter
      function renderDoctors(doctors) {
        const doctorList = document.getElementById("doctorList");
        doctorList.innerHTML = "";
        const searchInput = document.getElementById("search-input");
        const filterText = searchInput ? searchInput.value.toLowerCase() : "";

        const filteredDoctors = doctors.filter((doctor) => {
          const nameMatch =
            doctor.name && doctor.name.toLowerCase().includes(filterText);
          const specialityMatch =
            doctor.speciality &&
            doctor.speciality.toLowerCase().includes(filterText);
          return nameMatch || specialityMatch;
        });

        filteredDoctors.forEach((doctor) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.id = doctor._id;

          let buttonsHtml = "";
          if (userRole === "admin") {
            buttonsHtml = `
                            <div class="btn-group">
                            <button class="btn btn-edit" onclick="goToDoctorProfile('${doctor._id}')">Edit</button>
                            <button class="btn btn-delete" onclick="deleteDoctor('${doctor._id}')">Delete</button>
                            <button class="btn btn-appointments" onclick="seeAppointments('${doctor._id}')">See Appointments</button>

                            </div>`;
          } else {
            buttonsHtml = "";
          }

          card.innerHTML = `
    <a href="doctor.html?id=${
      doctor._id
    }" style="text-decoration: none; color: inherit;">
        ${
          doctor.photo
            ? `<img src="http://localhost:3000/uploads/${doctor.photo}" alt="${doctor.name}" />`
            : ""
        }
        <div class="doctor-info">
            <p class="doctor-name">${doctor.name}</p>
            <p class="specialty">${doctor.speciality}</p>
            <p class="experience">Experience: ${doctor.experience} Years</p>
            <p class="about">${doctor.about || ""}</p>
        </div>
    </a>
    ${buttonsHtml}
`;

          doctorList.appendChild(card);
        });
      }

      function seeAppointments(doctorId) {
        if (!doctorId) return alert("Invalid doctor ID");
        window.location.href = `doctor-appointments.html?doctorId=${doctorId}`;
      }

      function goToDoctorProfile(doctorId) {
        if (!doctorId) return alert("Invalid doctor ID");
        window.location.href = `doctor.html?id=${doctorId}`;
      }
      // Delete doctor
      async function deleteDoctor(doctorId) {
        if (!confirm("Are you sure you want to delete this doctor?")) return;

        try {
          const token = localStorage.getItem("authToken");
          if (!token) {
            alert("Authentication token missing. Please login again.");
            window.location.href = "login.html";
            return;
          }

          const response = await fetch(`${apiBaseUrl}/${doctorId}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (response.status === 403) {
            alert("Session expired or unauthorized. Please login again.");
            localStorage.removeItem("authToken");
            localStorage.removeItem("userRole");
            window.location.href = "login.html";
            return;
          }

          if (!response.ok) throw new Error("Failed to delete doctor");

          alert("Doctor deleted successfully");
          fetchDoctors();
        } catch (error) {
          alert(error.message);
        }
      }

      // Initial fetch
      fetchDoctors();

      // Add event listener for search input to filter doctors dynamically
      const searchInput = document.getElementById("search-input");
      if (searchInput) {
        searchInput.addEventListener("input", () => {
          fetchDoctors();
        });
      }
    </script>
  </body>
</html>
