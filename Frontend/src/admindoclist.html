<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        background-color: #e6f2ff;
      }

      /* Sidebar */
      .sidebar {
        width: 250px;
        background-color: rgb(9, 102, 102);
        padding: 20px 0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
        margin: 10px 0;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        border-radius: 6px;
        padding: 10px 15px;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #e8f0fe;
        color: #007bff;
        font-weight: bold;
      }

      /* Content */
      .content {
        flex: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        border-radius: 12px;
        transition: background-color 0.3s ease;
      }

      .content:hover {
        background-color: #d8eaf8;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background-color: rgb(9, 102, 102);
        color: white;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        transition: background-color 0.3s ease;
      }

      .header:hover {
        background-color: #075b5b;
      }

      .header h1 {
        font-size: 24px;
        margin: 0;
      }

      /* Menu Bar Icon */
      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      #bar:hover {
        color: #28a745;
      }

      .logout-button {
        background-color: #28a745;
        color: #fff;
        padding: 10px 16px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition:
          background-color 0.3s ease,
          box-shadow 0.3s ease;
        box-shadow: 0 3px 6px rgba(40, 167, 69, 0.4);
      }

      .logout-button:hover {
        background-color: #b02a37;
        box-shadow: 0 5px 12px rgba(176, 42, 55, 0.7);
      }

      .doctor-list {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px 24px;
      }

      .card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.07);
        padding: 20px;
        max-width: calc(33.333% - 20px);
        flex: 1 1 calc(33.333% - 20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.3s ease;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 4px 8px 18px rgba(0, 0, 0, 0.12);
        border-color: rgb(9, 102, 102);
      }

      .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 2px solid transparent;
        transition: border-color 0.3s ease;
      }

      .card:hover img {
        border-color: rgb(9, 102, 102);
      }

      .doctor-name {
        font-size: 20px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 5px;
      }

      .specialty {
        font-size: 16px;
        font-weight: 600;
        color: #00796b;
        margin-bottom: 5px;
      }

      .experience,
      .rating,
      .about {
        font-size: 14px;
        color: #555555;
        margin-bottom: 5px;
      }

      .rating {
        color: #f5c518;
        font-weight: 600;
      }

      button {
        margin: 8px 10px;
        padding: 10px 15px;
        background-color: #006d6d;
        color: #fff;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      button:hover {
        background-color: #009688;
        transform: scale(1.05);
      }
      .btn-edit {
        background-color: #007bff;
      }

      .btn-edit:hover {
        background-color: #0056b3;
      }

      .btn-delete {
        background-color: #dc3545;
      }

      .btn-delete:hover {
        background-color: #a71d2a;
      }

      nav::-webkit-scrollbar {
        width: 6px;
      }

      nav::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.1);
        border-radius: 6px;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
        transition: opacity 0.3s ease;
      }

      #overlay.active {
        display: block;
        opacity: 1;
      }
      .specialty {
        text-transform: lowercase;
      }

      .specialty::first-letter {
        text-transform: uppercase;
      }

      @media (max-width: 1024px) {
        .card {
          max-width: calc(50% - 20px);
          flex: 1 1 calc(50% - 20px);
        }
      }

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          display: none;
          position: fixed;
          top: 0;
          left: -250px;
          height: 100%;
          z-index: 1000;
          transition: left 0.3s ease-in-out;
        }

        .sidebar.active {
          display: flex;
          left: 0;
        }

        #bar {
          display: block;
          background: none;
          border: none;
          color: white;
          font-size: 26px;
          cursor: pointer;
        }

        #bar:focus {
          outline: none;
        }

        .header {
          flex-direction: row;
          gap: 20px;
          font-size: 22px;
          align-items: flex-start;
        }

        .doctor-list {
          padding: 10px;
        }

        .card {
          max-width: 100%;
          flex: 1 1 100%;
        }

        .modal-content {
          width: 90%;
        }

        #logoutBtn {
          margin-left: auto;
        }
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 20px;
        }

        .logout-button {
          padding: 8px 12px;
          font-size: 14px;
        }

        .card {
          padding: 15px;
        }

        .doctor-name {
          font-size: 18px;
        }

        .specialty,
        .experience,
        .rating,
        .about {
          font-size: 13px;
        }
      }
      #overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      #overlay.active {
        display: flex;
      }

      .loader {
        border: 6px solid #f3f3f3;
        border-top: 6px solid #006d6d;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      /* Search Bar Styles */
      .search-container {
        margin: 20px 24px;
      }

      #searchInput {
        width: 100%;
        padding: 12px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 30px;
        font-size: 16px;
        transition: all 0.3s ease;
        outline: none;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      #searchInput:focus {
        border-color: #006d6d;
        box-shadow: 0 2px 10px rgba(0, 109, 109, 0.2);
      }

      #searchInput::placeholder {
        color: #999;
        font-weight: 400;
      }

      /* Responsive for mobile */
      @media (max-width: 768px) {
        .search-container {
          margin: 15px;
        }

        #searchInput {
          padding: 10px 15px;
          font-size: 14px;
        }
      }
      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: white;
        width: 90%;
        max-width: 800px;
        max-height: 85vh;
        border-radius: 12px;
        overflow: hidden;
        animation: modalSlideIn 0.3s ease;
      }

      @keyframes modalSlideIn {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        background-color: #166e6b;
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h2 {
        margin: 0;
        font-size: 22px;
        color: white;
      }

      .close-modal {
        font-size: 28px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .close-modal:hover {
        color: #ff9999;
        transform: scale(1.1);
      }

      .modal-tabs {
        display: flex;
        background-color: #f0f0f0;
        border-bottom: 2px solid #ddd;
      }

      .tab-btn {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #666;
      }

      .tab-btn.active {
        background-color: white;
        color: #166e6b;
        border-bottom: 3px solid #166e6b;
      }

      .tab-btn:hover:not(.active) {
        background-color: #e0e0e0;
      }

      .modal-body {
        padding: 20px;
        max-height: 60vh;
        overflow-y: auto;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .doctor-detail {
        margin-bottom: 15px;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }

      .doctor-detail strong {
        display: inline-block;
        width: 130px;
        color: #166e6b;
      }

      .doctor-detail span {
        color: #555;
      }

      .modal-doctor-img {
        text-align: center;
        margin-bottom: 20px;
      }

      .modal-doctor-img img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #166e6b;
      }

      .feedback-item-modal {
        padding: 12px;
        border-bottom: 1px solid #eee;
        margin-bottom: 10px;
      }

      .feedback-item-modal h4 {
        margin: 0 0 5px;
        color: #166e6b;
      }

      .feedback-rating {
        color: #ffc107;
        margin-bottom: 8px;
      }

      .feedback-comment {
        color: #555;
        margin: 5px 0;
      }

      .feedback-date {
        font-size: 12px;
        color: #999;
      }

      .no-feedback {
        text-align: center;
        padding: 40px;
        color: #999;
      }

      .loading-feedback {
        text-align: center;
        padding: 20px;
        color: #166e6b;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
        <li><a href="adminprofile.html">Profile</a></li>
      </ul>
    </div>
    <div id="overlay">
      <div class="loader"></div>
    </div>
    <div class="content">
      <div class="header">
        <i id="bar" class="fa-solid fa-bars"></i>
        <h1>All Doctors</h1>
        <button id="logoutBtn" class="logout-button">Logout</button>
      </div>
      <!-- Search Bar Section -->
      <div class="search-container" style="margin: 20px 24px">
        <input
          type="text"
          id="searchInput"
          placeholder=" Search by doctor name or specialty..."
          style="
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
          "
          onfocus="this.style.borderColor = '#006d6d'"
          onblur="this.style.borderColor = '#ddd'"
        />
      </div>
      <div class="doctor-list" id="doctorList">
        <!-- Doctor cards will be dynamically inserted here -->
      </div>
    </div>

    <!-- Modal -->
    <div id="doctorModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalDoctorName">Doctor Details</h2>
          <span class="close-modal">&times;</span>
        </div>
        <div class="modal-tabs">
          <button class="tab-btn active" data-tab="details">Details</button>
          <button class="tab-btn" data-tab="feedbacks">Feedbacks</button>
        </div>
        <div class="modal-body">
          <div id="detailsTab" class="tab-content active">
            <div id="doctorDetails"></div>
          </div>
          <div id="feedbacksTab" class="tab-content">
            <div id="feedbacksList"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const bar = document.getElementById("bar");
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.getElementById("overlay");

      bar.addEventListener("click", function () {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", function () {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
      const apiBaseUrl = "http://localhost:3000/api/doctors";
      const userRole = localStorage.getItem("userRole") || "patient";

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("authToken");
        localStorage.removeItem("userRole");
        window.location.href = "login.html";
      });
      // Search functionality
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", function () {
          const searchTerm = this.value.toLowerCase().trim();
          const cards = document.querySelectorAll(".card");

          cards.forEach((card) => {
            const doctorName =
              card.querySelector(".doctor-name")?.textContent.toLowerCase() ||
              "";
            const specialty =
              card.querySelector(".specialty")?.textContent.toLowerCase() || "";

            if (
              doctorName.includes(searchTerm) ||
              specialty.includes(searchTerm)
            ) {
              card.style.display = "flex";
            } else {
              card.style.display = "none";
            }
          });
        });
      }

      async function fetchDoctors() {
        try {
          const response = await fetch(apiBaseUrl);
          if (!response.ok) throw new Error("Failed to fetch doctors");
          const doctors = await response.json();
          renderDoctors(doctors);
        } catch (error) {
          alert(error.message);
        }
      }

      function renderDoctors(doctors) {
        const doctorList = document.getElementById("doctorList");
        doctorList.innerHTML = "";
        const searchInput = document.getElementById("searchInput");
        const filterText = searchInput ? searchInput.value.toLowerCase() : "";

        const filteredDoctors = doctors.filter((doctor) => {
          const nameMatch =
            doctor.name && doctor.name.toLowerCase().includes(filterText);
          const specialityMatch =
            doctor.speciality &&
            doctor.speciality.toLowerCase().includes(filterText);
          return nameMatch || specialityMatch;
        });

        filteredDoctors.forEach((doctor) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.id = doctor._id;
          card.style.cursor = "pointer";

          let buttonsHtml = "";
          if (userRole === "admin") {
            buttonsHtml = `
        <div class="btn-group">
          <button class="btn btn-delete" onclick="event.stopPropagation(); deleteDoctor('${doctor._id}')">Delete</button>
          <button class="btn btn-appointments" onclick="event.stopPropagation(); seeAppointments('${doctor._id}')">See Appointments</button>
        </div>`;
          } else {
            buttonsHtml = `<div class="btn-group">
        <button class="btn btn-appointments" onclick="event.stopPropagation(); seeAppointments('${doctor._id}')">Book Appointment</button>
      </div>`;
          }

          card.innerHTML = `
      ${doctor.photo ? `<img src="http://localhost:3000/uploads/${doctor.photo}" alt="${doctor.name}" />` : ""}
      <div class="doctor-info">
        <p class="doctor-name">${doctor.name}</p>
        <p class="specialty">${formatSpecialties(doctor.speciality)}</p>
        <p class="experience">Experience: ${doctor.experience} Years</p>
        <p class="about">${doctor.about || ""}</p>
      </div>
      ${buttonsHtml}
    `;

          card.addEventListener("click", (e) => {
            if (!e.target.closest(".btn-group")) {
              showDoctorModal(doctor._id);
            }
          });

          doctorList.appendChild(card);
        });
      }
      // Modal functions
      let currentDoctorId = null;

      async function showDoctorModal(doctorId) {
        currentDoctorId = doctorId;
        const modal = document.getElementById("doctorModal");
        const doctorDetailsDiv = document.getElementById("doctorDetails");
        const modalDoctorName = document.getElementById("modalDoctorName");

        modal.style.display = "flex";
        doctorDetailsDiv.innerHTML =
          '<div class="loading-feedback">Loading doctor details...</div>';

        try {
          const response = await fetch(
            `http://localhost:3000/api/doctors/${doctorId}`,
          );
          if (!response.ok) throw new Error("Failed to fetch doctor details");
          const doctor = await response.json();

          modalDoctorName.textContent = `Dr. ${doctor.name}`;

          doctorDetailsDiv.innerHTML = `
      ${doctor.photo ? `<div class="modal-doctor-img"><img src="http://localhost:3000/uploads/${doctor.photo}" alt="${doctor.name}"></div>` : ""}
      <div class="doctor-detail"><strong>Name:</strong> <span>Dr. ${doctor.name}</span></div>
      <div class="doctor-detail"><strong>Email:</strong> <span>${doctor.email || "N/A"}</span></div>
      <div class="doctor-detail"><strong>Specialty:</strong> <span>${formatSpecialties(doctor.speciality)}</span></div>
      <div class="doctor-detail"><strong>Degree:</strong> <span>${doctor.degree || "N/A"}</span></div>
      <div class="doctor-detail"><strong>Experience:</strong> <span>${doctor.experience} years</span></div>
      <div class="doctor-detail"><strong>Fees:</strong> <span>Rs. ${doctor.fees || "N/A"}</span></div>
      <div class="doctor-detail"><strong>About:</strong> <span>${doctor.about || "N/A"}</span></div>
      ${doctor.qualifications ? `<div class="doctor-detail"><strong>Qualifications:</strong> <span>${doctor.qualifications}</span></div>` : ""}
      ${doctor.services ? `<div class="doctor-detail"><strong>Services:</strong> <span>${doctor.services}</span></div>` : ""}
      ${doctor.conditions ? `<div class="doctor-detail"><strong>Conditions Treated:</strong> <span>${doctor.conditions}</span></div>` : ""}
      ${doctor.memberships ? `<div class="doctor-detail"><strong>Memberships:</strong> <span>${doctor.memberships}</span></div>` : ""}
      ${doctor.locations ? `<div class="doctor-detail"><strong>Locations:</strong> <span>${doctor.locations}</span></div>` : ""}
      <div class="doctor-detail"><strong>Average Rating:</strong> <span>${"★".repeat(Math.round(doctor.averageRating || 0))}${"☆".repeat(5 - Math.round(doctor.averageRating || 0))} (${doctor.feedbackCount || 0} reviews)</span></div>
    `;

          // Load feedbacks
          loadDoctorFeedbacks(doctorId);
        } catch (error) {
          doctorDetailsDiv.innerHTML = `<div class="no-feedback">Error loading doctor details: ${error.message}</div>`;
        }
      }

      async function loadDoctorFeedbacks(doctorId) {
        const feedbacksListDiv = document.getElementById("feedbacksList");
        feedbacksListDiv.innerHTML =
          '<div class="loading-feedback">Loading feedbacks...</div>';

        try {
          const response = await fetch(
            `http://localhost:3000/api/feedback/doctors/${doctorId}/feedback`,
          );
          if (!response.ok) throw new Error("Failed to fetch feedbacks");
          const feedbacks = await response.json();

          if (feedbacks.length === 0) {
            feedbacksListDiv.innerHTML =
              '<div class="no-feedback">No feedbacks available for this doctor.</div>';
            return;
          }

          feedbacksListDiv.innerHTML = "";
          feedbacks.forEach((feedback) => {
            const feedbackDiv = document.createElement("div");
            feedbackDiv.className = "feedback-item-modal";
            feedbackDiv.innerHTML = `
        <h4>${feedback.userName || "Anonymous Patient"}</h4>
        <div class="feedback-rating">${"★".repeat(feedback.rating)}${"☆".repeat(5 - feedback.rating)}</div>
        <div class="feedback-comment">${feedback.comment || "No comment provided."}</div>
        <div class="feedback-date">${new Date(feedback.timestamp).toLocaleDateString()}</div>
      `;
            feedbacksListDiv.appendChild(feedbackDiv);
          });
        } catch (error) {
          feedbacksListDiv.innerHTML = `<div class="no-feedback">Error loading feedbacks: ${error.message}</div>`;
        }
      }

      // Modal event listeners
      document.querySelector(".close-modal").addEventListener("click", () => {
        document.getElementById("doctorModal").style.display = "none";
      });

      window.addEventListener("click", (e) => {
        const modal = document.getElementById("doctorModal");
        if (e.target === modal) {
          modal.style.display = "none";
        }
      });

      // Tab switching
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const tabName = btn.dataset.tab;

          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".tab-content")
            .forEach((c) => c.classList.remove("active"));

          btn.classList.add("active");
          if (tabName === "details") {
            document.getElementById("detailsTab").classList.add("active");
          } else if (tabName === "feedbacks") {
            document.getElementById("feedbacksTab").classList.add("active");
            if (currentDoctorId) {
              loadDoctorFeedbacks(currentDoctorId);
            }
          }
        });
      });
      function seeAppointments(doctorId) {
        if (!doctorId) return alert("Invalid doctor ID");
        window.location.href = `doctor-appointments.html?doctorId=${doctorId}`;
      }

      function capitalizeFirstLetter(str) {
        if (!str) return "";
        return str
          .split(" ")
          .map(
            (word) =>
              word.charAt(0).toUpperCase() + word.slice(1).toLowerCase(),
          )
          .join(" ");
      }

      function formatSpecialties(speciality) {
        if (!speciality) return "Not specified";

        if (typeof speciality === "string") {
          try {
            const parsed = JSON.parse(speciality);
            if (Array.isArray(parsed)) {
              return parsed.map((s) => capitalizeFirstLetter(s)).join(", ");
            }
          } catch (e) {
            return capitalizeFirstLetter(speciality);
          }
        }

        if (Array.isArray(speciality)) {
          return speciality.map((s) => capitalizeFirstLetter(s)).join(", ");
        }

        return capitalizeFirstLetter(speciality);
      }
      async function deleteDoctor(doctorId) {
        if (!confirm("Are you sure you want to delete this doctor?")) return;

        const overlay = document.getElementById("overlay");

        try {
          overlay.classList.add("active");

          const token = localStorage.getItem("authToken");
          if (!token) {
            alert("Authentication token missing. Please login again.");
            window.location.href = "login.html";
            return;
          }

          const response = await fetch(`${apiBaseUrl}/${doctorId}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (response.status === 403) {
            alert("Session expired or unauthorized. Please login again.");
            localStorage.removeItem("authToken");
            localStorage.removeItem("userRole");
            window.location.href = "login.html";
            return;
          }

          if (!response.ok) throw new Error("Failed to delete doctor");

          alert("Doctor deleted successfully");
          fetchDoctors();
        } catch (error) {
          alert(error.message);
        } finally {
          overlay.classList.remove("active");
        }
      }

      fetchDoctors();
    </script>
  </body>
</html>
