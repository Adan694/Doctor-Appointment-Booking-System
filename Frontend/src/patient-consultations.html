<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Consultations - DocAssist</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #e6f2ff;
        padding: 20px;
      }
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background-color: rgb(9, 102, 102);
        color: white;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
      }
      .logo h1 {
        font-size: 24px;
      }
      nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
      }
      nav ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
      }
      .container {
        max-width: 800px;
        margin: 80px auto 20px;
        background: white;
        border-radius: 16px;
        padding: 25px;
      }
      h1 {
        color: #096666;
        margin-bottom: 20px;
      }
      .consultation-card {
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .consultation-card:hover {
        transform: translateX(5px);
      }
      .consultation-card.pending {
        border-left: 4px solid #ff9800;
        background: #fff8e1;
      }
      .consultation-card.accepted {
        border-left: 4px solid #4caf50;
        background: #e8f5e9;
      }
      .consultation-card.active {
        border-left: 4px solid #2196f3;
        background: #e3f2fd;
      }
      .consultation-card.completed {
        border-left: 4px solid #9e9e9e;
        background: #f5f5f5;
      }
      .consultation-card.rejected {
        border-left: 4px solid #ff4444;
        background: #ffebee;
      }
      .doctor-name {
        font-size: 18px;
        font-weight: 600;
      }
      .status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 10px;
      }
      .status-pending {
        background: #ff9800;
        color: white;
      }
      .status-accepted {
        background: #4caf50;
        color: white;
      }
      .status-active {
        background: #2196f3;
        color: white;
      }
      .status-completed {
        background: #9e9e9e;
        color: white;
      }
      .status-rejected {
        background: #ff4444;
        color: white;
      }
      .symptoms-preview {
        color: #666;
        font-size: 14px;
        margin-top: 8px;
      }
      .join-call-btn {
        background: #4caf50;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
        font-weight: 600;
      }
      .join-call-btn:hover {
        transform: translateY(-2px);
      }
      .waiting-badge {
        background: #ff9800;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-left: 10px;
      }
      .empty-state {
        text-align: center;
        padding: 60px;
        color: #999;
      }
      @media (max-width: 600px) {
        .container {
          margin: 70px 10px 20px;
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="images/Da.png" alt="DocAssist" />
        <h1>DocAssist</h1>
      </div>
      <ul>
        <li>
          <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </li>
        <li>
          <a href="Alldoctorsreal.html"
            ><i class="fas fa-user-md"></i> Find a Doctor</a
          >
        </li>
        <li>
          <a href="myappointments.html"
            ><i class="fas fa-calendar"></i> Appointments</a
          >
        </li>
        <li>
          <a href="myprofile.html"><i class="fas fa-user"></i> Profile</a>
        </li>
        <li>
          <a href="faqs.html"><i class="fas fa-question-circle"></i> FAQs</a>
        </li>
      </ul>
    </nav>

    <div class="container">
      <h1><i class="fas fa-video"></i> My Consultations</h1>
      <div id="consultationsList">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
      </div>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
      let socket = null;
      let refreshInterval = null;

      document.addEventListener("DOMContentLoaded", () => {
        initSocket();
        loadConsultations();
        refreshInterval = setInterval(loadConsultations, 5000);
      });

      function initSocket() {
        const userId = localStorage.getItem("userId");
        const userRole = localStorage.getItem("userRole");

        if (userId && userRole) {
          socket = io("http://localhost:3000");
          socket.on("connect", () => {
            socket.emit("join_user", { userId, role: userRole });
          });

          // Listen for consultation status updates
          socket.on("consultation_status_update", (data) => {
            if (data.patientId === localStorage.getItem("patientId")) {
              loadConsultations();
            }
          });
        }
      }

      async function loadConsultations() {
        const token = localStorage.getItem("authToken");
        const patientId = localStorage.getItem("patientId");

        if (!token || !patientId) {
          document.getElementById("consultationsList").innerHTML =
            '<div class="empty-state"><i class="fas fa-lock"></i> Please login to view consultations</div>';
          return;
        }

        try {
          // Get all consultations (both pending and history)
          const response = await fetch(
            `http://localhost:3000/api/consultation/patient/${patientId}/all`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          const data = await response.json();

          if (data.success && data.consultations.length > 0) {
            displayConsultations(data.consultations);
          } else {
            document.getElementById("consultationsList").innerHTML =
              '<div class="empty-state"><i class="fas fa-video-slash"></i> No consultations yet<br><small>Click "Consult Now" on any doctor to start</small></div>';
          }
        } catch (error) {
          console.error("Error loading consultations:", error);
          document.getElementById("consultationsList").innerHTML =
            '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Error loading consultations</div>';
        }
      }

      function displayConsultations(consultations) {
        const container = document.getElementById("consultationsList");

        // Sort: pending/accepted first, then by date
        const sorted = [...consultations].sort((a, b) => {
          const statusOrder = {
            pending: 0,
            accepted: 1,
            active: 2,
            completed: 3,
            rejected: 4,
          };
          if (statusOrder[a.status] !== statusOrder[b.status]) {
            return statusOrder[a.status] - statusOrder[b.status];
          }
          return new Date(b.createdAt) - new Date(a.createdAt);
        });

        container.innerHTML = sorted
          .map((consult) => {
            const statusClass =
              consult.status === "active" ? "active" : consult.status;
            const statusText = consult.status.toUpperCase();

            // Determine action button
            let actionButton = "";
            if (consult.status === "pending") {
              actionButton = `<span class="waiting-badge"><i class="fas fa-clock"></i> Waiting for doctor...</span>`;
            } else if (
              consult.status === "accepted" ||
              consult.status === "active"
            ) {
              actionButton = `<button class="join-call-btn" onclick="joinCall('${consult.roomId}')">
                                        <i class="fas fa-video"></i> Join Call Now
                                    </button>`;
            }

            return `
                    <div class="consultation-card ${consult.status}" onclick="viewConsultationDetails('${consult.roomId}')">
                        <div>
                            <span class="doctor-name">Dr. ${consult.doctorId?.name || "Doctor"}</span>
                            <span class="status status-${statusClass}">${statusText}</span>
                        </div>
                        <div class="symptoms-preview">
                            <i class="fas fa-stethoscope"></i> ${consult.symptoms.substring(0, 100)}${consult.symptoms.length > 100 ? "..." : ""}
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">
                            <i class="fas fa-calendar-alt"></i> Requested: ${new Date(consult.createdAt).toLocaleString()}
                        </div>
                        ${actionButton}
                    </div>
                `;
          })
          .join("");
      }

      function joinCall(roomId) {
        window.location.href = `patient-call.html?roomId=${roomId}`;
      }

      function viewConsultationDetails(roomId) {
        window.location.href = `patient-waiting.html?roomId=${roomId}`;
      }
    </script>
  </body>
</html>
