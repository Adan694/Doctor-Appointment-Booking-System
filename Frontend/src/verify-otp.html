        async function verifyOtp() {
                const email = sessionStorage.getItem('pendingOtpEmail');
                const otp = document.getElementById('otp').value;

                if (!otp) {
                    alert('Please enter OTP');
                    return;
                }

                if (!email) {
                    alert('Email session expired. Please start the signup process again.');
                    window.location.href = 'signup.html';
                    return;
                }

                try {
                    const response = await fetch('http://localhost:3000/auth/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp: Number(otp) }) // Convert to number
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'OTP verification failed');
                    }

                    alert('OTP verified successfully! You can now login.');
                    sessionStorage.removeItem('pendingOtpEmail'); // Clear the session
                    window.location.href = 'login.html';
                } catch (error) {
                    alert(error.message);
                }
            }
    </script>
