<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        .otp-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        input {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: #009579;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #007a63;
        }

        #email-display {
            font-weight: bold;
            margin-bottom: 20px;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="otp-container">
        <h2>Verify Your Email</h2>
        <p>Enter the 6-digit OTP sent to:</p>
        <div id="email-display"></div>
        <input type="text" id="otp" placeholder="Enter OTP" maxlength="6" pattern="\d{6}" required>
        <button onclick="verifyOtp()">Verify OTP</button>
        <p style="margin-top: 20px;">
            Didn't receive OTP? <a href="#" onclick="resendOtp()">Resend OTP</a>
        </p>
    </div>

    <script>
        // Display the email being verified
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || sessionStorage.getItem('pendingOtpEmail');
        document.getElementById('email-display').textContent = email;

        async function verifyOtp() {
            const otp = document.getElementById('otp').value.trim();

            if (!otp || !/^\d{6}$/.test(otp)) {
                alert('Please enter a valid 6-digit OTP');
                return;
            }

            if (!email) {
                alert('Email not found. Please start the signup process again.');
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'OTP verification failed');
                }

                alert('Email verified successfully! You can now login.');
                sessionStorage.removeItem('pendingOtpEmail');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('OTP Verification Error:', error);
                alert(error.message || 'An error occurred during verification');
            }
        }

        async function resendOtp() {
            try {
                const response = await fetch('http://localhost:3000/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!response.ok) {
                    throw new Error('Failed to resend OTP');
                }

                alert('New OTP sent successfully!');
            } catch (error) {
                console.error('Resend OTP Error:', error);
                alert(error.message || 'Failed to resend OTP');
            }
        }
    </script>
</body>

</html>
