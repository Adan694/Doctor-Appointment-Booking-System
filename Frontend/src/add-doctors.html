<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Doctor</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Roboto", Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: row;
        background-color: #e6f2ff;
        min-height: 100vh;
        color: #333;
      }

      /* Sidebar */
      /* Sidebar */
      .sidebar {
        width: 250px;
        background-color: rgb(9, 102, 102);
        padding: 20px 0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: fixed; /* Make it fixed */
        top: 0;
        left: 0;
        height: 100vh; /* Full viewport height */
        overflow-y: auto; /* Allow scrolling only for sidebar if needed */
        z-index: 1000; /* Ensure it's above other content */
      }

      /* Main layout */
      .main-content {
        flex: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        border-radius: 12px;
        transition: background-color 0.3s ease;
        margin-left: 250px; /* Add margin to account for fixed sidebar */
        min-height: 100vh;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
        margin: 10px 0;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        border-radius: 6px;
        padding: 10px 15px;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #e8f0fe;
        color: #007bff;
        font-weight: bold;
      }

      /* Main layout */
      .main-content {
        flex: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        border-radius: 12px; /* subtle rounding */
        transition: background-color 0.3s ease;
      }

      /* Header */
      .header {
        background-color: rgb(9, 102, 102);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition: background-color 0.3s ease;
      }

      .header:hover {
        background-color: #075b5b;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
      }

      /* Logout button */
      .logout-btn {
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px 22px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 2px 6px rgba(40, 167, 69, 0.4);
      }

      .logout-btn:hover {
        background-color: #c82333;
        box-shadow: 0 4px 12px rgba(200, 35, 51, 0.6);
      }

      /* Menu bar icon */
      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      #bar:hover {
        color: #28a745;
      }

      /* Form */
      .form-container {
        background-color: white;
        max-width: 700px;
        margin: 0 auto;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(9, 102, 102, 0.1);
        transition: box-shadow 0.3s ease;
      }

      .form-container:hover {
        box-shadow: 0 8px 24px rgba(9, 102, 102, 0.25);
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
        color: #333;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        border: 1.5px solid #ccc;
        border-radius: 6px;
        background-color: #fdfdfd;
        transition: border-color 0.3s ease, box-shadow 0.3s ease,
          background-color 0.3s ease;
        box-sizing: border-box;
      }

      input:hover,
      select:hover,
      textarea:hover {
        border-color: rgb(9, 102, 102);
        box-shadow: 0 0 6px rgba(9, 102, 102, 0.4);
        background-color: #f0fafb;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgb(9, 102, 102);
        outline: none;
        box-shadow: 0 0 8px rgba(9, 102, 102, 0.6);
        background-color: #f7fcfc;
      }

      .upload-button {
        padding: 20px;
        text-align: center;
        background-color: #eaf6f6;
        border: 2px dashed rgb(9, 102, 102);
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s ease, border-color 0.3s ease;
      }

      .upload-button:hover {
        background-color: #d3eeee;
        border-color: #0b7878;
      }

      .upload-button label {
        color: rgb(9, 102, 102);
        font-weight: bold;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      .upload-button label:hover {
        color: #075b5b;
      }

      /* Submit button */
      .btn {
        background-color: rgb(9, 102, 102);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease, box-shadow 0.3s ease,
          transform 0.2s ease;
        box-shadow: 0 4px 10px rgba(9, 102, 102, 0.3);
      }

      .btn:hover {
        background-color: #075b5b;
        box-shadow: 0 6px 16px rgba(7, 91, 91, 0.6);
        transform: scale(1.05);
      }

      .success-message {
        margin-top: 15px;
        color: #28a745;
        font-weight: bold;
        text-align: center;
        transition: opacity 0.3s ease;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
        transition: opacity 0.3s ease;
      }

      #overlay.active {
        display: block;
        opacity: 1;
      }

      @media (max-width: 1024px) {
        .sidebar {
          width: 220px;
        }

        .form-container {
          padding: 25px;
          max-width: 90%;
        }
      }

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .main-content {
          padding: 20px;
        }

        .sidebar {
          display: none;
          position: fixed;
          top: 0;
          left: -250px;
          height: 100%;
          z-index: 1000;
          transition: left 0.3s ease-in-out;
        }

        .sidebar.active {
          display: flex;
          left: 0;
        }

        #bar {
          display: block;
          background: none;
          border: none;
          color: white;
          font-size: 26px;
          cursor: pointer;
        }

        #bar:focus {
          outline: none;
        }

        .logout-btn {
          margin-left: auto;
        }
      }

      @media (max-width: 480px) {
        .form-container {
          padding: 15px;
        }

        .header {
          flex-direction: column;
          gap: 10px;
          font-size: 22px;
          align-items: flex-start;
        }

        input,
        select,
        textarea {
          font-size: 14px;
          padding: 10px;
        }

        .btn,
        .logout-btn {
          font-size: 14px;
          padding: 10px 14px;
        }

        label {
          font-size: 14px;
        }

        .sidebar ul li a {
          font-size: 14px;
          padding: 8px 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html" class="active">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
        <li><a href="adminprofile.html">Profile</a></li>
      </ul>
    </div>
    <div id="overlay"></div>

    <div class="main-content">
      <div class="header">
        <i id="bar" class="fa-solid fa-bars"></i>
        <h1>Admin Dashboard</h1>
        <button class="logout-btn">Logout</button>
      </div>

      <div class="form-container">
        <form id="doctor-form" enctype="multipart/form-data">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Name"
              required
            />
            <small id="name-error" class="error-text"></small>
          </div>

          <div class="form-group">
            <label for="email">Doctor Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              required
            />
            <small id="email-error" class="error-text"></small>
          </div>

          <div class="form-group">
            <label for="password">Set Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
            />
            <small id="password-error" class="error-text"></small>
          </div>

          <div class="form-group">
            <label for="speciality">Speciality</label>
            <select id="speciality" name="speciality" required>
              <optgroup label="Primary Care">
                <option value="general">General Physician</option>
                <option value="pediatrician">Pediatrician</option>
              </optgroup>

              <optgroup label="Internal Medicine Subspecialties">
                <option value="cardiologist">Cardiologist</option>
                <option value="gastroenterologist">Gastroenterologist</option>
                <option value="nephrologist">Nephrologist</option>
                <option value="oncologist">Oncologist</option>
                <option value="pulmonologist">Pulmonologist</option>
              </optgroup>

              <optgroup label="Surgical Specialties">
                <option value="orthopedist">Orthopedist</option>
                <option value="plastic-surgeon">Plastic Surgeon</option>
                <option value="surgeon">General Surgeon</option>
                <option value="vascular-surgeon">Vascular Surgeon</option>
              </optgroup>

              <optgroup label="Specialty Care">
                <option value="allergist">Allergist / Immunologist</option>
                <option value="dermatologist">Dermatologist</option>
                <option value="neurologist">Neurologist</option>
                <option value="ophthalmologist">Ophthalmologist</option>
                <option value="rheumatologist">Rheumatologist</option>
                <option value="psychiatrist">Psychiatrist</option>
                <option value="urologist">Urologist</option>
              </optgroup>

              <optgroup label="Diagnostic & Technical">
                <option value="ent Specialist">ENT Specialist</option>
                <option value="emergency-medicine">Emergency Medicine</option>
                <option value="radiologist">Radiologist</option>
                <option value="infectious">
                  Infectious Disease Specialist
                </option>
                <option value="sports-medicine">
                  Sports Medicine Specialist
                </option>
              </optgroup>

              <optgroup label="Women's Health">
                <option value="gynecologist">Gynecologist</option>
                <option value="obstetrician">Obstetrician</option>
              </optgroup>

              <optgroup label="Other Specialties">
                <option value="hematologist">Hematologist</option>
                <option value="dentist">Dentist</option>
              </optgroup>
            </select>
          </div>

          <div class="form-group">
            <label for="degree">Degree</label>
            <select id="degree" name="degree" required>
              <option value="">Select Degree</option>
            </select>
          </div>

          <div class="form-group">
            <label for="experience">Experience</label>
            <input
              type="text"
              id="experience"
              name="experience"
              placeholder="e.g., 1 Year"
              required
            />
            <small id="experience-error" class="error-text"></small>
          </div>

          <div class="form-group">
            <label for="about-doctor">About Doctor</label>
            <textarea
              id="about-doctor"
              name="about"
              placeholder="Write about the doctor"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label for="available">Availability</label>
            <select id="available" name="available" required>
              <option value="true">Available</option>
              <option value="false">Not Available</option>
            </select>
          </div>

          <input type="hidden" id="doctor-role" value="doctor" />
          <button type="submit" class="btn">Add Doctor</button>
        </form>
      </div>
    </div>

    <script>
      // DOM Content Loaded to ensure all elements are ready
      document.addEventListener("DOMContentLoaded", function () {
        // Sidebar functionality
        const bar = document.getElementById("bar");
        const sidebar = document.querySelector(".sidebar");
        const overlay = document.getElementById("overlay");

        if (bar) {
          bar.addEventListener("click", function () {
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
          });
        }

        if (overlay) {
          overlay.addEventListener("click", function () {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
          });
        }

        // Logout functionality
        document.querySelector(".logout-btn")?.addEventListener("click", () => {
          localStorage.removeItem("authToken");
          localStorage.removeItem("userRole");
          window.location.href = "login.html";
        });

        // Get form elements
        const specialityDropdown = document.getElementById("speciality");
        const degreeDropdown = document.getElementById("degree");

        // Enhanced degrees by specialty with more options
        const degreesBySpeciality = {
          general: ["MBBS", "MD", "DNB", "MS", "MSc", "BAMS", "BHMS"],
          pediatrician: [
            "MBBS",
            "MD Pediatrics",
            "DCH",
            "DNB Pediatrics",
            "MRCPCH",
          ],
          cardiologist: [
            "MBBS",
            "MD",
            "DM Cardiology",
            "DNB Cardiology",
            "MRCP",
            "FACC",
          ],
          gastroenterologist: [
            "MBBS",
            "MD",
            "DM Gastroenterology",
            "DNB Gastroenterology",
            "MRCP",
          ],
          nephrologist: [
            "MBBS",
            "MD",
            "DM Nephrology",
            "DNB Nephrology",
            "FRCP",
          ],
          oncologist: [
            "MBBS",
            "MD",
            "DM Oncology",
            "DNB Oncology",
            "MRCP",
            "FRCR",
          ],
          pulmonologist: [
            "MBBS",
            "MD",
            "DM Pulmonology",
            "DNB Pulmonology",
            "MRCP",
          ],
          orthopedist: [
            "MBBS",
            "MS Orthopedics",
            "DNB Orthopedics",
            "MCh Ortho",
            "FRCS",
          ],
          "plastic-surgeon": [
            "MBBS",
            "MS",
            "MCh Plastic Surgery",
            "DNB Plastic Surgery",
            "FRCS",
          ],
          surgeon: ["MBBS", "MS General Surgery", "DNB Surgery", "FRCS", "MCh"],
          "vascular-surgeon": [
            "MBBS",
            "MS",
            "MCh Vascular Surgery",
            "DNB Vascular Surgery",
            "FRCS",
          ],
          allergist: ["MBBS", "MD Immunology", "DNB Allergy", "MRCP"],
          dermatologist: [
            "MBBS",
            "MD Dermatology",
            "DNB Dermatology",
            "DDVL",
            "MRCP",
          ],
          neurologist: [
            "MBBS",
            "MD / DM Neurology",
            "DNB Neurology",
            "MRCP",
            "FRCP",
          ],
          ophthalmologist: [
            "MBBS",
            "MD Ophthalmology",
            "MS Ophthalmology",
            "DNB Ophthalmology",
            "FRCS",
          ],
          rheumatologist: [
            "MBBS",
            "MD",
            "DM Rheumatology",
            "DNB Rheumatology",
            "MRCP",
          ],
          psychiatrist: [
            "MBBS",
            "MD Psychiatry",
            "DNB Psychiatry",
            "MRCPsych",
            "DPM",
          ],
          urologist: ["MBBS", "MS", "MCh Urology", "DNB Urology", "FRCS"],
          "ent Specialist": ["MBBS", "MS ENT", "DNB ENT", "DLO", "FRCS"],
          "emergency-medicine": [
            "MBBS",
            "MD Emergency Medicine",
            "DNB Emergency Medicine",
            "MRCP",
            "FRCEM",
          ],
          radiologist: [
            "MBBS",
            "MD Radiology",
            "DNB Radiology",
            "DMRD",
            "FRCR",
          ],
          infectious: [
            "MBBS",
            "MD Infectious Diseases",
            "DNB Infectious Diseases",
            "MRCP",
            "FRCP",
          ],
          "sports-medicine": [
            "MBBS",
            "MD Sports Medicine",
            "DNB Sports Medicine",
            "MSc Sports Medicine",
            "FRCP",
          ],
          gynecologist: [
            "MBBS",
            "MD Gynecology",
            "MS Gynecology",
            "DNB Gynecology",
            "MRCOG",
          ],
          obstetrician: [
            "MBBS",
            "MD Obstetrics",
            "MS Obstetrics",
            "DNB Obstetrics",
            "MRCOG",
          ],
          hematologist: [
            "MBBS",
            "MD Hematology",
            "DM Hematology",
            "DNB Hematology",
            "FRCPath",
          ],
          dentist: ["BDS", "MDS", "FDS", "MFDS", "MOS", "PhD"],
        };

        // Function to update degree dropdown
        function updateDegreeDropdown() {
          if (!specialityDropdown || !degreeDropdown) return;

          const speciality = specialityDropdown.value;
          const degrees = degreesBySpeciality[speciality] || ["MBBS", "MD"];

          // Clear current options
          degreeDropdown.innerHTML = '<option value="">Select Degree</option>';

          // Add new options
          degrees.forEach((degree) => {
            const option = document.createElement("option");
            option.value = degree;
            option.textContent = degree;
            degreeDropdown.appendChild(option);
          });

          console.log(
            `Updated degree dropdown for ${speciality} with ${degrees.length} options`
          );
        }

        // Attach event listener for specialty change
        if (specialityDropdown) {
          specialityDropdown.addEventListener("change", updateDegreeDropdown);

          // Initialize degree dropdown on page load
          setTimeout(updateDegreeDropdown, 100);
        }

        // Validation rules
        const validators = {
          name: (value) =>
            value.trim().length >= 3 || "Name must be at least 3 characters.",

          email: (value) => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(value)) return "Invalid email format.";
            const allowedDomains = [
              "gmail.com",
              "yahoo.com",
              "hotmail.com",
              "outlook.com",
            ];
            const domain = value.split("@")[1];
            if (!allowedDomains.includes(domain))
              return "Only Gmail, Yahoo, Hotmail, or Outlook allowed.";
            return true;
          },

          password: (value) => {
            const passwordRegex =
              /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{6,}$/;
            return (
              passwordRegex.test(value) ||
              "Password must be at least 6 characters, include 1 letter, 1 number, and 1 special character."
            );
          },

          speciality: (value) =>
            value.trim() !== "" || "Speciality selection is required.",

          degree: (value) => value.trim() !== "" || "Please select a degree.",

          experience: (value) => {
            const expRegex = /^\d+(\s?(year|years))?$/i;
            return (
              expRegex.test(value) || "Experience must be a number (e.g., 5)."
            );
          },

          about: (value) =>
            value.trim().length >= 10 ||
            "About section must be at least 10 characters long.",

          available: (value) =>
            ["true", "false"].includes(value) ||
            "Availability must be selected.",
        };

        // Attach live validation
        Object.keys(validators).forEach((field) => {
          const input = document.getElementById(field);
          if (input) {
            // Create error span if it doesn't exist
            let errorSpan = input.nextElementSibling;
            if (!errorSpan || !errorSpan.classList.contains("error-text")) {
              errorSpan = document.createElement("small");
              errorSpan.className = "error-text";
              errorSpan.style.color = "red";
              errorSpan.style.fontSize = "12px";
              errorSpan.style.display = "block";
              input.insertAdjacentElement("afterend", errorSpan);
            }

            const validateField = () => {
              const result = validators[field](input.value);
              if (result !== true) {
                errorSpan.textContent = result;
                input.style.borderColor = "red";
              } else {
                errorSpan.textContent = "";
                input.style.borderColor = "";
              }
            };

            input.addEventListener(
              input.tagName === "SELECT" ? "change" : "input",
              validateField
            );
          }
        });

        // Form submission
        document
          .getElementById("doctor-form")
          .addEventListener("submit", async function (event) {
            event.preventDefault();

            const form = document.getElementById("doctor-form");
            const formData = new FormData(form);
            const submitBtn = form.querySelector('button[type="submit"]');

            // Validate all fields before submission
            let isValid = true;
            Object.keys(validators).forEach((field) => {
              const input = document.getElementById(field);
              if (input) {
                const result = validators[field](input.value);
                if (result !== true) {
                  isValid = false;
                  input.style.borderColor = "red";
                  const errorSpan = input.nextElementSibling;
                  if (errorSpan && errorSpan.classList.contains("error-text")) {
                    errorSpan.textContent = result;
                  }
                }
              }
            });

            if (!isValid) {
              alert("Please fix the errors before submitting.");
              return;
            }

            // Email domain validation
            const email = formData.get("email").trim();
            const allowedDomains = [
              "gmail.com",
              "yahoo.com",
              "hotmail.com",
              "outlook.com",
            ];
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
              alert("Invalid email format.");
              return;
            }

            const domain = email.split("@")[1];
            if (!allowedDomains.includes(domain)) {
              alert(
                "Only Gmail, Yahoo, Hotmail, or Outlook emails are allowed."
              );
              return;
            }

            // Append the role to the formData
            formData.append(
              "role",
              document.getElementById("doctor-role").value
            );

            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            try {
              // Check if backend is responding
              const ping = await fetch("http://localhost:3000");
              if (!ping.ok) throw new Error("Backend not responding");

              // Submit form data
              const response = await fetch(
                "http://localhost:3000/api/doctors/add",
                {
                  method: "POST",
                  body: formData,
                }
              );

              const data = await response.json();

              if (!response.ok) {
                throw new Error(data.message || "Server error");
              }

              showSuccess("Doctor added successfully!");
              form.reset();
              updateDegreeDropdown(); // Reset degree dropdown
            } catch (err) {
              console.error("Error:", err);
              showError(
                err.message || "Failed to add doctor. Please try again."
              );
            } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = "Add Doctor";
            }
          });

        function showSuccess(message) {
          const successElement = document.createElement("div");
          successElement.className = "success-message";
          successElement.textContent = message;
          successElement.style.color = "green";
          successElement.style.marginTop = "10px";
          successElement.style.textAlign = "center";

          const formContainer = document.querySelector(".form-container");
          const existingSuccess =
            formContainer.querySelector(".success-message");
          if (existingSuccess) existingSuccess.remove();

          formContainer.appendChild(successElement);

          setTimeout(() => {
            successElement.remove();
            window.location.href = "admindoclist.html";
          }, 3000);
        }

        function showError(message) {
          const errorElement = document.createElement("div");
          errorElement.className = "error-message";
          errorElement.textContent = message;
          errorElement.style.color = "red";
          errorElement.style.marginTop = "10px";
          errorElement.style.textAlign = "center";

          const formContainer = document.querySelector(".form-container");

          const existingError = formContainer.querySelector(".error-message");
          if (existingError) existingError.remove();

          formContainer.appendChild(errorElement);

          setTimeout(() => {
            errorElement.remove();
          }, 3000);
        }
      });
    </script>
  </body>
</html>
