<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin - New Feedback</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #096666;
            color: #fff;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 22px;
            margin: 0;
            flex-grow: 1;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        header button {
            background: #fff;
            color: #096666;
            border: 2px solid #096666;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(9, 102, 102, 0.3);
        }

        header button:hover {
            background-color: #096666;
            color: #fff;
            border-color: #064d4d;
            box-shadow: 0 4px 12px rgba(9, 102, 102, 0.5);
            transform: scale(1.05);
        }

        main {
            padding: 30px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            color: #096666;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 0.04em;
            border-bottom: 3px solid #096666;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            background: transparent;
        }

        table thead tr {
            background-color: #096666;
            color: #fff;
            border-radius: 8px;
        }

        table th,
        table td {
            padding: 14px 20px;
            text-align: left;
            vertical-align: middle;
        }

        table th {
            font-weight: 700;
            letter-spacing: 0.03em;
            user-select: none;
        }

        table tbody tr {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        table tbody tr:hover {
            box-shadow: 0 8px 20px rgba(9, 102, 102, 0.25);
            transform: translateY(-3px);
            cursor: pointer;
        }

        .rating i {
            transition: color 0.3s ease;
        }

        .rating i:hover {
            color: #ffb347;
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
            box-shadow: 0 3px 8px rgba(231, 76, 60, 0.4);
        }

        button:hover {
            background-color: #c0392b;
            box-shadow: 0 5px 15px rgba(192, 57, 43, 0.6);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead tr {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: #fff;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
                transition: box-shadow 0.3s ease, transform 0.3s ease;
            }

            tr:hover {
                box-shadow: 0 8px 25px rgba(9, 102, 102, 0.3);
                transform: translateY(-5px);
                cursor: pointer;
            }

            td {
                display: flex;
                justify-content: space-between;
                padding: 12px 10px;
                border: none;
                border-bottom: 1px solid #eee;
                font-weight: 600;
                color: #096666;
            }

            td:last-child {
                border-bottom: none;
            }

            td::before {
                font-weight: 700;
                color: #096666;
            }

            td:nth-of-type(1)::before {
                content: "Patient";
            }

            td:nth-of-type(2)::before {
                content: "Doctor";
            }

            td:nth-of-type(3)::before {
                content: "Comment";
            }

            td:nth-of-type(4)::before {
                content: "Rating";
            }

            td:nth-of-type(5)::before {
                content: "Date";
            }
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-comments"></i> New Feedback</h1>

        <!-- Notification bell removed -->

        <button onclick="window.location.href='Adminpanel.html'">Back to Dashboard</button>
    </header>

    <main>
        <h2>Recent Feedback from Patients</h2>
        <table>
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Comment</th>
                    <th>Rating</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="feedbackList">
                <tr>
                    <td colspan="5">Loading...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script>
        async function fetchAllFeedback() {
            const token = localStorage.getItem('authToken');
            try {
                const res = await fetch('http://localhost:3000/api/admin/all', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to fetch feedback');
                const data = await res.json();
                data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                const tableBody = document.getElementById('feedbackList');
                tableBody.innerHTML = '';

                data.forEach(fb => {

                    const row = `<tr>
                    <td>${fb.patientId?.name || 'N/A'}</td>
                    <td>${fb.doctorId?.name || 'N/A'}</td>
                    <td>${fb.comment}</td>
                    <td>${getStars(fb.rating)}</td>
                    <td>${new Date(fb.timestamp).toLocaleString()}</td>
                    <td><button onclick="deleteFeedback('${fb._id}')">Delete</button></td>
                </tr>`;
                    tableBody.innerHTML += row;
                });

                function getStars(rating) {
                    let stars = '';
                    for (let i = 1; i <= 5; i++) {
                        if (i <= rating) {
                            stars += '<i class="fa-solid fa-star" style="color:#ff9800"></i>';
                        } else {
                            stars += '<i class="fa-regular fa-star" style="color:#ccc"></i>';
                        }
                    }
                    return stars;
                }

                // Removed notification-related calls here

            } catch (error) {
                console.error('Error fetching feedback:', error);
            }
        }

        async function deleteFeedback(feedbackId) {
            const token = localStorage.getItem('authToken');
            if (!confirm('Are you sure you want to delete this feedback?')) return;

            try {
                const res = await fetch(`http://localhost:3000/api/feedback/${feedbackId}`, {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to delete feedback');

                alert('Feedback deleted successfully.');
                fetchAllFeedback(); // Refresh the list after delete
            } catch (error) {
                console.error('Error deleting feedback:', error);
                alert('Error deleting feedback. Please try again.');
            }
        }

        // Removed fetchUnreadNotificationCount and markAllNotificationsAsRead functions

        // Call fetchAllFeedback on page load
        fetchAllFeedback();
    </script>

</body>

</html>
