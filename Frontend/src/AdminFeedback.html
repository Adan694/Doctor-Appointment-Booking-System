<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - New Feedback</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 0;
        color: #333;
      }
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .sidebar {
        width: 250px;
        min-width: 250px;
        max-width: 250px;
        background-color: rgb(9, 102, 102);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: fixed;
        height: 100vh;
        top: 0;
        left: 0;
        z-index: 1000;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
        margin: 10px 0;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        transition: background-color 0.3s ease, color 0.3s ease;
        border-radius: 6px;
        padding: 10px 15px;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #e8f0fe;
        color: #007bff;
        font-weight: bold;
      }

      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
      }

      main {
        margin-left: 250px;
        width: calc(100% - 250px);
        position: relative;
        z-index: 1;
        padding: 20px;
        background-color: #e6f2ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        min-height: 100vh;
        transition: background-color 0.3s ease;
        text-align: center;
      }

      header {
        background-color: #166e6b;
        color: white;
        padding: 20px 16px 10px 16px;
        font-size: 28px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        border-bottom: 3px solid white;
        transition: background-color 0.3s ease, border-color 0.3s ease;
        margin-right: 40px;
      }

      header:hover {
        background-color: #145956;
        border-color: #ccc;
      }

      header button {
        background-color: #28a745;
        border: none;
        color: white;
        padding: 10px 22px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 3px 6px rgba(40, 167, 69, 0.4);
        margin-right: 20px;
      }

      header button:hover {
        background-color: #1e7e34;
        box-shadow: 0 6px 12px rgba(30, 126, 52, 0.6);
      }
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
        transition: opacity 0.3s ease;
      }

      #overlay.active {
        display: block;
        opacity: 1;
      }

      h2 {
        color: #096666;
        margin-bottom: 25px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border-bottom: 3px solid #096666;
        padding-bottom: 10px;
      }
      .table-container {
        width: 100%;
        overflow-x: auto; /* ✅ allows horizontal scroll only for table */
      }

      table td {
        word-break: break-word;
        white-space: normal;
        max-width: 200px;
      }

      table {
        border-collapse: separate;
        border-spacing: 0 8px;
        background: transparent;
        min-width: 800px;
        table-layout: auto;
      }

      table thead tr {
        background-color: #096666;
        color: #fff;
        border-radius: 8px;
      }

      table th,
      table td {
        padding: 14px 20px;
        text-align: left;
        vertical-align: middle;
      }

      table th {
        font-weight: 700;
        letter-spacing: 0.03em;
        user-select: none;
      }

      table tbody tr {
        background-color: #fff;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        border-radius: 10px;
        transition: box-shadow 0.3s ease, transform 0.3s ease;
      }

      table tbody tr:hover {
        box-shadow: 0 8px 20px rgba(9, 102, 102, 0.25);
        transform: translateY(-3px);
      }

      .rating i {
        transition: color 0.3s ease;
      }

      .rating i:hover {
        color: #ffb347;
      }

      button {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        transition: background-color 0.3s ease, box-shadow 0.3s ease,
          transform 0.2s ease;
        box-shadow: 0 3px 8px rgba(231, 76, 60, 0.4);
      }

      button:hover {
        background-color: #c0392b;
        box-shadow: 0 5px 15px rgba(192, 57, 43, 0.6);
        transform: scale(1.05);
      }

      /* Responsive */
      @media (max-width: 768px) {
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead tr {
          display: none;
        }

        tr {
          margin-bottom: 15px;
          background: #fff;
          padding: 15px 20px;
          border-radius: 10px;
          box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
          transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        tr:hover {
          box-shadow: 0 8px 25px rgba(9, 102, 102, 0.3);
          transform: translateY(-5px);
          cursor: pointer;
        }

        td {
          display: flex;
          justify-content: space-between;
          padding: 12px 10px;
          border: none;
          border-bottom: 1px solid #eee;
          font-weight: 600;
          color: #096666;
        }

        td:last-child {
          border-bottom: none;
        }

        td::before {
          font-weight: 700;
          color: #096666;
        }

        td:nth-of-type(1)::before {
          content: "Patient";
        }

        td:nth-of-type(2)::before {
          content: "Doctor";
        }

        td:nth-of-type(3)::before {
          content: "Comment";
        }

        td:nth-of-type(4)::before {
          content: "Rating";
        }

        td:nth-of-type(5)::before {
          content: "Date";
        }
      }
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
        }

        .sidebar.active {
          transform: translateX(0);
        }

        main {
          margin-left: 0;
          width: 100%;
        }

        #bar {
          display: block;
          background: none;
          border: none;
          color: white;
          font-size: 26px;
          cursor: pointer;
        }

        #bar:focus {
          outline: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
      </ul>
    </div>

    <div id="overlay"></div>
    <main>
      <header>
        <i id="bar" class="fa-solid fa-bars"></i>
        <div>All Feedbacks</div>
        <button id="logoutBtn">Logout</button>
      </header>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Comment</th>
              <th>Rating</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="feedbackList">
            <tr>
              <td colspan="6">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const bar = document.getElementById("bar");
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.getElementById("overlay");

      bar.addEventListener("click", function () {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", function () {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });

      async function fetchAllFeedback() {
        const token = localStorage.getItem("authToken");
        try {
          const res = await fetch("http://localhost:3000/api/admin/all", {
            headers: { Authorization: "Bearer " + token },
          });
          if (!res.ok) throw new Error("Failed to fetch feedback");
          const data = await res.json();
          data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          const tableBody = document.getElementById("feedbackList");
          tableBody.innerHTML = "";

          data.forEach((fb) => {
            const row = `<tr>
<td>
  ${fb.patientId?.name || "N/A"}<br>
  <br>
  <span 
  onclick="window.location.href='patients-list.html?highlight=${
    fb.patientId?._id
  }'" 
  style="color: inherit; text-decoration: none; cursor: pointer;">
  ${fb.patientId?.email || ""}
</span>


</td>

                    <td>${fb.doctorId?.name || "N/A"}</td>
                    <td>${fb.comment}</td>
                    <td>${getStars(fb.rating)}</td>
                    <td>${formatDateTime(fb.timestamp)}</td>
                    <td><button onclick="deleteFeedback('${
                      fb._id
                    }')">Delete</button></td>
                </tr>`;
            tableBody.innerHTML += row;
          });
          function formatTime(ts) {
            const d = new Date(ts);
            let hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, "0");
            const ampm = hours >= 12 ? "PM" : "AM";
            hours = hours % 12;
            hours = hours ? hours : 12; // convert hour '0' to '12'
            return `${hours}:${minutes} ${ampm}`;
          }

          function formatDateTime(ts) {
            const d = new Date(ts);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            return `${year}-${month}-${day} ${formatTime(ts)}`;
          }

          function getStars(rating) {
            let stars = "";
            for (let i = 1; i <= 5; i++) {
              if (i <= rating) {
                stars +=
                  '<i class="fa-solid fa-star" style="color:#ff9800"></i>';
              } else {
                stars +=
                  '<i class="fa-regular fa-star" style="color:#ccc"></i>';
              }
            }
            return stars;
          }

          // Removed notification-related calls here
        } catch (error) {
          console.error("Error fetching feedback:", error);
        }
      }

      async function deleteFeedback(feedbackId) {
        const token = localStorage.getItem("authToken");
        if (!confirm("Are you sure you want to delete this feedback?")) return;

        try {
          const res = await fetch(
            `http://localhost:3000/api/feedback/${feedbackId}`,
            {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token },
            }
          );
          if (!res.ok) throw new Error("Failed to delete feedback");

          alert("Feedback deleted successfully.");
          fetchAllFeedback(); // Refresh the list after delete
        } catch (error) {
          console.error("Error deleting feedback:", error);
          alert("Error deleting feedback. Please try again.");
        }
      }

      // Removed fetchUnreadNotificationCount and markAllNotificationsAsRead functions

      // Call fetchAllFeedback on page load
      fetchAllFeedback();
    </script>
  </body>
</html>
