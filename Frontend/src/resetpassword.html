<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
    background-color: #e6f2ff;
        }
    
        .reset-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }
    
        h2 {
            color: #004080;
            margin-bottom: 20px;
        }
    
        input {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
    
        button {
            padding: 12px 24px;
            background-color: #009579;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
    
        button:hover {
            background-color: #0056b3;
        }
    
        #email-display {
            font-weight: bold;
            margin-bottom: 20px;
            word-break: break-word;
        }
    
        .hidden {
            display: none;
        }
    
        .back-link {
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
    
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <h2>Reset Password</h2>
        <p>Enter the OTP sent to:</p>
        <div id="email-display"></div>
    
        <div id="otp-section">
            <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
            <button onclick="verifyOtp()">Verify OTP</button>
        </div>
    
        <div id="password-section" class="hidden">
            <input type="password" id="new-password" placeholder="New Password">
            <input type="password" id="confirm-password" placeholder="Confirm Password">
            <button onclick="resetPassword()">Reset Password</button>
        </div>
    
        <a href="login.html" class="back-link">Back to Login</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');


        if (!email) {
            alert('Missing email. Please go through verification first.');
            window.location.href = 'forgotpassword.html';
        }

        document.getElementById('email-display').textContent = email;

        async function verifyOtp() {
            const otp = document.getElementById('otp').value.trim();

            if (!/^\d{6}$/.test(otp)) {
                alert('Please enter a valid 6-digit OTP.');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'OTP verification failed.');
                }

                alert('OTP verified! Now reset your password.');
                document.getElementById('otp-section').classList.add('hidden');
                document.getElementById('password-section').classList.remove('hidden');
            } catch (error) {
                console.error('OTP Verification Error:', error);
                alert(error.message || 'Failed to verify OTP.');
            }
        }

        async function resetPassword() {
            const password = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const otp = document.getElementById('otp').value.trim(); 


            if (!password || !confirmPassword) {
                alert('Please fill in both password fields.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword: password })
                });

                let data;

                try {
                    data = await response.clone().json(); // clone for safe second read
                } catch (err) {
                    const rawText = await response.text();
                    console.error('Non-JSON response:', rawText);
                    throw new Error('Server returned invalid response format.');
                }

                if (!response.ok) {
                    throw new Error(data.message || 'Password reset failed.');
                }

                alert('Password reset successful! You can now log in.');
                sessionStorage.removeItem('pendingOtpEmail');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Reset Password Error:', error);
                alert(error.message || 'Something went wrong.');
            }


        }
    </script>
</body>

</html>
