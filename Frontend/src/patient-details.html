<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Details - DocAssist</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Roboto", Arial, sans-serif;
        display: flex;
        min-height: 100vh;
        background-color: #e6f2ff;
        color: #333;
      }

      /* Sidebar Styles */
      .sidebar {
        width: 250px;
        min-width: 250px;
        background-color: rgb(9, 102, 102);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
        z-index: 1000;
        transition: transform 0.3s ease;
      }

      .sidebar h2 {
        font-size: 30px;
        color: white;
        margin: 0 0 40px 20px;
        font-weight: 900;
        letter-spacing: 1.5px;
      }

      .sidebar ul {
        list-style: none;
        width: 100%;
      }

      .sidebar ul li {
        padding: 12px 20px;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        display: block;
        border-radius: 6px;
        padding: 10px 15px;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .sidebar ul li a:hover,
      .sidebar ul li a.active {
        background-color: #0b4e4e;
        color: white;
        font-weight: bold;
      }

      /* Overlay for mobile */
      #overlay {
        position: fixed;
        top: 0;
        left: 250px;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 900;
        display: none;
      }

      #overlay.active {
        display: block;
      }

      /* Header */
      header {
        background-color: #166e6b;
        color: white;
        padding: 20px 16px;
        font-size: 24px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid white;
      }

      #bar {
        display: none;
        font-size: 30px;
        cursor: pointer;
        background: none;
        border: none;
        color: white;
      }

      #logoutBtn {
        background-color: #f44336;
        color: white;
        border: none;
        padding: 8px 14px;
        font-size: 14px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      #logoutBtn:hover {
        background-color: #d32f2f;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        padding: 20px;
        margin-left: 250px;
        width: calc(100% - 250px);
      }

      .main-content > header + .section {
        margin-top: 20px;
      }

      /* Section container */
      .section {
        background: linear-gradient(135deg, #ffffff, #f4f9ff);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        transition: transform 0.2s ease;
      }

      .section:hover {
        transform: translateY(-3px);
      }

      .section h2 {
        font-size: 22px;
        color: #166e6b;
        margin-bottom: 15px;
        border-bottom: 2px solid #d4e1f5;
        padding-bottom: 5px;
      }

      /* Basic Info styling */
      #patient-info p {
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        font-size: 15px;
        color: #444;
      }

      #patient-info p strong {
        min-width: 80px;
        font-size: 15px;
        color: #166e6b;
      }

      #patient-info p i {
        margin-right: 8px;
        color: #166e6b;
      }

      /* Table styles */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        border-radius: 10px;
        overflow: hidden;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #eee;
        text-transform: capitalize;
      }

      th {
        background-color: #166e6b;
        color: white;
        text-align: left;
      }

      tr:nth-child(even) {
        background-color: #f8f9fa;
      }

      tr:hover {
        background-color: #eaf4ff;
      }

      /* Pagination */
      .pagination {
        text-align: center;
        margin-top: 15px;
      }

      .pagination button {
        background-color: #166e6b;
        color: white;
        border: none;
        padding: 6px 12px;
        margin: 0 4px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.3s ease;
      }

      .pagination button:disabled {
        background-color: #999;
        cursor: not-allowed;
      }

      .pagination button:hover:not(:disabled) {
        background-color: #0f4d4b;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
        }

        .sidebar.active {
          transform: translateX(0);
        }

        .main-content {
          margin-left: 0;
          width: 100%;
        }

        #bar {
          display: block;
        }
      }
      @media (max-width: 768px) {
        #appointments table,
        #appointments thead,
        #appointments tbody,
        #appointments th,
        #appointments td,
        #appointments tr {
          display: block;
          width: 100%;
        }

        #appointments thead {
          display: none; /* hide table headers */
        }

        #appointments tr {
          margin-bottom: 15px;
          background: #fff;
          border-radius: 10px;
          padding: 15px 12px;
          box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        #appointments td {
          display: block;
          padding: 8px 6px;
          border: none;
          border-bottom: 1px solid #eee;
          font-size: 14px;
          color: #333;
          word-break: break-word;
        }

        #appointments td:last-child {
          border-bottom: none;
        }

        /* Labels via nth-of-type */
        #appointments td:nth-of-type(1)::before {
          content: "Name: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(2)::before {
          content: "Date & Time: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(3)::before {
          content: "Doctor: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(4)::before {
          content: "Patient Number: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(5)::before {
          content: "Token: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(6)::before {
          content: "Issue: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(7)::before {
          content: "Status: ";
          font-weight: 700;
          color: #166e6b;
        }
        #appointments td:nth-of-type(8)::before {
          content: "Feedback: ";
          font-weight: 700;
          color: #166e6b;
        }
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 2000;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }

      .confirm-yes {
        background: #28a745;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .confirm-no {
        background: #dc3545;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .blocked-badge {
        display: inline-block;
        background: #dc3545;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 10px;
      }

      .active-badge {
        background: #28a745;
      }

      .unblock-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>DocAssist</h2>
      <ul>
        <li><a href="Adminpanel.html">Dashboard</a></li>
        <li><a href="adminappoint.html">Appointments</a></li>
        <li><a href="add-doctors.html">Add Doctor</a></li>
        <li><a href="admindoclist.html">Doctors List</a></li>
        <li><a href="patients-list.html">Patients List</a></li>
        <li><a href="AdminFeedback.html">Feedback</a></li>
      </ul>
    </div>
    <div id="overlay"></div>

    <div class="main-content">
      <header>
        <i id="bar" class="fa-solid fa-bars"></i>
        <div>Patient Details</div>
        <button id="logoutBtn">Logout</button>
      </header>

      <div style="margin-top: 20px"></div>
      <!-- Gap between header and first section -->

      <div id="patient-info" class="section">
        <h2>Basic Info</h2>
        <p>Loading...</p>
      </div>

      <div id="appointments" class="section">
        <h2>Appointments</h2>
        <p>Loading...</p>
      </div>
    </div>
    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay">
      <div class="modal-content">
        <p>Are you sure you want to unblock this patient?</p>
        <div class="modal-buttons">
          <button class="confirm-yes" onclick="confirmUnblock()">
            Yes, Unblock
          </button>
          <button class="confirm-no" onclick="closeConfirmModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
      <div class="modal-content">
        <p id="successMessage">Patient unblocked successfully!</p>
        <button class="confirm-yes" onclick="closeSuccessModal()">OK</button>
      </div>
    </div>

    <script>
      // Sidebar toggle
      const bar = document.getElementById("bar");
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.getElementById("overlay");
      let currentPatient = null;

      bar.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("authToken");
        localStorage.removeItem("userRole");
        window.location.href = "login.html";
      });

      // Patient details fetch
      const token = localStorage.getItem("authToken");
      const urlParams = new URLSearchParams(window.location.search);
      const patientId = urlParams.get("id");

      if (!patientId) {
        alert("No patient ID provided");
        window.location.href = "patients-list.html";
      }

      let appointments = [];
      let currentPage = 1;
      const itemsPerPage = 10;

      function renderAppointments() {
        if (appointments.length === 0) {
          document.getElementById("appointments").innerHTML =
            "<h2>Appointments</h2><p>No appointments found.</p>";
          return;
        }

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedApps = appointments.slice(start, end);

        let tableHTML = `<h2>Appointments</h2>
    <table>
        <thead>
            <tr>
                <th>name</th>
                <th>Date & Time</th>
                <th>Doctor</th>
                <th>Patient Number</th>
                <th>Token</th>
                <th>Issue</th>
                <th>Status</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody>`;

        paginatedApps.forEach((a) => {
          const dateTimeString = `${a.date.split("T")[0]} ${a.time}`;
          const appointmentDate = new Date(dateTimeString);

          tableHTML += `<tr>
                    <td>${a.name}</td>
            <td>${appointmentDate.toLocaleDateString()} ${a.time}</td>
            <td>${a.doctorId?.name || a.doctorId || "N/A"}</td>
            <td>${a.patientNumber || "N/A"}</td>
            <td>${a.token}</td>
            <td>${a.issue || "-"}</td>
            <td>${a.status}</td>
            <td>${a.feedback || "-"}</td>
        </tr>`;
        });

        tableHTML += "</tbody></table>";

        // Pagination controls
        tableHTML += `
        <div class="pagination">
            <button onclick="prevPage()" ${
              currentPage === 1 ? "disabled" : ""
            }>Previous</button>
            <span>Page ${currentPage} of ${Math.ceil(
              appointments.length / itemsPerPage,
            )}</span>
            <button onclick="nextPage()" ${
              end >= appointments.length ? "disabled" : ""
            }>Next</button>
        </div>
    `;

        document.getElementById("appointments").innerHTML = tableHTML;
      }

      function nextPage() {
        if (currentPage * itemsPerPage < appointments.length) {
          currentPage++;
          renderAppointments();
        }
      }

      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          renderAppointments();
        }
      }

      async function fetchPatientDetails() {
        try {
          const res = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}`,
            {
              headers: { Authorization: "Bearer " + token },
            },
          );
          currentPatient = await res.json();

          let unblockButtonHtml = "";
          if (currentPatient.isBlocked) {
            unblockButtonHtml = `
        <button class="unblock-btn" onclick="showUnblockConfirm()">
          <i class="fas fa-unlock-alt"></i> Unblock Patient
        </button>
      `;
          }

          let blockedUntilInfo = "";
          if (currentPatient.blockedUntil) {
            const blockedUntilDate = new Date(currentPatient.blockedUntil);
            blockedUntilInfo = `<p><strong>Blocked Until:</strong> ${blockedUntilDate.toLocaleDateString()} ${blockedUntilDate.toLocaleTimeString()}</p>`;
          }

          document.getElementById("patient-info").innerHTML = `
      <h2>Profile Info</h2>
      <p><strong>Name:</strong> ${currentPatient.name || ""}</p>
      <p><strong>Email:</strong> ${currentPatient.email || ""}</p>
      <p><strong>Phone:</strong> ${currentPatient.phone || ""}</p>
      <p><strong>CNIC:</strong> ${currentPatient.cnic || ""}</p>
      <p><strong>Age:</strong> ${currentPatient.age || ""}</p>
      <p><strong>DOB:</strong> ${currentPatient.dob || ""}</p>
      <p><strong>Gender:</strong> ${currentPatient.gender || ""}</p>
      <p><strong>Role:</strong> ${currentPatient.role || ""}</p>
      <p><strong>Missed Appointments:</strong> ${currentPatient.missedAppointments || 0} 
       
      </p>
      <p><strong>Status:</strong> 
        ${
          currentPatient.isBlocked
            ? '<span class="blocked-badge"> BLOCKED</span>'
            : '<span class="blocked-badge active-badge"> ACTIVE</span>'
        }
      </p>
      ${blockedUntilInfo}
      ${unblockButtonHtml}
    `;

          // Fetch appointments
          const res2 = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}/appointments`,
            {
              headers: { Authorization: "Bearer " + token },
            },
          );
          appointments = await res2.json();
          renderAppointments();
        } catch (err) {
          console.error(err);
          alert("Error loading patient data");
        }
      }
      async function unblockPatient() {
        try {
          const response = await fetch(
            `http://localhost:3000/api/admin/patients/${patientId}/unblock`,
            {
              method: "PUT",
              headers: {
                Authorization: "Bearer " + token,
                "Content-Type": "application/json",
              },
            },
          );

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Failed to unblock patient");
          }

          document.getElementById("successMessage").textContent =
            "Patient unblocked successfully!";
          document.getElementById("successModal").style.display = "flex";
          await fetchPatientDetails();
        } catch (err) {
          console.error("Error unblocking patient:", err);
          document.getElementById("successMessage").textContent =
            err.message || "Failed to unblock patient";
          document.getElementById("successModal").style.display = "flex";
        }
      }

      function showUnblockConfirm() {
        document.getElementById("confirmModal").style.display = "flex";
      }

      function confirmUnblock() {
        closeConfirmModal();
        unblockPatient();
      }

      function closeConfirmModal() {
        document.getElementById("confirmModal").style.display = "none";
      }

      function closeSuccessModal() {
        document.getElementById("successModal").style.display = "none";
        window.location.reload();
      }

      fetchPatientDetails();
      window.showUnblockConfirm = showUnblockConfirm;
      window.confirmUnblock = confirmUnblock;
      window.closeConfirmModal = closeConfirmModal;
      window.closeSuccessModal = closeSuccessModal;
    </script>
  </body>
</html>
