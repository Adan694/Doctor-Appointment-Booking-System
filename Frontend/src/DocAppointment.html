<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Management</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .appointment-table {
            margin-bottom: 40px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f7f9fc;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgb(9, 102, 102);
            color: white;
            z-index: 1000;
        }

        ul {
            display: flex;
        }

        ul li {
            list-style: none;
        }

        ul li a {
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-inline: 20px;
        }

        ul li a:hover {
            color: black;
            border-bottom: 2px solid black;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            margin: 0;
        }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        .logo h1 {
            font-size: 30px;
            margin: 0;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="images/Da.png" alt="DocAssist Logo">
            <h1>DocAssist</h1>
        </div>
        <ul>
            <li><a href="docpanel.html">Dashboard</a></li>
            <li><a href="DocAppointment.html">Appointments</a></li>
            <li><a href="docprofile.html">Profile</a></li>
        </ul>
    </nav>
    <div class="container" style="margin-top: 80px;">
        <h1 class="mt-4">Appointment Management</h1>

        <!-- New Appointments Section -->
        <h2>New Appointments</h2>
        <table class="table appointment-table">
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Appointment Date & Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="newAppointments">
                <!-- Dynamic content will go here -->
            </tbody>
        </table>

        <!-- Cancelled Appointments Section -->
        <h2>Cancelled Appointments</h2>
        <table class="table appointment-table">
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Appointment Date & Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="cancelledAppointments">
                <!-- Dynamic content will go here -->
            </tbody>
        </table>

        <!-- Completed Appointments Section -->
        <h2>Completed Appointments</h2>
        <table class="table appointment-table">
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Appointment Date & Time</th>
                    <th>Feedback</th>
                </tr>
            </thead>
            <tbody id="completedAppointments">
                <!-- Dynamic content will go here -->
            </tbody>
        </table>
    </div>

    <script>
        function loadPatientAppointments() {
            const token = localStorage.getItem('authToken'); // Ensure token is available
            const patientId = localStorage.getItem('patientId'); // Get the patient's ID from localStorage

            fetch(`http://localhost:3000/api/appointments/patient/${patientId}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}` // Include token for authentication
                }
            })
                .then(response => {
                    if (!response.ok) throw new Error('Failed to fetch appointments');
                    return response.json();
                })
                .then(data => {
                    data.forEach(appointment => {
                        if (appointment.status === 'Cancelled') {
                            addCancelledAppointmentRow({
                                patientName: appointment.patientId.name,
                                appointmentTime: `${appointment.date} ${appointment.time}`
                            });
                        } else {
                            addNewAppointmentRow({
                                patientName: appointment.patientId.name,
                                appointmentTime: `${appointment.date} ${appointment.time}`,
                                status: 'Pending' // Adjust as necessary
                            });
                        }
                    });
                })
                .catch(err => console.error("Error fetching patient appointments:", err));
        }

        // Call this function on page load
        window.onload = function () {
            loadPatientAppointments();
        };

        function addNewAppointmentRow(appointment) {
            const row = `<tr>
                <td>${appointment.patientName}</td>
                <td>${appointment.appointmentTime}</td>
                <td>${appointment.status}</td>
                <td>
                    <button class="btn btn-success" onclick="completeAppointment(this)">Complete</button>
                    <button class="btn btn-danger" onclick="cancelAppointment(this)">Cancel</button>
                </td>
            </tr>`;
            document.getElementById('newAppointments').insertAdjacentHTML('beforeend', row);
        }

        function addCancelledAppointmentRow(appointment) {
            const row = `<tr>
                <td>${appointment.patientName}</td>
                <td>${appointment.appointmentTime}</td>
                <td>
                    <button class="btn btn-warning" onclick="rescheduleAppointment(this)">Reschedule</button>
                    <button class="btn btn-success" onclick="completeAppointment(this)">Complete</button>
                </td>
            </tr>`;
            document.getElementById('cancelledAppointments').insertAdjacentHTML('beforeend', row);
        }

        function addCompletedAppointmentRow(appointment) {
            const row = `<tr>
                <td>${appointment.patientName}</td>
                <td>${appointment.appointmentTime}</td>
                <td>No feedback yet</td>
            </tr>`;
            document.getElementById('completedAppointments').insertAdjacentHTML('beforeend', row);
        }

        function completeAppointment(button) {
            const row = button.parentElement.parentElement;
            const patientName = row.cells[0].innerText;
            const appointmentTime = row.cells[1].innerText;

            // Move appointment to completed section
            addCompletedAppointmentRow({
                patientName,
                appointmentTime
            });

            // Remove from new or cancelled appointments
            row.remove();
            updateLocalStorage();
        }

        function rescheduleAppointment(button) {
            const row = button.parentElement.parentElement;
            const patientName = row.cells[0].innerText;
            const appointmentTime = row.cells[1].innerText;

            // Logic to reschedule the appointment
            const newDateTime = prompt("Enter new date and time for the appointment:", appointmentTime);
            if (newDateTime) {
                console.log(`Rescheduling appointment for ${patientName} to ${newDateTime}`);
                row.remove(); // Optionally remove from cancelled section
                addNewAppointmentRow({ patientName, appointmentTime: newDateTime, status: 'Pending' });
                updateLocalStorage();
            }
        }

        function cancelAppointment(button) {
            const row = button.parentElement.parentElement;
            const patientName = row.cells[0].innerText;
            const appointmentTime = row.cells[1].innerText;

            // Move appointment to cancelled section
            addCancelledAppointmentRow({
                patientName,
                appointmentTime
            });

            // Remove from new appointments
            row.remove();
            updateLocalStorage();
        }

        function updateLocalStorage() {
            const newAppointments = Array.from(document.querySelectorAll('#newAppointments tr')).map(row => ({
                patientName: row.cells[0].innerText,
                appointmentTime: row.cells[1].innerText,
                status: row.cells[2].innerText
            }));

            const cancelledAppointments = Array.from(document.querySelectorAll('#cancelledAppointments tr')).map(row => ({
                patientName: row.cells[0].innerText,
                appointmentTime: row.cells[1].innerText
            }));

            const completedAppointments = Array.from(document.querySelectorAll('#completedAppointments tr')).map(row => ({
                patientName: row.cells[0].innerText,
                appointmentTime: row.cells[1].innerText
            }));

            localStorage.setItem('newAppointments', JSON.stringify(newAppointments));
            localStorage.setItem('cancelledAppointments', JSON.stringify(cancelledAppointments));
            localStorage.setItem('completedAppointments', JSON.stringify(completedAppointments));
        }
    </script>
</body>

</html>
