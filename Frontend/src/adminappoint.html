<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f2f5;
            color: #333;
        }

        .sidebar {
            width: 250px;
            min-width: 250px;
            max-width: 250px;
            background-color: rgb(9, 102, 102);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .sidebar h2 {
            font-size: 30px;
            color: white;
            margin: 0 0 40px 20px;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .sidebar ul li {
            padding: 12px 20px;
            margin: 10px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            display: block;
            transition: background-color 0.3s ease, color 0.3s ease;
            border-radius: 6px;
            padding: 10px 15px;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active {
            background-color: #e8f0fe;
            color: #007bff;
            font-weight: bold;
        }

       .main-content {
    flex: 1;
    padding: 20px;
    background-color: #ffffff;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    margin-top: 0; /* Ensures no extra gap */
    height: 100vh;  /* Full viewport height if needed */
    overflow-y: auto; /* Scrollable if content overflows */
}


       .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background-color: rgb(9, 102, 102);
    color: white;
    border-radius: 10px;
    margin-bottom: 20px;
}

        .logout-btn {
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 10px 22px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .logout-btn:hover {
            background-color: #c82333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background-color: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(22, 110, 107, 0.15);
        }

        th {
            background-color: #166e6b;
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 700;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .action {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cancelled {
            color: #dc3545;
            font-weight: bold;
        }

        .completed {
            color: #28a745;
            font-weight: bold;
        }

        .delete-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            color: #166e6b;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .delete-btn:hover {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                font-size: 22px;
            }

            .logout-btn {
                width: 100%;
            }

            table {
                font-size: 14px;
            }

            th,
            td {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>DocAssist</h2>
        <ul>
            <li><a href="Adminpanel.html">Dashboard</a></li>
            <li><a href="adminappoint.html" class="active">Appointments</a></li>
            <li><a href="add-doctors.html">Add Doctor</a></li>
            <li><a href="admindoclist.html">Doctors List</a></li>
            <li><a href="patients-list.html">Patients List</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>All Appointments</h1>
            <button class="logout-btn">Logout</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Patient</th>
                    <th>Age</th>
                    <th>Date & Time</th>
                    <th>Doctor</th>
                    <th>Fees</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="appointments-table"></tbody>
        </table>
    </div>

    <script>
        async function fetchAppointments() {
            try {
                const response = await fetch("http://localhost:3000/api/appointments/all");
                if (!response.ok) {
                    throw new Error('Failed to load appointments');
                }
                const appointments = await response.json();

                const tableBody = document.getElementById('appointments-table');
                tableBody.innerHTML = '';

                appointments.forEach((appointment, index) => {
                    const row = document.createElement('tr');

                    const dateObj = new Date(appointment.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });
                    const formattedTime = appointment.time;

                    const statusClass = appointment.status === 'cancelled' ? 'cancelled' :
                        appointment.status === 'completed' ? 'completed' : '';

                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${appointment.patientId?.name || 'Unknown'}</td>
                        <td>${appointment.patientId?.age || '-'}</td>
                        <td>${formattedDate}, ${formattedTime}</td>
                        <td>${appointment.doctorId?.name || 'Unknown'}</td>
                        <td>$${appointment.fees || '-'}</td>
                        <td class="action ${statusClass}">
                            <span class="${statusClass}">${appointment.status || 'pending'}</span>
                            <button class="delete-btn" onclick="deleteAppointment(this, '${appointment._id}')">✖</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error("❌ Error fetching appointments:", error);
            }
        }

        function deleteAppointment(button, appointmentId) {
            console.log("Deleting appointment:", appointmentId);
            const row = button.closest('tr');
            row.remove();
        }

        window.onload = fetchAppointments;
    </script>
</body>

</html>
