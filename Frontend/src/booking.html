<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .slot {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .time-slot {
            display: inline-block;
            margin: 5px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            cursor: pointer;
        }

        .time-slot.selected {
            background-color: #4CAF50;
            color: white;
        }

        .book-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .book-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
         /* Spinner Overlay */
    #loadingOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(255, 255, 255, 0.7);
        z-index: 2000;
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #009999;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Toast Notification */
    #toast {
        display: none;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #009999;
        color: white;
        padding: 12px 20px;
        border-radius: 5px;
        z-index: 3000;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #009999;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

    </style>
</head>

<body>
    <h1>Book an Appointment</h1>
    <div id="booking-info"></div>
    <button onclick="loadAvailability()" class="book-btn">🔁 Refresh Slots</button>
    <div id="loadingOverlay">
        <div>
            <div class="spinner"></div>
            <div class="loading-text">Booking appointment...</div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast">
        </div>


    <script>
        const params = new URLSearchParams(window.location.search);
        const doctorId = params.get("doctorId"); // Changed from doctor to doctorId

       
        function loadAvailability() {
            fetch(`http://localhost:3000/api/doctors/${doctorId}`)
            .then(res => res.json())
                    .then(data => {
                        const bookingInfoDiv = document.getElementById('booking-info');
                        bookingInfoDiv.innerHTML = '';

                        if (!data.availabilitySlots || !data.availabilitySlots.length) {
                            bookingInfoDiv.innerHTML = '<p>No availability slots available.</p>';
                            return;
                        }

                        data.availabilitySlots.forEach(slot => {
                            const slotElem = document.createElement('div');
                            slotElem.className = 'slot';
                            const dateHeader = document.createElement('h3');
                            dateHeader.textContent = slot.date;
                            slotElem.appendChild(dateHeader);

                            const timesContainer = document.createElement('div');

                            slot.slots.forEach(time => {
                                const timeSlot = document.createElement('span');
                                timeSlot.className = 'time-slot';
                                timeSlot.textContent = time;
                                timeSlot.dataset.date = slot.date;
                                timeSlot.dataset.time = time;

                                timeSlot.addEventListener('click', function () {
                                    document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
                                    this.classList.add('selected');
                                });

                                timesContainer.appendChild(timeSlot);
                            });

                            slotElem.appendChild(timesContainer);
                            bookingInfoDiv.appendChild(slotElem);
                        });

                        addBookButtonIfMissing();
                    })
                    .catch(err => {
                        document.getElementById('booking-info').innerHTML =
                            `<p>Error fetching availability: ${err.message}</p>`;
                    });                   
            }

            //         document.getElementById('booking-info').appendChild(bookBtn);

            // // Automatically load slots when page opens

            function addBookButtonIfMissing() {
                //added
                const patientId = localStorage.getItem('patientId'); // Retrieve patient ID
                console.log("Retrieved Patient ID for Booking:", patientId); // Log the patient ID

                    let bookBtn = document.querySelector('.book-btn:not([onclick])');
                    if (!bookBtn) {
                        bookBtn = document.createElement('button');
                        bookBtn.className = 'book-btn';
                        bookBtn.textContent = 'Book Appointment';
                        bookBtn.disabled = true;

                        bookBtn.addEventListener('click', function () {
                            const selectedSlot = document.querySelector('.time-slot.selected');
                            if (selectedSlot) {
                                const date = selectedSlot.dataset.date;
                                const time = selectedSlot.dataset.time;

                                const patientId = localStorage.getItem('patientId');
                                if (!patientId || patientId === "undefined" || patientId.trim() === "") {
                                    showToast("You need to log in first.");
                                    setTimeout(() => {
                                        window.location.href = 'login.html';
                                    }, 1500);
                                    return;
                                }

                                // if (!patientId) {
                                //     showToast("You need to log in first.");
                                //     setTimeout(() => {
                                //         window.location.href = 'login.html';
                                //     }, 1500);
                                //     return;
                                // }

                                showLoadingOverlay(); // <-- show spinner

                                fetch(`http://localhost:3000/api/appointments`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ patientId, doctorId, date, time }) // Include patientId
                                })
                                    .then(response => response.json())
                                    .then(data => {
                                        hideLoadingOverlay(); // <-- hide spinner

                                        if (data.success) {
                                            // alert(`Appointment booked successfully for ${date} at ${time}`);
                                            showToast(`✅ Appointment booked for ${date} at ${time}`);

                                        } else {
                                            // alert('Error booking appointment: ' + data.message);
                                            showToast(`❌ Error: ${data.message || 'Could not book appointment'}`);

                                        }
                                    })
                                    .catch(err => {
                                        // alert('Error booking appointment: ' + err.message);
                                        hideLoadingOverlay(); // <-- hide spinner
                                        showToast('❌ Network error: ' + err.message);
                                    });
                            }
                        });

                        document.addEventListener('click', function (e) {
                            if (e.target.classList.contains('time-slot')) {
                                bookBtn.disabled = false; // Enable the booking button when a time slot is selected
                            }
                        });

                        document.getElementById('booking-info').appendChild(bookBtn);
                    }
                }

                // Automatically load slots when page opens
                document.addEventListener('DOMContentLoaded', loadAvailability);

                function showLoadingOverlay() {
                        document.getElementById('loadingOverlay').style.display = 'flex';
                    }

                    function hideLoadingOverlay() {
                        document.getElementById('loadingOverlay').style.display = 'none';
                    }

                    function showToast(message, duration = 3000) {
                        const toast = document.getElementById('toast');
                        toast.textContent = message;
                        toast.style.display = 'block';
                        setTimeout(() => {
                            toast.style.display = 'none';
                        }, duration);
                    }

    </script>
